name: CI

# اجرای خودکار روی هر push و pull request به main/develop
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── مرحله ۱: type-check + build ──
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
          # نکته: پس از اولین npm install و commit کردن package-lock.json، می‌توان به npm ci سوییچ کرد

      - name: Install dependencies
        run: npm ci || npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Build (Next.js)
        run: npm run build
        env:
          # متغیرهای ساختگی برای build (مقادیر واقعی در deploy می‌آیند)
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          JWT_SECRET: ci-build-only-secret-not-used-in-prod
          JWT_REFRESH_SECRET: ci-build-only-refresh-secret
          REDIS_URL: redis://localhost:6379
          # لازم چون middleware در production نبودِ آن را خطا می‌دهد؛
          # مقدارِ ساختگی فقط برای عبورِ build است، نه استفاده‌ی واقعی.
          ALLOWED_ORIGINS: https://ci.example.invalid

  # ── مرحله ۲: تست‌ها (با Postgres + Redis واقعی در CI) ──
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: rezervno_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
          # نکته: پس از اولین npm install و commit کردن package-lock.json، می‌توان به npm ci سوییچ کرد

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run migrations
        run: |
          # db push اسکیمای تست را مستقیم از schema.prisma می‌سازد.
          npx prisma db push --skip-generate
          # اجرای SQLهای دستی (prisma/sql) با همان مسیرِ کدِ Docker.
          sh prisma/apply-sql.sh
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/rezervno_test
          DATABASE_DIRECT_URL: postgresql://test:test@localhost:5432/rezervno_test

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/rezervno_test
          REDIS_URL: redis://localhost:6379
          # لازم چون middleware در production نبودِ آن را خطا می‌دهد؛
          # مقدارِ ساختگی فقط برای عبورِ build است، نه استفاده‌ی واقعی.
          ALLOWED_ORIGINS: https://ci.example.invalid
          JWT_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret

  # ── مرحله ۳: چک امنیتی پایه ──
  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
          # نکته: پس از اولین npm install و commit کردن package-lock.json، می‌توان به npm ci سوییچ کرد
      - name: Install dependencies
        run: npm ci || npm install
      - name: Audit dependencies
        # ⚠️ فیکسِ حسابرسیِ ۲۰۲۶-۰۷-۱۹ (FINAL-PRODUCTION-AUDIT.md بخشِ ۶): قبلاً اینجا
        # `|| true` بود یعنی حتی یک CVE بحرانی هم build را نمی‌شکست، فقط لاگ می‌شد.
        # حالا سطحِ critical واقعاً بلاک می‌کند؛ high فقط هشدار می‌دهد (نویزِ کمتر، ولی
        # بحرانی دیگر نادیده گرفته نمی‌شود).
        run: |
          npm audit --audit-level=critical
          npm audit --audit-level=high || echo "::warning::یافته‌ی high در dependencyها — بررسی کن (build را نمی‌شکند)"

  # ── مرحله ۴: E2E (Playwright، اپ کاستومر — API کاملاً mock می‌شود، بدونِ نیاز به DB/بک‌اند) ──
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # نکته: e2e/package-lock.json فعلاً کامیت نشده؛ بعد از اولین npm install و
          # کامیتِ آن، cache: 'npm' + cache-dependency-path: e2e/package-lock.json را
          # اضافه کن تا نصب سریع‌تر شود.

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run E2E tests
        run: npm test
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14
