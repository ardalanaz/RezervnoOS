// ─── ویرایش لوگو ───
let logoChoice={emoji:null,gradient:null,dataUrl:null};
function openLogoEditor(){
  logoChoice={emoji:RESTAURANT.logoEmoji,gradient:RESTAURANT.logoGradient,dataUrl:RESTAURANT.logoDataUrl};
  const emojis=['🌿','🍽️','☕','🍕','🍔','🍜','🥗','🍣','🍰','🍷','🔥','⭐','🏛️','🌟','🍴','👨‍🍳'];
  const grads=[
    'linear-gradient(135deg,#34D399,#059669)',
    'linear-gradient(135deg,#2563EB,#14B8A6)',
    'linear-gradient(135deg,#F59E0B,#EF4444)',
    'linear-gradient(135deg,#8B5CF6,#EC4899)',
    'linear-gradient(135deg,#0EA5E9,#6366F1)',
    'linear-gradient(135deg,#1E293B,#475569)',
  ];
  openModal(`
    <div class="modal-title">🎨 تغییر لوگو</div>
    <div class="modal-sub">یه عکس آپلود کن، یا ایموجی و رنگ انتخاب کن</div>
    <div class="logo-preview" id="logoPreview" style="background:${logoChoice.dataUrl?'transparent':logoChoice.gradient}">
      ${logoChoice.dataUrl?`<img src="${logoChoice.dataUrl}" alt="">`:logoChoice.emoji}
    </div>
    <button class="btn btn-ghost btn-block" onclick="document.getElementById('logoInput').click()">📤 آپلود عکس لوگو</button>
    <input type="file" id="logoInput" accept="image/*" style="display:none" onchange="handleLogoUpload(this)">
    <div class="field-label" style="margin-top:18px">یا یک ایموجی انتخاب کن</div>
    <div class="logo-pick-grid" id="logoEmojiGrid">
      ${emojis.map(e=>`<div class="logo-emoji-opt ${e===logoChoice.emoji&&!logoChoice.dataUrl?'sel':''}" onclick="pickLogoEmoji('${e}')">${e}</div>`).join('')}
    </div>
    <div class="field-label">رنگ پس‌زمینه</div>
    <div class="logo-grad-grid" id="logoGradGrid">
      ${grads.map((g,gi)=>`<div class="logo-grad-opt ${g===logoChoice.gradient?'sel':''}" data-gi="${gi}" style="background:${g}" onclick="pickLogoGrad(${gi},'${g}')"></div>`).join('')}
    </div>
    <button class="btn btn-primary btn-lg btn-block" onclick="saveLogo()">ذخیره لوگو</button>
  `);
}
function refreshLogoPreview(){
  const pv=document.getElementById('logoPreview');
  if(!pv)return;
  if(logoChoice.dataUrl){pv.style.background='transparent';pv.innerHTML=`<img src="${logoChoice.dataUrl}" alt="">`}
  else{pv.style.background=logoChoice.gradient;pv.textContent=logoChoice.emoji}
}
function pickLogoEmoji(e){
  logoChoice.emoji=e;logoChoice.dataUrl=null; // انتخاب ایموجی، عکس رو پاک کن
  document.querySelectorAll('#logoEmojiGrid .logo-emoji-opt').forEach(o=>o.classList.toggle('sel',o.textContent===e));
  refreshLogoPreview();
}
function pickLogoGrad(gi,g){
  logoChoice.gradient=g;
  document.querySelectorAll('#logoGradGrid .logo-grad-opt').forEach(o=>o.classList.toggle('sel',+o.dataset.gi===gi));
  refreshLogoPreview();
}
function handleLogoUpload(input){
  const file=input.files?.[0];
  if(!file)return;
  if(!file.type.startsWith('image/')){toast('⚠️','فقط فایل عکس مجاز است');return}
  if(file.size>5*1024*1024){toast('⚠️','عکس بزرگ‌تر از ۵ مگابایته');return}
  const reader=new FileReader();
  reader.onload=e=>{logoChoice.dataUrl=e.target.result;refreshLogoPreview();
    document.querySelectorAll('#logoEmojiGrid .logo-emoji-opt').forEach(o=>o.classList.remove('sel'));
    toast('✅','عکس لوگو بارگذاری شد')};
  reader.onerror=()=>toast('⚠️','خطا در خواندن فایل');
  reader.readAsDataURL(file);
  input.value='';
}
function saveLogo(){
  RESTAURANT.logoEmoji=logoChoice.emoji||'🌿';
  RESTAURANT.logoGradient=logoChoice.gradient;
  RESTAURANT.logoDataUrl=logoChoice.dataUrl;
  // به‌روزرسانی لوگوی سایدبار (زنده)
  const swEmoji=document.getElementById('swEmoji');
  if(swEmoji){
    if(RESTAURANT.logoDataUrl){swEmoji.style.background='transparent';swEmoji.innerHTML=`<img src="${RESTAURANT.logoDataUrl}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:9px">`}
    else{swEmoji.style.background=RESTAURANT.logoGradient;swEmoji.textContent=RESTAURANT.logoEmoji}
  }
  closeModal();profRenderGallery();
  toast('✅','لوگو به‌روز شد');
}
// ─── ویرایش نام ───
function openNameEditor(){
  openModal(`
    <div class="modal-title">✏️ تغییر نام رستوران</div>
    <div class="modal-sub">نام نمایشی توی اپ مشتری و پنل</div>
    <div class="field-label">نام رستوران</div>
    <input class="inp" id="restName" value="${esc(RESTAURANT.name)}" placeholder="نام رستوران">
    <button class="btn btn-primary btn-lg btn-block" onclick="saveRestName()">ذخیره</button>
    <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="closeModal()">انصراف</button>`);
  setTimeout(()=>document.getElementById('restName')?.focus(),150);
}
function saveRestName(){
  const n=document.getElementById('restName').value.trim();
  if(!n){toast('⚠️','نام رو وارد کن');return}
  RESTAURANT.name=n;
  const swName=document.getElementById('swName');
  if(swName)swName.textContent=n; // به‌روزرسانی زنده‌ی سایدبار
  closeModal();profRenderGallery();
  toast('✅','نام رستوران به‌روز شد');
}
function handleGalleryUpload(input){
  const files=Array.from(input.files||[]);
  if(!files.length)return;
  let added=0;
  files.forEach(file=>{
    if(!file.type.startsWith('image/')){toast('⚠️','فقط فایل عکس مجاز است');return}
    if(file.size>5*1024*1024){toast('⚠️',`${file.name} بزرگ‌تر از ۵ مگابایته`);return}
    const reader=new FileReader();
    reader.onload=e=>{
      GALLERY.push({dataUrl:e.target.result,label:file.name,emoji:'📷',type:'food'});
      added++;
      profRenderGallery();
      toast('✅',`عکس اضافه شد (${fa(GALLERY.length)} عکس)`);
    };
    reader.onerror=()=>toast('⚠️','خطا در خواندن فایل');
    reader.readAsDataURL(file);
  });
  input.value=''; // اجازه‌ی آپلود مجدد همون فایل
}
function removeGalleryImg(i){
  const g=GALLERY[i];
  openModal(`
    <div style="text-align:center">
      <div style="width:52px;height:52px;border-radius:14px;background:var(--red-50);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 14px">🗑️</div>
      <div class="modal-title" style="text-align:center">حذف این عکس؟</div>
      <div class="modal-sub" style="text-align:center">«${esc(g.label||'عکس')}» از گالری حذف می‌شه</div>
      <button class="btn btn-danger btn-block" onclick="doRemoveGallery(${i})">بله، حذف کن</button>
      <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="closeModal()">انصراف</button>
    </div>`);
}
function doRemoveGallery(i){
  GALLERY.splice(i,1);
  closeModal();profRenderGallery();
  toast('🗑️','عکس حذف شد');
}

function profRenderReviews(){
  let list=REVIEWS;
  if(revFilter==='positive')list=REVIEWS.filter(r=>r.rating>=4);
  else if(revFilter==='negative')list=REVIEWS.filter(r=>r.rating<=3);
  else if(revFilter==='unreplied')list=REVIEWS.filter(r=>!r.replied);
  const avg=(REVIEWS.reduce((s,r)=>s+r.rating,0)/REVIEWS.length).toFixed(1);
  const dist=[5,4,3,2,1].map(star=>({star,count:REVIEWS.filter(r=>r.rating===star).length}));
  const unreplied=REVIEWS.filter(r=>!r.replied).length;
  const stars=n=>'★'.repeat(Math.round(n))+'☆'.repeat(5-Math.round(n));
  document.getElementById('pt-reviews').innerHTML=`
    <div class="rev-summary">
      <div class="rev-big">
        <div class="rev-big-num">${fa(avg)}</div>
        <div class="rev-big-stars">${stars(+avg)}</div>
        <div class="rev-big-count">${fa(REVIEWS.length)} نظر</div>
      </div>
      <div class="rev-bars">
        ${dist.map(d=>`<div class="rev-bar-row"><span class="rl">${fa(d.star)} ستاره</span><div class="rev-bar-track"><div class="rev-bar-fill" style="width:${REVIEWS.length?d.count/REVIEWS.length*100:0}%"></div></div><span class="rv">${fa(d.count)}</span></div>`).join('')}
      </div>
    </div>
    ${unreplied>0?`<div class="ai-box" style="margin-bottom:16px"><div class="ai-insight"><span class="ic warn">💬</span><div><b>${fa(unreplied)} نظر بی‌پاسخ</b> — پاسخ دادن به نظرات (مخصوصاً منفی‌ها) اعتماد مشتری‌ها رو زیاد می‌کنه و نشون می‌ده بهشون اهمیت می‌دی.</div></div></div>`:''}
    <div class="rev-filters">
      <button class="rev-filter ${revFilter==='all'?'active':''}" onclick="setRevFilter('all')">همه (${fa(REVIEWS.length)})</button>
      <button class="rev-filter ${revFilter==='positive'?'active':''}" onclick="setRevFilter('positive')">😊 مثبت (${fa(REVIEWS.filter(r=>r.rating>=4).length)})</button>
      <button class="rev-filter ${revFilter==='negative'?'active':''}" onclick="setRevFilter('negative')">😕 منفی (${fa(REVIEWS.filter(r=>r.rating<=3).length)})</button>
      <button class="rev-filter ${revFilter==='unreplied'?'active':''}" onclick="setRevFilter('unreplied')">💬 بی‌پاسخ (${fa(unreplied)})</button>
    </div>
    <div id="revList">
      ${list.length?list.map((r,idx)=>{
        const origIdx=REVIEWS.indexOf(r);
        return `<div class="rev-card">
        <div class="rev-card-top">
          <div class="rev-ava">${r.ava}</div>
          <div><div class="rev-name">${esc(r.name)} ${r.seg==='vip'?'👑':''}</div><div class="rev-stars-sm">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div></div>
          <div class="rev-date">${r.date}</div>
        </div>
        <div class="rev-text">${esc(r.text)}</div>
        <div class="rev-subratings"><span>غذا <b>${fa(r.food)}</b></span><span>سرویس <b>${fa(r.service)}</b></span><span>فضا <b>${fa(r.atmo)}</b></span></div>
        ${r.replied?`<div class="rev-reply"><div class="rev-reply-label">↩️ پاسخ شما</div><div class="rev-reply-text">${esc(r.reply)}</div></div>`:`<div class="rev-actions"><button class="btn btn-primary btn-sm" onclick="openReplyModal(${origIdx})">💬 پاسخ بده</button>${r.rating<=3?`<button class="btn btn-ghost btn-sm" onclick="toast('🎁','پیشنهاد جبران ارسال شد')">🎁 پیشنهاد جبران</button>`:''}</div>`}
      </div>`}).join(''):`<div class="no-results"><div class="nr-emoji">💬</div><div style="font-weight:700">نظری در این دسته نیست</div></div>`}
    </div>`;
  setTimeout(()=>document.querySelectorAll('.rev-bar-fill').forEach(f=>{const w=f.style.width;f.style.width='0';requestAnimationFrame(()=>f.style.width=w)}),50);
}

function setRevFilter(f){revFilter=f;profRenderReviews()}
function openReplyModal(i){
  const r=REVIEWS[i];
  openModal(`
    <div class="modal-title">پاسخ به ${esc(r.name)}</div>
    <div class="modal-sub">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)} · ${r.date}</div>
    <div style="background:var(--s-50);border-radius:var(--r);padding:12px 14px;margin-bottom:16px;font-size:13px;color:var(--t2);line-height:1.5">${esc(r.text)}</div>
    <div class="field-label">پاسخ شما</div>
    <textarea class="inp" id="replyText" style="min-height:90px;resize:vertical" placeholder="ممنون از نظرت...">${r.rating<=3?'از بازخوردت ممنونیم و بابت تجربه‌ی نه‌چندان خوبت عذرخواهی می‌کنیم. ':''}</textarea>
    <button class="btn btn-primary btn-lg btn-block" onclick="saveReply(${i})">ارسال پاسخ</button>
    <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="closeModal()">انصراف</button>`);
  setTimeout(()=>document.getElementById('replyText')?.focus(),150);

function saveReply(i){
  const txt=document.getElementById('replyText').value.trim();
  if(!txt){toast('⚠️','متن پاسخ رو بنویس');return}
  REVIEWS[i].replied=true;
  REVIEWS[i].reply=txt;
  closeModal();profRenderReviews();
  toast('✅','پاسخت ثبت شد');
}

function renderNotifList(){
  const el=document.getElementById('notifList');
  const unread=NOTIFS.filter(n=>n.unread).length;
  document.getElementById('notifPing').style.display=unread?'block':'none';
  if(!NOTIFS.length){el.innerHTML='<div class="notif-empty">اعلانی نیست 🌙</div>';return}
  el.innerHTML=NOTIFS.map((n,i)=>`<div class="notif-item ${n.unread?'unread':''}" onclick="readNotif(${i})">
    ${n.unread?'<span class="notif-dot"></span>':''}
    <div class="notif-ic ${n.ic}">${n.emoji}</div>
    <div class="notif-body"><div class="notif-title">${n.title}</div><div class="notif-text">${n.text}</div><div class="notif-time">${n.time}</div></div>
  </div>`).join('');
}
function toggleNotif(e){e&&e.stopPropagation();const pop=document.getElementById('notifPop');pop.classList.toggle('show')}
function readNotif(i){NOTIFS[i].unread=false;renderNotifList()}
function clearNotif(){NOTIFS.forEach(n=>n.unread=false);renderNotifList();toast('✓','همه خوانده شد')}
document.addEventListener('click',e=>{const pop=document.getElementById('notifPop');if(pop&&!pop.contains(e.target)&&!e.target.closest('.tb-icon'))pop.classList.remove('show')});
function popup(emoji,title,text){
  document.getElementById('popupIc').textContent=emoji;
  document.getElementById('popupTitle').textContent=title;
  document.getElementById('popupText').textContent=text;
  const p=document.getElementById('popup');p.classList.add('show');
  clearTimeout(p._t);p._t=setTimeout(()=>p.classList.remove('show'),4200);
}
function pushNotif(n){NOTIFS.unshift(n);renderNotifList();popup(n.emoji,n.title,n.text)}

  document.getElementById('cbVal-'+k).textContent=fa(+v)+'٪';
  document.getElementById('pv-'+k).textContent=fa(+v)+'٪';
  const dirty=JSON.stringify(CB)!==JSON.stringify(CB_DRAFT);
  document.getElementById('cbDirty').classList.toggle('show',dirty);
  const btn=document.getElementById('cbSave');
  btn.style.opacity=dirty?'1':'.5';btn.style.pointerEvents=dirty?'auto':'none';
}
function cbConfirm(){
  openModal(`<div style="text-align:center">
      <div style="width:64px;height:64px;border-radius:16px;background:var(--blue-50);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 16px">💰</div>
      <div class="modal-title" style="text-align:center">از تغییر کش‌بک مطمئنی؟</div>
      <div class="modal-sub" style="text-align:center">این درصدها بلافاصله برای همه‌ی مشتریان اعمال و در اپ مشتری نمایش داده می‌شه.</div>
      <div class="cb-preview" style="text-align:right;margin-bottom:18px">
        <div class="cb-prev-row"><span>کش‌بک پایه</span><b>${fa(CB_DRAFT.base)}٪</b></div>
        <div class="cb-prev-row"><span>پیش‌سفارش</span><b>${fa(CB_DRAFT.pre)}٪</b></div>
        <div class="cb-prev-row"><span>VIP</span><b>${fa(CB_DRAFT.vip)}٪</b></div>
        <div class="cb-prev-row"><span>بازگشت</span><b>${fa(CB_DRAFT.wb)}٪</b></div>
      </div>
      <button class="btn btn-primary btn-block" onclick="cbApply()">بله، اعمال کن</button>
      <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="closeModal()">انصراف</button>
    </div>`);
}
async function cbApply(){
  CB={...CB_DRAFT};closeModal();
  document.getElementById('cbDirty').classList.remove('show');
  const btn=document.getElementById('cbSave');btn.style.opacity='.5';btn.style.pointerEvents='none';
  // ارسال به API اگر توکن staff داریم
  if(API.getToken()){
    const res=await API.patch('/restaurant/cashback',{
      base_pct:CB.base, preorder_pct:CB.pre, vip_pct:CB.vip, winback_pct:CB.wb,
    });
    if(res.ok){
      toast('✓','کش‌بک در سرور ذخیره شد');
    } else if(res.offline){
      toast('✓','کش‌بک اعمال شد (محلی)');
    } else {
      toast('⚠️',res.error?.message||'خطا در ذخیره‌ی کش‌بک');
    }
  } else {
    toast('✓','درصدهای کش‌بک اعمال شد');
  }
  pushNotif({ic:'blue',emoji:'💰',title:'کش‌بک به‌روز شد',text:`کش‌بک پایه به ${fa(CB.base)}٪ تغییر کرد`,time:'همین الان',unread:true});
}

// ═══════════ ورود کارمند (فاز ۳ تکه ۷) ═══════════
let _staffPhone = '';
let STAFF_INFO = null;
function showStaffLoginPhone(){
  document.getElementById('loginCard').innerHTML = `
    <div class="login-logo">🍽️</div>
    <div class="login-title">پنل رستوران رزرونو</div>
    <div class="login-sub">برای ورود، شماره موبایل ثبت‌شده‌ی رستورانت رو وارد کن</div>
    <label class="login-field-label">شماره موبایل</label>
    <input class="login-inp" id="staffPhone" inputmode="tel" placeholder="۰۹۱۲۳۴۵۶۷۸۹" onkeydown="if(event.key==='Enter')staffSendOtp()">
    <button class="login-btn" id="staffSendBtn" onclick="staffSendOtp()">ارسال کد ورود</button>
    <div class="login-foot">فقط شماره‌هایی که به‌عنوان مدیر یا کارمند ثبت شده‌اند دسترسی دارند</div>`;
  setTimeout(()=>document.getElementById('staffPhone')?.focus(),200);
}
async function staffSendOtp(){
  const el = document.getElementById('staffPhone');
  const phone = (el?.value||'').trim();
  const normalized = phone.replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d)).replace(/\D/g,'');
  if (!/^09\d{9}$/.test(normalized)) { toast('⚠️','شماره موبایل معتبر وارد کن'); return; }
  _staffPhone = normalized;
  const btn = document.getElementById('staffSendBtn');
  if (btn){ btn.disabled = true; btn.textContent = 'در حال ارسال...'; }
  const res = await API.requestStaffOtp(normalized);
  if (!res.ok && !res.offline){
    // خطای واقعی (مثلاً شماره staff نیست)
    toast('⚠️', res.error?.message || 'این شماره دسترسی ندارد');
    if (btn){ btn.disabled = false; btn.textContent = 'ارسال کد ورود'; }
    return;
  }
  const devCode = res.data?.devCode || (res.offline ? '۱۲۳۴' : null);
  showStaffLoginCode(devCode, res.offline);
}
function showStaffLoginCode(devCode, offline){
  document.getElementById('loginCard').innerHTML = `
    <div class="login-logo">✉️</div>
    <div class="login-title">کد ورود رو وارد کن</div>
    <div class="login-sub">کد ۴ رقمی به شماره‌ی ${toFaDigits(_staffPhone)} ارسال شد</div>
    <label class="login-field-label">کد ورود</label>
    <input class="login-inp code" id="staffCode" inputmode="numeric" maxlength="4" placeholder="····" onkeydown="if(event.key==='Enter')staffConfirmOtp()">
    <button class="login-btn" id="staffVerifyBtn" onclick="staffConfirmOtp()">ورود به پنل</button>
    <button class="login-back" onclick="showStaffLoginPhone()">تغییر شماره</button>
    ${devCode ? `<div class="login-hint">${offline?'🔌 حالت دمو (بک‌اند متصل نیست):':'🔑 حالت توسعه:'} کد ورود <b>${toFaDigits(devCode)}</b> است</div>` : ''}`;
  setTimeout(()=>document.getElementById('staffCode')?.focus(),200);
}
async function staffConfirmOtp(){
  const el = document.getElementById('staffCode');
  const code = (el?.value||'').trim().replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d));
  if (!/^\d{4}$/.test(code)) { toast('⚠️','کد ۴ رقمی رو کامل وارد کن'); return; }
  const btn = document.getElementById('staffVerifyBtn');
  if (btn){ btn.disabled = true; btn.textContent = 'در حال بررسی...'; }
  const res = await API.verifyStaffOtp(_staffPhone, code);
  if (res.ok && res.data?.staff){
    STAFF_INFO = res.data.staff;
    enterPanel();
  } else if (res.offline){
    // حالت دمو: کد ۱۲۳۴
    if (code === '1234'){ STAFF_INFO = { role:'owner', restaurant_name:'کافه‌رستوران ویستا' }; enterPanel(true); }
    else { toast('⚠️','در حالت دمو، کد ۱۲۳۴ است'); if (btn){ btn.disabled=false; btn.textContent='ورود به پنل'; } }
  } else {
    toast('⚠️', res.error?.message || 'کد اشتباه است');
    if (btn){ btn.disabled=false; btn.textContent='ورود به پنل'; }
  }
}
function enterPanel(demo){
  document.getElementById('loginOverlay').classList.add('hidden');
  renderNotifList();
  rOverview();
  initLiveUpdates();
  setTimeout(()=>pushNotif({ic:'green',emoji:'✅',title:'رزرو جدید',text:'سارا محمدی برای فردا ساعت ۲۰:۰۰ — ۲ نفر',time:'الان',unread:true}),6000);
  toast('✅', `خوش اومدی${STAFF_INFO?.restaurant_name?' · '+STAFF_INFO.restaurant_name:''}`);
}
function staffLogout(){
  API.setToken(null); STAFF_INFO = null;
  document.getElementById('loginOverlay').classList.remove('hidden');
  showStaffLoginPhone();
  toast('👋','از پنل خارج شدی');
}

// init — اول ورود را چک کن
if (API.getToken()) {
  // توکن از قبل هست (مثلاً در محصول واقعی از ذخیره‌سازی) → مستقیم پنل
  document.getElementById('loginOverlay').classList.add('hidden');
  renderNotifList();
  rOverview();
  setTimeout(()=>pushNotif({ic:'green',emoji:'✅',title:'رزرو جدید',text:'سارا محمدی برای فردا ساعت ۲۰:۰۰ — ۲ نفر',time:'الان',unread:true}),6000);
} else {
  // نیاز به ورود
  showStaffLoginPhone();
}
</script>
