<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رزرونو | پنل کسب‌وکار</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#2563EB;--blue-600:#1D4ED8;--blue-50:#EFF6FF;--blue-100:#DBEAFE;
  --teal:#14B8A6;--teal-600:#0D9488;--teal-50:#F0FDFA;
  --bg:#F8FAFC;--white:#FFFFFF;
  --s-50:#F8FAFC;--s-100:#F1F5F9;--s-200:#E2E8F0;--s-300:#CBD5E1;
  --s-400:#94A3B8;--s-500:#64748B;--s-600:#475569;--s-700:#334155;--s-900:#0F172A;
  --green:#22C55E;--green-50:#F0FDF4;--amber:#F59E0B;--amber-50:#FFFBEB;--red:#EF4444;--red-50:#FEF2F2;
  --t1:#0F172A;--t2:#64748B;--t3:#94A3B8;--border:#E2E8F0;--border-strong:#CBD5E1;
  --r-xs:8px;--r-sm:10px;--r:14px;--r-lg:18px;--r-xl:24px;
  --sh-sm:0 1px 2px rgba(15,23,42,.06);
  --sh:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
  --sh-md:0 4px 12px rgba(15,23,42,.06),0 2px 4px rgba(15,23,42,.04);
  --sh-lg:0 12px 32px rgba(15,23,42,.10);
  --sh-xl:0 24px 56px rgba(15,23,42,.12);
  --sh-blue:0 8px 24px rgba(37,99,235,.24);
  --t-fast:130ms;--t:200ms;--ease:cubic-bezier(.4,0,.2,1);--spring:cubic-bezier(.34,1.56,.64,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Vazirmatn',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--t1);
  font-size:14px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;overflow-x:hidden}
button,input,select,textarea{font-family:inherit;font-size:inherit}
img{display:block;max-width:100%}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:var(--s-300);border-radius:8px}
::selection{background:var(--blue-100)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes grow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;cursor:pointer;font-weight:600;
  border-radius:var(--r-sm);transition:all var(--t) var(--ease);white-space:nowrap;padding:10px 18px;font-size:13px;min-height:40px}
.btn-primary{background:var(--blue);color:#fff;box-shadow:var(--sh-sm)}
.btn-primary:hover{background:var(--blue-600);box-shadow:var(--sh-blue);transform:translateY(-1px)}
.btn:active{transform:scale(.97)}
.btn-teal{background:var(--teal);color:#fff}.btn-teal:hover{background:var(--teal-600)}
.btn-ghost{background:var(--white);color:var(--t1);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border-strong);background:var(--s-50)}
.btn-danger{background:var(--red-50);color:var(--red);border:1px solid #FECACA}
.btn-danger:hover{background:#FEE2E2}
.btn-sm{padding:7px 13px;min-height:34px;font-size:12px;border-radius:var(--r-xs)}
.btn-lg{padding:13px 24px;min-height:48px;font-size:15px;border-radius:var(--r)}
.btn-block{width:100%}

/* ─────── LAYOUT: sidebar + main ─────── */
.shell{display:flex;min-height:100vh}
.sidebar{width:248px;background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;
  position:fixed;top:0;bottom:0;right:0;z-index:50;transition:transform var(--t)}
.sb-brand{display:flex;align-items:center;gap:10px;padding:18px 20px;border-bottom:1px solid var(--border)}
.sb-logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--teal));
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:800;box-shadow:var(--sh-sm)}
.sb-brand-text{font-weight:800;font-size:16px;letter-spacing:-.03em}
.sb-brand-text small{display:block;font-size:10px;font-weight:600;color:var(--t3);letter-spacing:0}
/* restaurant switcher */
.sb-switch{margin:14px;padding:11px 13px;background:var(--s-50);border:1px solid var(--border);border-radius:var(--r);
  display:flex;align-items:center;gap:10px;cursor:pointer;transition:all var(--t-fast)}
.sb-switch:hover{border-color:var(--border-strong);background:var(--white)}
.sb-switch-emoji{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-switch-info{flex:1;min-width:0}
.sb-switch-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-switch-meta{font-size:11px;color:var(--t3)}
.sb-switch-arr{color:var(--t3);font-size:12px}
/* nav */
.sb-nav{flex:1;padding:6px 12px;overflow-y:auto}
.sb-nav-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;padding:14px 12px 6px}
.sb-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--r-sm);cursor:pointer;
  color:var(--t2);font-weight:600;font-size:13px;transition:all var(--t-fast);border:none;background:none;width:100%;text-align:right;margin-bottom:1px}
.sb-item:hover{background:var(--s-100);color:var(--t1)}
.sb-item.active{background:var(--blue-50);color:var(--blue)}
.sb-item svg{width:19px;height:19px;flex-shrink:0}
.sb-item .badge{margin-right:auto;background:var(--blue);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:50px;min-width:18px;text-align:center}
.sb-item.active .badge{background:var(--blue)}
/* sidebar footer */
.sb-foot{padding:12px;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;transition:background var(--t-fast)}
.sb-user:hover{background:var(--s-100)}
.sb-user-ava{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}
.sb-user-info{flex:1;min-width:0}
.sb-user-name{font-size:12px;font-weight:700}
.sb-user-role{font-size:10px;color:var(--t3)}

.main{flex:1;margin-right:248px;min-width:0;display:flex;flex-direction:column}
/* topbar */
.topbar{height:62px;background:rgba(255,255,255,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:40}
.tb-left{display:flex;align-items:center;gap:14px}
.tb-burger{display:none;width:38px;height:38px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--white);cursor:pointer;align-items:center;justify-content:center}
.tb-title{font-size:18px;font-weight:800;letter-spacing:-.03em}
.tb-date{font-size:12px;color:var(--t2);background:var(--s-100);padding:5px 12px;border-radius:50px;font-weight:600}
.tb-right{display:flex;align-items:center;gap:10px}
.tb-status{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:50px;font-size:12px;font-weight:700;cursor:pointer;transition:all var(--t-fast)}
.tb-status.open{background:var(--green-50);color:#16A34A;border:1px solid #BBF7D0}
.tb-status.closed{background:var(--red-50);color:var(--red);border:1px solid #FECACA}
.tb-status .dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.tb-icon{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--white);cursor:pointer;
  display:flex;align-items:center;justify-content:center;position:relative;transition:all var(--t-fast)}
.tb-icon:hover{background:var(--s-50)}
.tb-icon .ping{position:absolute;top:8px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--red);border:2px solid var(--white)}

.content{padding:24px;flex:1}
.view{display:none}.view.active{display:block;animation:fadeUp .3s var(--ease)}

/* ─────── KPI CARDS ─────── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;transition:all var(--t)}
.kpi:hover{box-shadow:var(--sh-md);border-color:var(--border-strong)}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kpi-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.kpi-icon.blue{background:var(--blue-50)}.kpi-icon.teal{background:var(--teal-50)}.kpi-icon.amber{background:var(--amber-50)}.kpi-icon.green{background:var(--green-50)}
.kpi-delta{font-size:12px;font-weight:700;padding:3px 8px;border-radius:50px}
.kpi-delta.up{background:var(--green-50);color:#16A34A}.kpi-delta.dn{background:var(--red-50);color:var(--red)}
.kpi-val{font-size:28px;font-weight:800;letter-spacing:-.03em;line-height:1}
.kpi-label{font-size:12px;color:var(--t2);margin-top:5px}

/* cards / panels */
.panel{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;margin-bottom:20px}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.panel-title{font-size:16px;font-weight:800;letter-spacing:-.02em}
.panel-sub{font-size:12px;color:var(--t2);margin-top:2px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.row-2-1{display:grid;grid-template-columns:2fr 1fr;gap:20px}

/* AI panel accent */
.ai-panel{background:linear-gradient(120deg,var(--blue-50),var(--teal-50));border:1px solid var(--blue-100)}
.ai-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.ai-badge{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;box-shadow:var(--sh-sm)}
.ai-title{font-size:15px;font-weight:800}
.ai-tag{margin-right:auto;font-size:10px;font-weight:700;color:var(--blue);background:var(--white);padding:4px 10px;border-radius:50px}

/* ─────── TIMELINE (reservations) ─────── */
.tl-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border)}
.tl-item:last-child{border-bottom:none}
.tl-time{width:54px;flex-shrink:0;text-align:center}
.tl-time-v{font-size:14px;font-weight:800}
.tl-time-l{font-size:10px;color:var(--t3)}
.tl-card{flex:1;background:var(--s-50);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;transition:all var(--t-fast);border-right:3px solid var(--s-300)}
.tl-card.confirmed{border-right-color:var(--blue)}
.tl-card.arrived{border-right-color:var(--green)}
.tl-card.vip{border-right-color:var(--amber)}
.tl-card:hover{background:var(--white);box-shadow:var(--sh-sm)}
.tl-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px}
.tl-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:50px}
.tl-tag.vip{background:var(--amber-50);color:#D97706}
.tl-tag.new{background:var(--blue-50);color:var(--blue)}
.tl-meta{font-size:12px;color:var(--t2);margin-top:3px}
.tl-actions{display:flex;gap:7px;margin-top:10px}
.chip-status{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:4px 11px;border-radius:50px}
.chip-status.arrived{background:var(--green-50);color:#16A34A}
.chip-status.confirmed{background:var(--blue-50);color:var(--blue)}
/* ── منوی تغییر وضعیت ── */
.status-opts{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.status-opt{display:flex;align-items:center;gap:10px;padding:13px 16px;border-radius:12px;border:1.5px solid var(--border);background:var(--bgc,#fff);color:var(--c,#333);font-size:14px;font-weight:700;cursor:pointer;transition:all var(--t-fast);text-align:right;font-family:inherit}
.status-opt:hover{transform:translateX(-2px);box-shadow:var(--sh-sm)}
.status-opt:active{transform:scale(.98)}
.status-opt span{font-size:17px}
/* ── تاریخچه (audit log) ── */
.hist-list{display:flex;flex-direction:column;gap:2px;margin-top:8px}
.hist-row{display:flex;gap:12px;padding:12px 8px;border-bottom:1px solid var(--border-light,#f1f5f9);align-items:flex-start}
.hist-row:last-child{border-bottom:none}
.hist-ic{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.hist-body{flex:1}
.hist-status{font-size:14px;font-weight:700;color:var(--ink)}
.hist-auto{font-size:10px;background:#E0E7FF;color:#4338CA;padding:2px 7px;border-radius:50px;font-weight:700;margin-right:4px}
.hist-meta{font-size:12px;color:var(--t3);margin-top:2px}
/* ── داشبورد لیست انتظار ── */
.wl-stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.wl-stat{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;display:flex;align-items:center;gap:12px}
.wl-stat-ic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.wl-stat-num{font-size:24px;font-weight:800;color:var(--ink);line-height:1}
.wl-stat-lbl{font-size:12px;color:var(--t3);margin-top:3px}
.wl-q-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.wl-q-title{font-size:17px;font-weight:800;color:var(--ink)}
.wl-q-count{font-size:13px;font-weight:600;color:var(--blue);background:var(--blue-50);padding:3px 11px;border-radius:50px;margin-right:8px}
.wl-queue{display:flex;flex-direction:column;gap:10px}
.wl-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;display:flex;align-items:center;gap:14px;transition:all var(--t)}
.wl-card:hover{box-shadow:var(--sh-sm)}
.wl-card.vip{border-color:#FDE68A;background:linear-gradient(to left,#FFFBEB,var(--white) 40%)}
.wl-card.offered{border-color:#BBF7D0;background:linear-gradient(to left,#F0FDF4,var(--white) 40%)}
.wl-card-pos{width:38px;height:38px;border-radius:50%;background:var(--blue-50);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;flex-shrink:0}
.wl-card.offered .wl-card-pos{background:var(--green-50)}
.wl-card-body{flex:1;min-width:0}
.wl-card-name{font-size:15px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px}
.wl-vip-tag{font-size:10px;background:linear-gradient(135deg,#FbBF24,#F59E0B);color:#fff;padding:2px 8px;border-radius:50px;font-weight:700}
.wl-card-meta{font-size:12.5px;color:var(--t3);margin-top:3px}
.wl-card-offered{font-size:12px;color:var(--green);font-weight:700;margin-top:4px}
.wl-card-actions{display:flex;gap:7px;flex-shrink:0}
.wl-empty{text-align:center;padding:40px;color:var(--t3);font-size:15px}
@media(max-width:768px){.wl-stats-grid{grid-template-columns:repeat(2,1fr)}.wl-card-actions{flex-direction:column}}

/* ─────── FLOOR PLAN ─────── */
.floor{background:var(--s-50);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px;position:relative;min-height:420px}
.floor-legend{display:flex;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.fl-leg{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t2);font-weight:600}
.fl-dot{width:12px;height:12px;border-radius:4px}
.tables-area{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
.table-el{aspect-ratio:1;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:all var(--t) var(--spring);border:2px solid transparent;position:relative;background:var(--white)}
.table-el:hover{transform:scale(1.06);box-shadow:var(--sh-md);z-index:2}
.table-el.free{border-color:#BBF7D0;background:var(--green-50)}
.table-el.reserved{border-color:#BFDBFE;background:var(--blue-50)}
.table-el.seated{border-color:#FDE68A;background:var(--amber-50)}
.table-el .t-icon{font-size:22px}
.table-el .t-num{font-size:11px;font-weight:800;margin-top:2px}
.table-el .t-cap{font-size:9px;color:var(--t3)}
.table-el .t-guest{font-size:9px;font-weight:700;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90%;margin-top:1px}
.table-el .t-time{font-size:8px;color:var(--t2);font-weight:600}
/* floor toolbar + occupancy */
.floor-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.occ-stats{display:flex;gap:10px;flex-wrap:wrap}
.occ-pill{display:flex;align-items:center;gap:7px;padding:8px 14px;background:var(--white);border:1px solid var(--border);border-radius:50px;font-size:12px;font-weight:700}
.occ-pill .oc-dot{width:8px;height:8px;border-radius:50%}
.occ-pill .oc-n{font-weight:800}
.floor-actions{display:flex;gap:8px}
.table-el{cursor:pointer;position:relative;transition:transform var(--t) var(--spring),box-shadow var(--t)}
.table-el.selected{outline:3px solid var(--blue);outline-offset:2px}
.table-el .t-remove{position:absolute;top:4px;left:4px;width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;
  border:none;font-size:13px;line-height:1;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:3;box-shadow:var(--sh-sm)}
.floor.edit-mode .table-el .t-remove{display:flex}
.floor.edit-mode .table-el{animation:wiggle .4s ease-in-out infinite alternate}
@keyframes wiggle{from{transform:rotate(-1deg)}to{transform:rotate(1deg)}}
.add-table-el{aspect-ratio:1;border-radius:var(--r);border:2px dashed var(--border-strong);background:transparent;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--t3);transition:all var(--t-fast)}
.add-table-el:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-50)}
.add-table-el .plus{font-size:26px;font-weight:300;line-height:1}
.add-table-el .lbl{font-size:10px;font-weight:700}
/* table action popover */
.tbl-actions{display:flex;flex-direction:column;gap:8px;margin:18px 0}
.tbl-act{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--r);
  cursor:pointer;transition:all var(--t-fast);background:var(--white)}
.tbl-act:hover{border-color:var(--border-strong);background:var(--s-50)}
.tbl-act.sel{border-color:var(--blue);background:var(--blue-50)}
.tbl-act .ta-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.tbl-act .ta-txt{flex:1}
.tbl-act .ta-name{font-size:14px;font-weight:700}
.tbl-act .ta-desc{font-size:12px;color:var(--t2)}
.tbl-act .ta-check{color:var(--blue);font-size:18px;opacity:0}
.tbl-act.sel .ta-check{opacity:1}
/* option pills (capacity picker) */
.opt-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.opt{padding:10px 16px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--white);cursor:pointer;
  font-size:13px;font-weight:600;color:var(--t2);transition:all var(--t-fast);min-height:42px;display:flex;align-items:center}
.opt:hover{border-color:var(--border-strong)}
.opt.sel{border-color:var(--blue);background:var(--blue-50);color:var(--blue)}
/* ─── DASHBOARD: big clear stats ─── */
.hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.hstat{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;display:flex;align-items:center;gap:16px}
.hstat-ic{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.hstat-ic.green{background:var(--green-50)}.hstat-ic.blue{background:var(--blue-50)}.hstat-ic.amber{background:var(--amber-50)}.hstat-ic.teal{background:var(--teal-50)}
.hstat-body{flex:1;min-width:0}
.hstat-big{font-size:32px;font-weight:800;letter-spacing:-.03em;line-height:1.1}
.hstat-big .sep{color:var(--t3);font-weight:600;margin:0 4px}
.hstat-big .total{color:var(--t3);font-size:22px;font-weight:700}
.hstat-label{font-size:13px;color:var(--t2);font-weight:600;margin-top:2px}
/* capacity bar */
.cap-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;margin-bottom:16px}
.cap-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cap-title{font-size:15px;font-weight:800}
.cap-numbers{font-size:14px;font-weight:700}
.cap-numbers .now{color:var(--blue);font-size:22px}
.cap-numbers .cap{color:var(--t3)}
.cap-bar{height:14px;background:var(--s-100);border-radius:8px;overflow:hidden;position:relative}
.cap-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--blue),var(--teal));transition:width .8s var(--ease);min-width:8px}
.cap-legend{display:flex;gap:18px;margin-top:12px;font-size:12px;color:var(--t2)}
.cap-legend b{color:var(--t1)}
/* quick actions */
.dash-live-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:var(--green-50);color:var(--green);font-size:12px;font-weight:700;padding:5px 12px;border-radius:50px}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:livePulse 2s infinite}
.live-badge.pulse{animation:liveFlash .6s}
.dash-live-time{font-size:12px;color:var(--t3)}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes liveFlash{0%{background:var(--green)}100%{background:var(--green-50)}}
.quick-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
/* ═══ داشبورد Enterprise ═══ */
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;cursor:default;transition:all var(--t);position:relative;overflow:hidden}
.kpi-card[onclick]{cursor:pointer}
.kpi-card[onclick]:hover{box-shadow:var(--sh-md);transform:translateY(-2px)}
.kpi-card.kpi-warn{border-color:#FECACA;background:linear-gradient(to bottom,#FFFBFB,var(--white))}
.kpi-card.kpi-revenue{background:linear-gradient(135deg,#F0FDF4,var(--white) 70%);border-color:#BBF7D0}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kpi-ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.kpi-trend{font-size:11px;font-weight:700;color:var(--t3);background:var(--s-100);padding:3px 9px;border-radius:50px}
.kpi-trend.up{color:var(--green);background:var(--green-50)}
.kpi-trend.down{color:var(--red);background:#FEE2E2}
.kpi-trend.est{color:#A16207;background:#FEF9C3}
.kpi-val{font-size:30px;font-weight:800;color:var(--ink);line-height:1;letter-spacing:-.5px}
.kpi-sub{font-size:16px;color:var(--t3);font-weight:600}
.kpi-est{font-size:18px;color:var(--t3);font-weight:600;margin-left:2px}
.kpi-lbl{font-size:12.5px;color:var(--t2);margin-top:5px}
.kpi-bar{height:5px;background:var(--s-100);border-radius:50px;margin-top:10px;overflow:hidden}
.kpi-bar-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--teal));border-radius:50px;transition:width .8s cubic-bezier(.22,1,.36,1)}
.cash-note{background:#FEF9C3;border:1px solid #FDE68A;border-radius:12px;padding:12px 16px;font-size:13px;color:#854D0E;margin-bottom:20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cash-link{background:#A16207;color:#fff;border:none;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
/* ساعات پیک */
.peak-chart{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;height:140px;padding-top:10px}
.peak-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%}
.peak-bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end}
.peak-bar{width:100%;background:linear-gradient(180deg,var(--blue),var(--blue-200,#93C5FD));border-radius:6px 6px 0 0;transition:height .7s cubic-bezier(.22,1,.36,1);min-height:4px}
.peak-bar.peak-hot{background:linear-gradient(180deg,#F97316,#FB923C)}
.peak-hour{font-size:11px;color:var(--t3);font-weight:600}
/* Heatmap */
.hm-grid{display:grid;grid-template-columns:auto repeat(3,1fr);gap:4px}
.hm-corner,.hm-slot-lbl,.hm-day-lbl{font-size:11px;color:var(--t3);display:flex;align-items:center;justify-content:center;font-weight:600}
.hm-day-lbl{justify-content:flex-start;padding-right:4px}
.hm-cell{aspect-ratio:2.4;border-radius:6px;transition:transform var(--t-fast)}
.hm-cell:hover{transform:scale(1.08)}
.hm-0{background:#F1F5F9}.hm-1{background:#BFDBFE}.hm-2{background:#60A5FA}.hm-3{background:#2563EB}.hm-4{background:#1E3A8A}
.hm-legend{display:flex;align-items:center;gap:8px;justify-content:flex-end;margin-top:12px;font-size:11px;color:var(--t3)}
.hm-scale{display:flex;gap:3px}.hm-scale i{width:16px;height:16px;border-radius:4px;display:block}
.dash-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
/* مشتریان برتر */
.top-cust{display:flex;align-items:center;gap:12px;padding:11px 8px;border-bottom:1px solid var(--border-light,#f1f5f9);cursor:pointer;transition:background var(--t-fast)}
.top-cust:hover{background:var(--s-50)}.top-cust:last-child{border-bottom:none}
.top-rank{width:22px;height:22px;border-radius:50%;background:var(--s-100);color:var(--t2);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.top-cust:first-child .top-rank{background:linear-gradient(135deg,#FBBF24,#F59E0B);color:#fff}
.top-ava{font-size:24px;flex-shrink:0}
.top-body{flex:1;min-width:0}.top-name{font-size:14px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:6px}
.seg-vip{font-size:9px;background:linear-gradient(135deg,#FBBF24,#F59E0B);color:#fff;padding:1px 7px;border-radius:50px;font-weight:800}
.top-meta{font-size:12px;color:var(--t3);margin-top:2px}
.top-arrow{color:var(--t3);font-size:20px}
/* بینش‌ها */
.insight{display:flex;gap:10px;padding:11px;border-radius:12px;margin-bottom:8px;background:var(--s-50)}
.insight-warn{background:#FFFBEB}.insight-hot{background:#FFF7ED}.insight-vip{background:#FEFCE8}.insight-info{background:#EFF6FF}
.insight-ic{font-size:18px;flex-shrink:0}
.insight-t{font-size:13px;font-weight:700;color:var(--ink)}
.insight-d{font-size:12px;color:var(--t2);margin-top:2px;line-height:1.5}
/* یادداشت کارکنان */
.snote{display:flex;gap:10px;align-items:flex-start;padding:11px;background:var(--s-50);border-radius:12px;margin-bottom:8px}
.snote-body{flex:1}.snote-txt{font-size:13.5px;color:var(--ink);line-height:1.6}
.snote-meta{font-size:11.5px;color:var(--t3);margin-top:4px}
.snote-del{background:none;border:none;color:var(--t3);font-size:20px;cursor:pointer;line-height:1;padding:0 4px}
.snote-empty{text-align:center;color:var(--t3);font-size:13px;padding:16px}
/* تاریخچه‌ی مشتری */
.ch-contact{display:flex;gap:16px;flex-wrap:wrap;background:var(--s-50);border-radius:12px;padding:12px 14px;margin-bottom:14px}
.ch-cinfo{font-size:13px;color:var(--ink);display:flex;align-items:center;gap:6px;font-variant-numeric:tabular-nums}
.ch-cinfo span{font-size:15px}
.ch-head{display:flex;gap:14px;align-items:center;margin-bottom:16px}
.ch-ava{font-size:44px}.ch-sub{font-size:13px;color:var(--t3);margin-top:3px}
.ch-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.ch-stat{background:var(--s-50);border-radius:12px;padding:14px;text-align:center}
.ch-stat-v{font-size:22px;font-weight:800;color:var(--ink)}.ch-stat-l{font-size:11px;color:var(--t3);margin-top:3px}
.ch-hist-title{font-size:13px;font-weight:700;color:var(--t2);margin-bottom:8px}
.ch-hist{max-height:240px;overflow-y:auto}
.ch-hrow{display:flex;justify-content:space-between;padding:10px 4px;border-bottom:1px solid var(--border-light,#f1f5f9);font-size:13px}
.ch-hmeta{color:var(--t3);font-size:12px}
@media(max-width:768px){.dash-2col{grid-template-columns:1fr}.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.quick-btn{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 14px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:9px;transition:all var(--t) var(--spring);text-align:center}
.quick-btn:hover{border-color:var(--blue);box-shadow:var(--sh-md);transform:translateY(-2px)}
.quick-btn:active{transform:translateY(0)}
.quick-ic{width:48px;height:48px;border-radius:13px;background:var(--blue-50);display:flex;align-items:center;justify-content:center;font-size:23px;transition:all var(--t)}
.quick-btn:hover .quick-ic{background:var(--blue);transform:scale(1.05)}
.quick-label{font-size:13px;font-weight:700}
/* ─── SEARCH bar (reservations) ─── */
.search-res{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.search-box{flex:1;min-width:240px;position:relative;display:flex;align-items:center}
.search-box .s-ic{position:absolute;right:14px;color:var(--t3);pointer-events:none}
.search-box input{width:100%;padding:13px 42px 13px 16px;border:1.5px solid var(--border);border-radius:var(--r);outline:none;
  font-size:14px;transition:border-color var(--t-fast);background:var(--white)}
.search-box input:focus{border-color:var(--blue)}
.search-box .s-clear{position:absolute;left:12px;background:var(--s-100);border:none;width:24px;height:24px;border-radius:50%;
  cursor:pointer;color:var(--t2);font-size:14px;display:none;align-items:center;justify-content:center}
.search-box .s-clear.show{display:flex}
/* date tabs */
.date-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.date-tab{padding:9px 18px;border:1.5px solid var(--border);border-radius:50px;background:var(--white);cursor:pointer;
  font-size:13px;font-weight:700;color:var(--t2);transition:all var(--t-fast);white-space:nowrap}
.date-tab:hover{border-color:var(--border-strong)}
.date-tab.active{background:var(--s-900);border-color:var(--s-900);color:#fff}
.no-results{text-align:center;padding:40px 20px;color:var(--t2)}
.no-results .nr-emoji{font-size:40px;margin-bottom:12px}
/* compact floor on dashboard */
.mini-floor{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.mini-tbl{aspect-ratio:1;border-radius:var(--r-sm);border:1.5px solid var(--border);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:all var(--t) var(--spring);position:relative}
.mini-tbl:hover{transform:scale(1.06);box-shadow:var(--sh-md);z-index:2}
.mini-tbl:active{transform:scale(.97)}
.mini-tbl.free{border-color:#BBF7D0;background:var(--green-50)}
.mini-tbl.reserved{border-color:#BFDBFE;background:var(--blue-50)}
.mini-tbl.seated{border-color:#FDE68A;background:var(--amber-50)}
.mini-tbl .mt-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%}
.mini-tbl.free .mt-dot{background:var(--green)}
.mini-tbl.reserved .mt-dot{background:var(--blue)}
.mini-tbl.seated .mt-dot{background:var(--amber)}
.mini-tbl .mt-num{font-size:13px;font-weight:800}
.mini-tbl .mt-cap{font-size:9px;color:var(--t3)}
@media(max-width:900px){.mini-floor{grid-template-columns:repeat(4,1fr)}}
/* inner tabs (unified customers module) */
.itabs{display:flex;gap:4px;background:var(--s-100);padding:4px;border-radius:var(--r);margin-bottom:20px;overflow-x:auto}
.itab{flex:1;min-width:max-content;padding:10px 16px;border:none;background:none;cursor:pointer;border-radius:var(--r-sm);
  font-size:13.5px;font-weight:700;color:var(--t2);transition:all var(--t-fast);white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:6px}
.itab:hover{color:var(--t1)}
.itab.active{background:var(--white);color:var(--blue);box-shadow:var(--sh-sm)}
.itab .itab-badge{font-size:10px;font-weight:800;padding:1px 7px;border-radius:50px;background:var(--red-50);color:#B91C1C}
.isub{display:none}.isub.active{display:block;animation:fadeUp .25s var(--ease)}
/* ─── گالری آپلود عکس ─── */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.gal-item{aspect-ratio:4/3;border-radius:var(--r);overflow:hidden;position:relative;background:linear-gradient(135deg,#E0F2FE,#F0FDFA);
  display:flex;align-items:center;justify-content:center;border:1px solid var(--border);transition:all var(--t)}
.gal-item:hover{box-shadow:var(--sh-md);transform:translateY(-2px)}
.gal-item img{width:100%;height:100%;object-fit:cover}
.gal-item .gal-emoji{font-size:42px}
.gal-item .gal-tag{position:absolute;bottom:6px;right:6px;background:rgba(255,255,255,.92);backdrop-filter:blur(6px);
  font-size:10px;font-weight:700;padding:3px 8px;border-radius:50px;color:var(--t1)}
.gal-item .gal-del{position:absolute;top:6px;left:6px;width:24px;height:24px;border-radius:50%;background:rgba(239,68,68,.92);
  color:#fff;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity var(--t-fast)}
.gal-item:hover .gal-del{opacity:1}
.gal-upload{aspect-ratio:4/3;border:2px dashed var(--border-strong);border-radius:var(--r);background:transparent;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--t3);transition:all var(--t-fast)}
.gal-upload:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-50)}
.gal-upload .up-ic{font-size:28px}
.gal-upload .up-tx{font-size:11px;font-weight:700}
/* ─── نمایش نظرات ─── */
.rev-summary{display:flex;gap:24px;align-items:center;padding:20px;background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:16px;flex-wrap:wrap}
.rev-big{text-align:center;padding-left:24px;border-left:1px solid var(--border)}
.rev-big-num{font-size:44px;font-weight:800;letter-spacing:-.03em;line-height:1}
.rev-big-stars{color:var(--amber);font-size:15px;margin-top:4px}
.rev-big-count{font-size:12px;color:var(--t2);margin-top:3px}
.rev-bars{flex:1;min-width:200px}
.rev-bar-row{display:flex;align-items:center;gap:10px;font-size:12px;margin-bottom:6px}
.rev-bar-row .rl{width:60px;color:var(--t2);font-weight:600}
.rev-bar-track{flex:1;height:6px;background:var(--s-100);border-radius:3px;overflow:hidden}
.rev-bar-fill{height:100%;border-radius:3px;background:var(--amber);transition:width .8s var(--ease)}
.rev-bar-row .rv{width:28px;text-align:left;font-weight:700;font-size:11px}
.rev-filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.rev-filter{padding:8px 16px;border:1.5px solid var(--border);border-radius:50px;background:var(--white);cursor:pointer;
  font-size:12.5px;font-weight:700;color:var(--t2);transition:all var(--t-fast)}
.rev-filter:hover{border-color:var(--border-strong)}
.rev-filter.active{background:var(--s-900);border-color:var(--s-900);color:#fff}
.rev-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;margin-bottom:12px}
.rev-card-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.rev-ava{width:42px;height:42px;border-radius:50%;background:var(--blue-50);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.rev-name{font-size:14px;font-weight:700}
.rev-stars-sm{color:var(--amber);font-size:13px}
.rev-date{font-size:12px;color:var(--t3);margin-right:auto}
.rev-text{font-size:14px;color:var(--t1);line-height:1.6;margin-bottom:12px}
.rev-subratings{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px;font-size:11px;color:var(--t2)}
.rev-subratings b{color:var(--t1);font-weight:700}
.rev-reply{background:var(--blue-50);border-radius:var(--r);padding:12px 14px;margin-top:8px;border-right:3px solid var(--blue)}
.rev-reply-label{font-size:11px;font-weight:700;color:var(--blue);margin-bottom:4px}
.rev-reply-text{font-size:13px;color:var(--t1);line-height:1.5}
.rev-actions{display:flex;gap:8px;margin-top:10px}
/* ─── ویرایشگر لوگو/هویت ─── */
.identity-card{display:flex;align-items:center;gap:18px;padding:22px;background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:16px;flex-wrap:wrap}
.identity-logo{width:80px;height:80px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:38px;flex-shrink:0;overflow:hidden;position:relative;box-shadow:var(--sh-sm)}
.identity-logo img{width:100%;height:100%;object-fit:cover}
.identity-info{flex:1;min-width:180px}
.identity-name{font-size:20px;font-weight:800;letter-spacing:-.02em}
.identity-sub{font-size:13px;color:var(--t2);margin-top:2px}
.identity-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.logo-pick-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin:14px 0}
.logo-emoji-opt{aspect-ratio:1;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--white);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:22px;transition:all var(--t-fast)}
.logo-emoji-opt:hover{border-color:var(--blue);background:var(--blue-50)}
.logo-emoji-opt.sel{border-color:var(--blue);background:var(--blue-50);box-shadow:0 0 0 2px var(--blue-50)}
.logo-grad-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:14px 0}
.logo-grad-opt{aspect-ratio:1;border-radius:var(--r-sm);cursor:pointer;border:2px solid transparent;transition:all var(--t-fast)}
.logo-grad-opt.sel{border-color:var(--s-900);transform:scale(1.08)}
.logo-preview{width:72px;height:72px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 16px;overflow:hidden}
.logo-preview img{width:100%;height:100%;object-fit:cover}
/* undo toast */
.toast.with-undo{padding-left:8px}
.toast .undo-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-weight:800;font-size:13px;padding:6px 14px;
  border-radius:50px;cursor:pointer;margin-right:4px;transition:background var(--t-fast)}
.toast .undo-btn:hover{background:rgba(255,255,255,.35)}
.table-el .t-status{position:absolute;top:6px;left:6px;width:8px;height:8px;border-radius:50%}
.table-el.free .t-status{background:var(--green)}
.table-el.reserved .t-status{background:var(--blue)}
.table-el.seated .t-status{background:var(--amber)}

/* ─────── CRM / GUEST ─────── */
.guest-row{display:flex;align-items:center;gap:14px;padding:14px;background:var(--white);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;transition:all var(--t)}
.guest-row:hover{box-shadow:var(--sh-md);border-color:var(--border-strong)}
.guest-ava{width:46px;height:46px;border-radius:50%;background:var(--s-100);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.guest-info{flex:1;min-width:0}
.guest-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px}
.guest-meta{font-size:12px;color:var(--t2);margin-top:2px}
.guest-ai{display:flex;gap:8px;flex-shrink:0}
.ai-metric{text-align:center;min-width:62px;padding:8px 6px;border-radius:var(--r-sm);background:var(--s-50)}
.ai-metric-v{font-size:15px;font-weight:800}
.ai-metric-v.good{color:#16A34A}.ai-metric-v.warn{color:#D97706}.ai-metric-v.bad{color:var(--red)}
.ai-metric-l{font-size:9px;color:var(--t3);font-weight:600;margin-top:1px}
.seg{font-size:10px;font-weight:700;padding:2px 9px;border-radius:50px}
.seg.vip{background:var(--amber-50);color:#D97706}.seg.regular{background:var(--teal-50);color:var(--teal-600)}
.seg.new{background:var(--blue-50);color:var(--blue)}.seg.risk{background:var(--red-50);color:var(--red)}

/* ─────── ANALYTICS CHART ─────── */
.chart{display:flex;align-items:flex-end;gap:10px;height:200px;padding-top:20px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end}
.bar{width:100%;max-width:38px;border-radius:6px 6px 0 0;background:var(--blue);position:relative;transition:all var(--t);transform-origin:bottom;cursor:pointer}
.bar:hover{background:var(--blue-600)}
.bar.teal{background:var(--teal)}.bar.teal:hover{background:var(--teal-600)}
.bar-val{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;white-space:nowrap}
.bar-label{font-size:11px;color:var(--t2);font-weight:600}
.donut-wrap{display:flex;align-items:center;gap:24px}
.donut{width:140px;height:140px;border-radius:50%;flex-shrink:0;position:relative}
.donut-hole{position:absolute;inset:26px;background:var(--white);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-hole .dv{font-size:24px;font-weight:800}
.donut-hole .dl{font-size:10px;color:var(--t3)}
.legend{display:flex;flex-direction:column;gap:10px}
.legend-item{display:flex;align-items:center;gap:9px;font-size:13px}
.legend-dot{width:11px;height:11px;border-radius:3px}
.legend-val{margin-right:auto;font-weight:700}

/* ─────── TABLE (list) ─────── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:right;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;padding:10px 12px;border-bottom:1px solid var(--border)}
.tbl td{padding:13px 12px;border-bottom:1px solid var(--border);font-size:13px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--s-50)}

/* form */
.field-label{font-size:12px;font-weight:700;margin-bottom:7px;display:block}
.inp{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);outline:none;font-size:14px;
  transition:border-color var(--t-fast);background:var(--white);margin-bottom:14px}
.inp:focus{border-color:var(--blue)}
.toggle{width:42px;height:24px;border-radius:50px;border:none;cursor:pointer;position:relative;transition:background var(--t);flex-shrink:0}
.toggle.on{background:var(--blue)}.toggle.off{background:var(--s-300)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;transition:all var(--t);box-shadow:var(--sh-sm)}
.toggle.on::after{right:3px}.toggle.off::after{left:3px}
.slider{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:var(--s-200);outline:none}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--blue);cursor:pointer;box-shadow:var(--sh)}

/* modal */
.modal-bg{display:none;position:fixed;inset:0;z-index:200;background:rgba(15,23,42,.45);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex;animation:fadeUp .2s}
.modal{background:var(--white);border-radius:var(--r-xl);padding:26px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-xl);animation:pop .3s var(--spring)}
.modal-title{font-size:19px;font-weight:800;letter-spacing:-.02em;margin-bottom:5px}
.modal-sub{font-size:13px;color:var(--t2);margin-bottom:20px}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);z-index:300;background:var(--s-900);color:#fff;
  padding:13px 22px;border-radius:50px;font-size:14px;font-weight:600;display:flex;align-items:center;gap:9px;box-shadow:var(--sh-xl);
  opacity:0;transition:all .34s var(--spring);white-space:nowrap;max-width:90vw}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* segment cards for marketing */
.seg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:18px}
.seg-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:15px;cursor:pointer;transition:all var(--t)}
.seg-card:hover,.seg-card.sel{border-color:var(--blue);background:var(--blue-50)}
.seg-card-icon{font-size:20px;margin-bottom:8px}
.seg-card-name{font-size:13px;font-weight:700}
.seg-card-count{font-size:11px;color:var(--t2)}
.txta{width:100%;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;outline:none;font-size:13px;resize:none;height:90px;transition:border-color var(--t-fast)}
.txta:focus{border-color:var(--blue)}

/* staff */
.staff-row{display:flex;align-items:center;gap:13px;padding:13px;border:1px solid var(--border);border-radius:var(--r);margin-bottom:9px}
.staff-ava{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.role-tag{font-size:10px;font-weight:700;padding:3px 10px;border-radius:50px;background:var(--s-100);color:var(--t2)}
.role-tag.owner{background:var(--blue-50);color:var(--blue)}
.role-tag.manager{background:var(--teal-50);color:var(--teal-600)}

/* mobile overlay */
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:45}
.sb-overlay.show{display:block}

@media(max-width:980px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .row2,.row-2-1{grid-template-columns:1fr}
}
@media(max-width:768px){
  .sidebar{transform:translateX(100%)}
  .sidebar.open{transform:translateX(0);box-shadow:var(--sh-xl)}
  .sb-overlay.show{display:block}
  .main{margin-right:0}
  .tb-burger{display:flex}
  .tb-date{display:none}
  .tables-area{grid-template-columns:repeat(4,1fr)}
  .content{padding:16px}
  .guest-ai{flex-direction:column;gap:5px}
  .notif-pop{position:fixed;top:62px;left:8px;right:8px;width:auto}
  .sig-row{grid-template-columns:1fr!important}
  .cb-sliders{grid-template-columns:1fr!important}
}
/* ─── NOTIFICATION POPUP ─── */
.tb-icon{position:relative}
.notif-pop{position:absolute;top:54px;left:0;width:340px;background:var(--white);border:1px solid var(--border);
  border-radius:var(--r-lg);box-shadow:var(--sh-lg);z-index:60;opacity:0;visibility:hidden;transform:translateY(-8px) scale(.98);
  transform-origin:top left;transition:all var(--t) var(--ease);overflow:hidden}
.notif-pop.show{opacity:1;visibility:visible;transform:translateY(0) scale(1)}
.notif-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);font-weight:800;font-size:14px}
.notif-clear{background:none;border:none;color:var(--blue);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.notif-clear:hover{text-decoration:underline}
.notif-list{max-height:380px;overflow-y:auto}
.notif-item{display:flex;gap:11px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background var(--t-fast);position:relative}
.notif-item:last-child{border-bottom:none}
.notif-item:hover{background:var(--s-50)}
.notif-item.unread{background:var(--blue-50)}
.notif-item.unread:hover{background:var(--blue-100)}
.notif-ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.notif-ic.blue{background:var(--blue-50)}.notif-ic.green{background:var(--green-50)}.notif-ic.amber{background:var(--amber-50)}.notif-ic.red{background:var(--red-50)}
.notif-body{flex:1;min-width:0}
.notif-title{font-size:13px;font-weight:700;margin-bottom:2px}
.notif-text{font-size:12px;color:var(--t2);line-height:1.45}
.notif-time{font-size:11px;color:var(--t3);margin-top:3px}
.notif-dot{position:absolute;top:16px;left:14px;width:7px;height:7px;border-radius:50%;background:var(--blue)}
.notif-empty{padding:40px 20px;text-align:center;color:var(--t3);font-size:13px}
/* toast popup variant — richer */
.popup-card{position:fixed;top:74px;left:50%;transform:translateX(-50%) translateY(-16px);z-index:320;background:var(--white);
  border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh-lg);padding:13px 16px;display:flex;align-items:center;gap:12px;
  min-width:300px;max-width:90vw;opacity:0;visibility:hidden;transition:all .34s var(--spring)}
.popup-card.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
.popup-ic{width:40px;height:40px;border-radius:11px;background:var(--blue-50);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.popup-body{flex:1}
.popup-title{font-size:13.5px;font-weight:800}
.popup-text{font-size:12px;color:var(--t2)}
.popup-close{background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px;padding:0 4px}

/* ─── SMART DATA ─── */
.sig-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 0}
.sig{background:var(--s-50);border:1px solid var(--border);border-radius:var(--r);padding:11px;text-align:center}
.sig-val{font-size:18px;font-weight:800}
.sig-label{font-size:10px;color:var(--t2);font-weight:600;margin-top:1px}
.sig-track{height:4px;background:var(--s-200);border-radius:2px;margin-top:7px;overflow:hidden}
.sig-fill{height:100%;border-radius:2px;transition:width .8s var(--ease)}
.smart-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;margin-bottom:13px;transition:all var(--t)}
.smart-card:hover{box-shadow:var(--sh-md)}
.smart-card.high{border-right:3px solid var(--red)}
.smart-card.med{border-right:3px solid var(--amber)}
.smart-card.low{border-right:3px solid var(--green)}
.smart-top{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.smart-ava{width:42px;height:42px;border-radius:50%;background:var(--s-100);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.smart-name{font-size:15px;font-weight:800}
.smart-pattern{font-size:12px;color:var(--t2);line-height:1.5}
.smart-rec{background:linear-gradient(120deg,var(--blue-50),var(--teal-50));border:1px solid var(--blue-100);border-radius:var(--r);padding:12px;margin-top:11px;font-size:13px;line-height:1.6}
.smart-rec-label{font-size:10px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.smart-actions{display:flex;gap:8px;margin-top:11px}
.smart-q{display:flex;gap:10px;align-items:center;background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;margin-bottom:16px}
.smart-q input{flex:1;border:none;outline:none;font-size:13px;background:none}

/* ─── CASHBACK ─── */
.cb-sliders{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:18px}
.cb-slider-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px}
.cb-slider-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.cb-slider-name{font-size:14px;font-weight:800}
.cb-slider-pct{font-size:24px;font-weight:800;color:var(--blue);letter-spacing:-.02em}
.cb-slider-desc{font-size:12px;color:var(--t2);margin-bottom:14px}
.cb-range{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:var(--s-200);outline:none;cursor:pointer}
.cb-range::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--blue);cursor:pointer;box-shadow:0 2px 6px rgba(37,99,235,.4);transition:transform var(--t-fast)}
.cb-range::-webkit-slider-thumb:hover{transform:scale(1.15)}
.cb-range::-moz-range-thumb{width:20px;height:20px;border:none;border-radius:50%;background:var(--blue);cursor:pointer}
.cb-dirty{display:none;align-items:center;gap:8px;background:var(--amber-50);border:1px solid #FDE68A;border-radius:var(--r);padding:12px 16px;font-size:13px;font-weight:600;color:#B45309;margin-bottom:14px}
.cb-dirty.show{display:flex}
.cb-preview{background:var(--s-50);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-top:4px}
.cb-prev-label{font-size:11px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:9px}
.cb-prev-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-top:1px solid var(--border)}
.cb-prev-row:first-of-type{border-top:none}
.cb-prev-row b{color:var(--blue);font-weight:800}
/* ─── صفحه‌ی ورود staff ─── */
.login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#F8FAFC,#EFF6FF);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.login-overlay.hidden{display:none}
.login-card{background:#fff;border-radius:24px;padding:36px 30px;max-width:400px;width:100%;box-shadow:0 20px 50px rgba(15,23,42,.12);text-align:center;animation:loginUp .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes loginUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.login-logo{width:68px;height:68px;border-radius:18px;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 18px;color:#fff;font-weight:800;box-shadow:0 8px 24px rgba(37,99,235,.28)}
.login-title{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:6px}
.login-sub{font-size:14px;color:var(--t2);margin-bottom:24px;line-height:1.6}
.login-field-label{font-size:12.5px;font-weight:700;color:var(--t1);text-align:right;margin-bottom:8px;display:block}
.login-inp{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:12px;outline:none;font-family:inherit;font-size:18px;text-align:center;letter-spacing:.1em;transition:border-color .15s;direction:ltr}
.login-inp:focus{border-color:var(--blue)}
.login-inp.code{font-size:24px;letter-spacing:.5em}
.login-btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--blue);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:18px;transition:all .15s}
.login-btn:hover{background:var(--blue-600)}
.login-btn:disabled{opacity:.6;cursor:default}
.login-back{background:none;border:none;color:var(--blue);font-weight:700;font-family:inherit;font-size:13px;cursor:pointer;margin-top:16px}
.login-hint{background:var(--amber-50);border:1px solid #FDE68A;border-radius:10px;padding:10px 13px;font-size:12px;color:#92400E;margin-top:14px;line-height:1.5}
.login-foot{font-size:11.5px;color:var(--t3);margin-top:18px;line-height:1.6}
</style>
</head>
<body>
<!-- صفحه‌ی ورود کارمند -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card" id="loginCard"></div>
</div>
<div class="shell">
  <div class="sb-overlay" id="sbOverlay" onclick="toggleSidebar()"></div>
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">
      <div class="sb-logo">R</div>
      <div class="sb-brand-text">رزرونو<small>پنل کسب‌وکار</small></div>
    </div>
    <div class="sb-switch" onclick="toast('🔄','تعویض شعبه')">
      <div class="sb-switch-emoji" id="swEmoji" style="background:linear-gradient(135deg,#34D399,#059669)">🌿</div>
      <div class="sb-switch-info"><div class="sb-switch-name" id="swName">کافه‌رستوران ویستا</div><div class="sb-switch-meta">شعبه اصلی</div></div>
      <span class="sb-switch-arr">⇅</span>
    </div>
    <nav class="sb-nav">
      <div class="sb-nav-label">عملیات</div>
      <button class="sb-item active" data-v="overview" onclick="nav('overview')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        داشبورد
      </button>
      <button class="sb-item" data-v="reservations" onclick="nav('reservations')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        رزروها<span class="badge">۱۲</span>
      </button>
      <button class="sb-item" data-v="waitlist" onclick="nav('waitlist')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        لیست انتظار<span class="badge" id="wlBadge">۳</span>
      </button>
      <button class="sb-item" data-v="floor" onclick="nav('floor')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        پلان سالن
      </button>
      <button class="sb-item" data-v="profile" onclick="nav('profile')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
        پروفایل و نظرات
      </button>
      <div class="sb-nav-label">مشتریان</div>
      <button class="sb-item" data-v="customers" onclick="nav('customers')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        مشتریان
      </button>
      <button class="sb-item" data-v="loyalty" onclick="nav('loyalty')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.4 7.4H22l-6 4.6 2.3 7.4-6.3-4.6L5.7 21.4 8 14 2 9.4h7.6z"/></svg>
        باشگاه
      </button>
      <div class="sb-nav-label">بینش</div>
      <button class="sb-item" data-v="analytics" onclick="nav('analytics')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
        آنالیتیکس
      </button>
      <button class="sb-item" data-v="cashback" onclick="nav('cashback')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M14.5 9a2.5 2 0 0 0-2.5-1.5c-1.5 0-2.5.8-2.5 2s1 1.7 2.5 2 2.5.9 2.5 2-1 2-2.5 2A2.5 2 0 0 1 9.5 16M12 6v1.5M12 16.5V18"/></svg>
        کش‌بک
      </button>
      <button class="sb-item" data-v="staff" onclick="nav('staff')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        کارکنان
      </button>
    </nav>
    <div class="sb-foot">
      <div class="sb-user">
        <div class="sb-user-ava">م</div>
        <div class="sb-user-info"><div class="sb-user-name">مدیر سیستم</div><div class="sb-user-role">owner@vista.com</div></div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div class="tb-left">
        <button class="tb-burger" onclick="toggleSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <div class="tb-title" id="tbTitle">داشبورد</div>
        <div class="tb-date" id="tbDate">پنجشنبه ۱۵ خرداد ۱۴۰۴</div>
      </div>

async function changeStatus(i,to){
  const r=RES[i]; if(!r)return;

  const old=r.status; r.status=to;

  r._events=r._events||[{toStatus:old,actor:'system',createdAt:new Date(Date.now()-3600000).toISOString(),isAutomatic:false}];

  toast(STATUS_META[to]?.icon||'✓',`وضعیت به «${STATUS_META[to]?.label||to}» تغییر کرد`);

    const res=await API.request(`/restaurant/reservations/${r.code}/status`,{method:'PATCH',body:JSON.stringify({status:to})});
    if(!res.ok&&!res.offline){ r.status=old; r._events.pop(); renderResList(); toast('⚠️','تغییر وضعیت ناموفق بود'); }

const API = {
  base: '',
  timeout: 8000,
  _token: null,                      // توکن staff (بعد از ورود مدیر/کارمند)
  online: true,
  setToken(t){ this._token = t; },
  getToken(){ return this._token; },
  async request(path, opts = {}){
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), this.timeout);
    try {
      const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
      if (this._token) headers['Authorization'] = `Bearer ${this._token}`;
      const res = await fetch(this.base + '/api/v1' + path, { ...opts, headers, signal: ctrl.signal });
      clearTimeout(timer);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) return { ok: false, status: res.status, error: data?.error || { message: `خطای ${res.status}` } };
      return { ok: true, status: res.status, data };
    } catch (e) {
      clearTimeout(timer);
      return { ok: false, offline: true, error: { message: e.name === 'AbortError' ? 'زمان درخواست تمام شد' : 'اتصال به سرور برقرار نشد' } };
    }
  },
  get(path){ return this.request(path); },
  post(path, body){ return this.request(path, { method: 'POST', body: JSON.stringify(body || {}) }); },
  patch(path, body){ return this.request(path, { method: 'PATCH', body: JSON.stringify(body || {}) }); },

// تبدیل تاریخ ISO به نمایش نسبی فارسی ساده
function faRelative(iso){
  const d=new Date(iso),now=new Date();
  const days=Math.floor((now-d)/86400000);
  if(days<1)return'امروز';
  if(days<7)return fa(days)+' روز پیش';
  if(days<30)return fa(Math.floor(days/7))+' هفته پیش';
  return fa(Math.floor(days/30))+' ماه پیش';
}

// بک‌اند: pending/confirmed/arrived/no_show/cancelled_by_user/cancelled_by_restaurant
function mapResStatus(apiStatus){
  if(apiStatus==='arrived')return'arrived';
  if(apiStatus==='no_show')return'noshow';
  if(apiStatus==='cancelled_by_user'||apiStatus==='cancelled_by_restaurant')return'cancelled';
  if(apiStatus==='confirmed'||apiStatus==='pending')return'confirmed';
  return'confirmed';
}
// تشخیص دسته‌ی تاریخ از زمان رزرو (برای سازگاری با فیلتر محلی)
function dateCategoryOf(slotStart){
  const d=new Date(slotStart),now=new Date();
  const startToday=new Date(now);startToday.setHours(0,0,0,0);
  const endToday=new Date(startToday);endToday.setDate(endToday.getDate()+1);
  const endTomorrow=new Date(endToday);endTomorrow.setDate(endTomorrow.getDate()+1);
  if(d<startToday)return'past';
  if(d<endToday)return'today';
  if(d<endTomorrow)return'tomorrow';
  return'upcoming';
}
// بارگذاری رزروهای رستوران از API (با fallback به نمونه)
async function loadReservations(dateFilter){
  const res=await API.get('/restaurant/reservations?date='+encodeURIComponent(dateFilter||'today'));
  if(res.ok && Array.isArray(res.data?.reservations)){
    API.online=true;
    return res.data.reservations.map(r=>{
      const d=r.slot_start?new Date(r.slot_start):null;
      const timeStr=d?toFaDigits(String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')):'—';
      const cat=r.slot_start?dateCategoryOf(r.slot_start):'today';
      return {
        t:timeStr,
        name:r.name||'مهمان',
        party:r.party_size||2,
        table:r.table_number||0,
        status:mapResStatus(r.status),
        seg:'regular',
        pre:(r.preorder&&r.preorder.length>0),
        note:r.note||'',
        phone:toFaDigits(r.phone||''),
        date:cat,
        dLabel:{today:'امروز',tomorrow:'فردا',upcoming:'آینده',past:'گذشته'}[cat],
        code:r.code,
      };
    });
  }
  API.online=false;
  return null; // یعنی fallback به RES نمونه
}

function normalizePhone(p){return (p||'').replace(/\s/g,'').replace(/[0-9]/g,d=>'۰۱۲۳۴۵۶۷۸۹'[d])}
// اتصال خودکار: هر رزرو → ثبت در باشگاه (بدون تکرار، کلید: تلفن)
function enrollClub(name,phone){
  const ph=normalizePhone(phone);
  if(!ph||ph.length<7)return {enrolled:false,reason:'no-phone'};
  const existing=CLUB.find(m=>normalizePhone(m.phone)===ph);
  if(existing)return {enrolled:false,member:existing,reason:'exists'};
  const parts=(name||'').trim().split(' ');
  const fn=parts[0]||'مهمان', ln=parts.slice(1).join(' ')||'';
  const code='VIS-'+String(memCounter++).replace(/[0-9]/g,d=>'۰۱۲۳۴۵۶۷۸۹'[d]);
  const member={fn,ln,phone:normalizePhone(phone),code,tier:'bronze',points:0,bMonth:'—',joined:'همین الان'};
  CLUB.unshift(member);
  return {enrolled:true,member};
}

// ── لایه‌ی درآمد (آماده‌ی اتصال به API صندوق) ──
// نکته: سیستم صندوق جداست و هنوز API نمی‌دهد. این لایه فعلاً تخمین واقع‌گرایانه
// می‌زند؛ وقتی API صندوق آماده شد، فقط fetchRevenue را به آن وصل کن.
const REVENUE_CONFIG = {
  connected: false,                    // وقتی API صندوق وصل شد → true
  avgPerGuest: 850_000,                // میانگین خرید هر نفر (تومان) — تخمین پایه
  vipMultiplier: 1.8,                  // مشتری VIP بیشتر خرج می‌کند
  preorderMultiplier: 1.25,            // پیش‌سفارش = خرید بیشتر
};
// تخمین خرید یک رزرو (تا وقتی صندوق وصل نشده)
function estimateSpend(r){
  let base = REVENUE_CONFIG.avgPerGuest * r.party;
  if(r.seg==='vip') base *= REVENUE_CONFIG.vipMultiplier;
  if(r.pre) base *= REVENUE_CONFIG.preorderMultiplier;
  return Math.round(base);
}
// درآمد امروز (از رزروهای حاضر/تکمیل‌شده)
function calcRevenue(reservations){
  const realized = reservations.filter(r=>['arrived','seated','dining','completed','checked_in'].includes(r.status));
  const total = realized.reduce((s,r)=>s+estimateSpend(r),0);
  const guests = realized.reduce((s,r)=>s+r.party,0);
  return { total, guests, avgPerGuest: guests?Math.round(total/guests):0, count: realized.length };
}
// قالب‌بندی پول (تومان → خوانا)
function fmtMoney(t){
  if(t>=1_000_000) return fa(+(t/1_000_000).toFixed(1))+'م';
  if(t>=1000) return fa(Math.round(t/1000))+'ک';
  return fa(t);
}

// ── محاسبه‌ی KPIهای کلیدی امروز ──
function calcTodayKPIs(){
  syncTablesFromReservations();
  const today = RES.filter(r=>r.date==='today');
  const arrived = today.filter(r=>['arrived','seated','dining','checked_in'].includes(r.status));
  const expected = today.filter(r=>['confirmed','auto_confirmed','preparing'].includes(r.status));
  const noShows = today.filter(r=>r.status==='no_show'||r.status==='noshow');
  const peopleSeated = arrived.reduce((s,r)=>s+r.party,0);
  const peopleReserved = today.reduce((s,r)=>s+r.party,0);
  const seatedTables = TABLES.filter(t=>t.s==='seated').length;
  const totalTables = TABLES.length;
  const rev = calcRevenue(today);
  return {
    todayCount: today.length,
    arrivedCount: arrived.length,
    expectedCount: expected.length,
    expectedGuests: expected.reduce((s,r)=>s+r.party,0),
    noShowCount: noShows.length,
    noShowRate: today.length?Math.round((noShows.length/today.length)*100):0,
    peopleSeated, peopleReserved,
    occupancyPct: totalTables?Math.round((seatedTables/totalTables)*100):0,
    seatedTables, totalTables,
    revenue: rev.total, avgSpend: rev.avgPerGuest, revenueGuests: rev.guests,
  };
}

// ── ساعات پیک (نمودار میله‌ای) ──
function renderPeakChart(){
  const hours={};
  RES.filter(r=>r.date==='today'||r.date==='past').forEach(r=>{
    const h=parseInt(String(r.t).replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d)).split(':')[0]);
    if(!isNaN(h)) hours[h]=(hours[h]||0)+1;
  });
  const slots=[12,13,14,18,19,20,21,22];
  const max=Math.max(1,...slots.map(h=>hours[h]||0));
  document.getElementById('peakChart').innerHTML=slots.map(h=>{
    const c=hours[h]||0; const pct=Math.round((c/max)*100);
    const peak=c===max&&c>0;
    return `<div class="peak-col"><div class="peak-bar-wrap"><div class="peak-bar ${peak?'peak-hot':''}" style="height:0" data-h="${pct}"></div></div><div class="peak-hour">${fa(h)}</div></div>`;
  }).join('');
  setTimeout(()=>{document.querySelectorAll('.peak-bar').forEach(b=>b.style.height=Math.max(4,b.dataset.h)+'%')},300);
}

// ── Heatmap هفتگی (روز × بازه‌ی زمانی) ──
function renderHeatmap(){
  const days=['ش','ی','د','س','چ','پ','ج'];
  const slots=['ظهر','عصر','شب'];
  // داده‌ی نمونه‌ی واقع‌گرایانه (شدت ۰-۴) — آخر هفته شب شلوغ‌تر
  const data=[
    [1,2,3],[1,2,3],[1,1,2],[2,2,3],[2,3,4],[3,4,4],[3,4,4]
  ];
  let html='<div class="hm-grid"><div class="hm-corner"></div>'+slots.map(s=>`<div class="hm-slot-lbl">${s}</div>`).join('');
  days.forEach((d,di)=>{
    html+=`<div class="hm-day-lbl">${d}</div>`;
    slots.forEach((s,si)=>{ html+=`<div class="hm-cell hm-${data[di][si]}" title="${d} ${s}"></div>`; });
  });
  html+='</div><div class="hm-legend"><span>کم</span><div class="hm-scale"><i class="hm-0"></i><i class="hm-1"></i><i class="hm-2"></i><i class="hm-3"></i><i class="hm-4"></i></div><span>زیاد</span></div>';
  document.getElementById('heatmap').innerHTML=html;
}

async function renderResList(){
  const el=document.getElementById('resTL');
  if(!el)return;
  // اگر توکن staff داریم، رزروها را از API بگیر (بر اساس تاریخ انتخاب‌شده)
  let source=RES;
  if(API.getToken()){
    el.innerHTML=`<div style="text-align:center;padding:30px;color:var(--t2)">در حال بارگذاری رزروها...</div>`;
    const fresh=await loadReservations(resDate);
    if(fresh!==null)source=fresh; // داده‌ی واقعی؛ در غیر این صورت نمونه
  }
  let list=source.map((r,i)=>({r,i}));
  // API از قبل بر اساس تاریخ فیلتر کرده؛ نمونه باید محلی فیلتر شود
  if(resDate!=='all' && !API.online)list=list.filter(x=>x.r.date===resDate);
  if(resQuery.trim()){
    const q=resQuery.trim().replace(/\s/g,'');
    const qFa=toFaDigits(q);
    list=list.filter(x=>{
      const name=x.r.name.replace(/\s/g,'');
      const phone=(x.r.phone||'').replace(/\s/g,'');
      return name.includes(resQuery.trim())||phone.includes(q)||phone.includes(qFa);
    });
  }
  const dateLabel={today:'امروز',tomorrow:'فردا',upcoming:'روزهای آینده',past:'گذشته',all:'همه روزها'}[resDate];
  if(!list.length){
    el.innerHTML=`<div class="no-results"><div class="nr-emoji">${resDate==='past'?'📋':'🔍'}</div><div style="font-weight:700;margin-bottom:4px">رزروی پیدا نشد</div><div style="font-size:13px">${resQuery?'با این جستجو نتیجه‌ای نبود':'برای '+dateLabel+' رزروی نیست'}</div></div>`;
    return;
  }
  // گزارش گذشته: خلاصه‌ی آماری بالا
  if(resDate==='past'){
    const done=list.filter(x=>x.r.status==='completed'||x.r.status==='arrived').length;
    const noshow=list.filter(x=>x.r.status==='noshow').length;
    const cancelled=list.filter(x=>x.r.status==='cancelled').length;
    el.innerHTML=`
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px">
        <div style="background:var(--green-50);border:1px solid #BBF7D0;border-radius:var(--r);padding:12px;text-align:center"><div style="font-size:22px;font-weight:800;color:#15803D">${fa(done)}</div><div style="font-size:11px;color:var(--t2);font-weight:600">✅ انجام‌شده</div></div>
        <div style="background:var(--amber-50);border:1px solid #FDE68A;border-radius:var(--r);padding:12px;text-align:center"><div style="font-size:22px;font-weight:800;color:#D97706">${fa(noshow)}</div><div style="font-size:11px;color:var(--t2);font-weight:600">⚠️ نیومدن (no-show)</div></div>
        <div style="background:var(--red-50);border:1px solid #FECACA;border-radius:var(--r);padding:12px;text-align:center"><div style="font-size:22px;font-weight:800;color:#B91C1C">${fa(cancelled)}</div><div style="font-size:11px;color:var(--t2);font-weight:600">🚫 لغوشده</div></div>

    return;
  }
  const seated=list.filter(x=>x.r.status==='arrived').length;
  el.innerHTML=`<div style="font-size:13px;color:var(--t2);margin-bottom:14px;font-weight:600">${fa(list.length)} رزرو · ${fa(seated)} مهمان رسیده${resQuery?` · نتایج «${esc(resQuery)}»`:''}</div>`+
    list.map(x=>resItemHTML(x.r,x.i)).join('');
}

// تولید تاریخ‌های شمسی تا ۱ ماه آینده (نمونه: از پنجشنبه ۱۵ خرداد)
function buildDateOptions(){
  const weekdays=['شنبه','یکشنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنجشنبه','جمعه'];
  const months=['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
  const monthLen=[31,31,31,31,31,31,30,30,30,30,30,29];
  // شروع: پنجشنبه ۱۵ خرداد (ماه index 2)، پنجشنبه = index 5 در weekdays
  let day=15, mon=2, wd=5;
  let opts='';
  for(let i=0;i<=30;i++){
    const label=`${weekdays[wd]} ${fa(day)} ${months[mon]}`;
    const val=i===0?'today':i===1?'tomorrow':'d'+i;
    const prefix=i===0?'امروز — ':i===1?'فردا — ':'';
    opts+=`<option value="${val}" data-label="${label}">${prefix}${label}</option>`;
    // پیش‌رفتن یک روز
    wd=(wd+1)%7;
    day++;
    if(day>monthLen[mon]){day=1;mon=(mon+1)%12}
  }
  return opts;
}
// تبدیل مقدار تاریخ پنل (today/tomorrow/dN) و ساعت فارسی به فرمت ISO که بک‌اند می‌خواهد
function manualDateToISO(dateVal, faTime){
  const now=new Date();
  let offset=0;
  if(dateVal==='tomorrow')offset=1;
  else if(/^d\d+$/.test(dateVal))offset=parseInt(dateVal.slice(1))||0;
  const t=new Date(now); t.setDate(now.getDate()+offset);
  const iso=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
  const time=String(faTime||'').replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d)).trim()||'20:00';
  return {date:iso,time};
}

async function saveManual(){
  const n=document.getElementById('mName').value.trim();
  if(!n){toast('⚠️','نام مهمان رو وارد کن');return}
  const phone=document.getElementById('mPhone').value;
  const dateSel=document.getElementById('mDate');
  const dateVal=dateSel.value;
  const opt=dateSel.options[dateSel.selectedIndex];
  const dLabel=opt.dataset.label||opt.text.replace(/^(امروز|فردا)\s*—\s*/,'').trim();
  const dateKey=(dateVal==='today'||dateVal==='tomorrow')?dateVal:'upcoming';
  const timeVal=document.getElementById('mTime').value;
  const partyVal=+document.getElementById('mParty').value.replace(/[^\d]/g,'')||2;
  const tableVal=+document.getElementById('mTable').value.replace(/[^\d]/g,'')||1;

  // اگر توکن staff داریم، رزرو واقعی در دیتابیس ثبت کن
  if(API.getToken()){
    const dt=manualDateToISO(dateVal,timeVal);
    const res=await API.post('/reservations',{
      restaurant_id:STAFF_INFO?.restaurant_id||undefined,
      date:dt.date,time:dt.time,party_size:partyVal,notify_sms:!!phone,
      guest:{name:n,phone:phone,table_number:tableVal,note:'رزرو دستی'},
    });
    if(res.ok){
      // موفق در سرور — به‌علاوه‌ی نمایش محلی
      RES.push({t:timeVal,name:n,party:partyVal,table:tableVal,status:'confirmed',seg:'new',pre:false,note:'رزرو دستی',phone,date:dateKey,dLabel,code:res.data?.reservation?.code});
      const cl=enrollClub(n,phone);
      closeModal();resDate=dateKey;
      if(document.getElementById('v-reservations').classList.contains('active'))rReservations();
      else if(document.getElementById('v-overview').classList.contains('active'))rOverview();
      toast('🎫',`رزرو ${dLabel} در سیستم ثبت شد${cl.enrolled?` + ${n} به باشگاه اضافه شد`:''}`);
      return;
    }
    if(!res.offline){toast('⚠️',res.error?.message||'ثبت رزرو ناموفق بود');return;}
    // اگر offline، می‌افتد به مسیر محلی پایین
  }

  // مسیر محلی (آفلاین یا بدون توکن) — fallback
  RES.push({t:timeVal,name:n,party:partyVal,table:tableVal,status:'confirmed',seg:'new',pre:false,note:'رزرو دستی',phone,date:dateKey,dLabel});
  const res=enrollClub(n,phone);
  closeModal();
  resDate=dateKey;
  if(document.getElementById('v-reservations').classList.contains('active'))rReservations();
  else if(document.getElementById('v-overview').classList.contains('active'))rOverview();
  if(res.enrolled){
    toast('🎫',`رزرو ${dLabel} ثبت شد + ${n} به باشگاه اضافه شد (${res.member.code})`);
  }else if(res.reason==='exists'){
    toast('✓',`رزرو ${dLabel} ثبت شد · ${n} قبلاً عضو باشگاهه`);
  }else{
    toast('✓',`رزرو ${dLabel} ثبت شد`);
  }
}

// هماهنگ‌سازی وضعیت میزها با رزروهای فعال امروز
// میزی که رزرو «تأییدشده»ی امروز داره → reserved (اگه دستی seated نشده باشه)
// میزی که مهمانش «رسیده» → seated
function syncTablesFromReservations(){
  const todayRes=RES.filter(r=>r.date==='today'&&r.table>0&&(r.status==='confirmed'||r.status==='arrived'));
  TABLES.forEach(t=>{
    // اگه دستی روی این میز وضعیت seated گذاشته شده و رزروی نیست، دست نزن
    const res=todayRes.find(r=>r.table===t.n);
    if(res){
      // رزرو فعال داره
      if(res.status==='arrived')t.s='seated';
      else if(t.s!=='seated')t.s='reserved'; // اگه قبلاً نشسته نشده، رزرو
      t._guest=res.name; // نام مهمان برای نمایش
      t._time=res.t;
    }else{
      // رزرو فعالی روی این میز نیست — اطلاعات مهمان رو پاک کن
      delete t._guest;delete t._time;
      // اگه قبلاً reserved بوده ولی دیگه رزرو نداره، آزادش کن (مگه دستی seated شده)
      if(t.s==='reserved')t.s='free';
    }
  });
}

function confirmTableStatus(){
  if(pendingTable===null)return;
  const sel=document.querySelector('#tblOpts .tbl-act.sel');
  if(!sel)return;
  const i=pendingTable;
  const newS=sel.dataset.s, old=TABLES[i].s;
  // ذخیره‌ی اسم دلخواه (مستقل از وضعیت)
  const newName=(document.getElementById('tblRename')?.value||'').trim();
  const oldName=TABLES[i].name||'';
  const nameChanged=newName!==oldName;
  TABLES[i].name=newName||undefined;
  // اگر نه وضعیت و نه اسم تغییر نکرد، فقط ببند
  if(newS===old && !nameChanged){closeModal();return}
  TABLES[i].s=newS;
  pendingTable=null;
  closeModal();
  if(document.getElementById('v-overview').classList.contains('active'))rOverview();
  else rFloor();
  const names={free:'آزاد',reserved:'رزروشده',seated:'نشسته'};
  if(newS!==old) toast('✓',`${tableLabel(TABLES[i])} → ${names[newS]}`);
  else toast('✓',`اسم میز به «${tableLabel(TABLES[i])}» تغییر کرد`);
}
function toastUndo(msg,undoFn){
  const t=document.getElementById('toast');
  document.getElementById('toastIcon').textContent='🗑️';
  document.getElementById('toastMsg').innerHTML=msg+` <button class="undo-btn" onclick="${undoFn}();document.getElementById('toast').classList.remove('show')">بازگردانی</button>`;
  t.classList.add('show','with-undo');
  clearTimeout(tt);tt=setTimeout(()=>{t.classList.remove('show','with-undo')},5000);
}
