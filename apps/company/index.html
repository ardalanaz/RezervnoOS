<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رزرونو · پنل شرکت</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  /* پایه — همان سیستم رستوران */
  --bg:#F8FAFC;--white:#FFFFFF;
  --s-50:#F8FAFC;--s-100:#F1F5F9;--s-200:#E2E8F0;--s-300:#CBD5E1;
  --s-400:#94A3B8;--s-500:#64748B;--s-600:#475569;--s-700:#334155;--s-800:#1E293B;--s-900:#0F172A;
  --green:#22C55E;--green-50:#F0FDF4;--green-600:#16A34A;
  --amber:#F59E0B;--amber-50:#FFFBEB;--amber-600:#D97706;
  --red:#EF4444;--red-50:#FEF2F2;--red-600:#DC2626;
  --t1:#0F172A;--t2:#64748B;--t3:#94A3B8;--border:#E2E8F0;--border-strong:#CBD5E1;
  /* لهجه‌ی شرکت: ایندیگو/بنفش — سطح کنترل مرکزی، متمایز از پنل رستوران (آبی/سبز) */
  --ink:#4F46E5;--ink-600:#4338CA;--ink-700:#3730A3;--ink-50:#EEF2FF;--ink-100:#E0E7FF;
  --violet:#7C3AED;--violet-50:#F5F3FF;
  --ink-grad:linear-gradient(135deg,#4F46E5,#7C3AED);
  --r-xs:8px;--r-sm:10px;--r:14px;--r-lg:18px;--r-xl:24px;
  --sh-sm:0 1px 2px rgba(15,23,42,.06);
  --sh:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
  --sh-md:0 4px 12px rgba(15,23,42,.06),0 2px 4px rgba(15,23,42,.04);
  --sh-lg:0 12px 32px rgba(15,23,42,.10);
  --sh-ink:0 8px 24px rgba(79,70,229,.24);
  --t-fast:130ms;--t:200ms;--ease:cubic-bezier(.4,0,.2,1);--spring:cubic-bezier(.34,1.56,.64,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Vazirmatn',sans-serif;background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--ink-100)}

/* ===== Layout ===== */
.app{display:flex;min-height:100vh}
.sidebar{width:248px;background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;right:0;height:100vh;z-index:40;transition:transform var(--t) var(--ease)}
.main{flex:1;margin-right:248px;min-width:0}
.sb-brand{display:flex;align-items:center;gap:11px;padding:20px;border-bottom:1px solid var(--border)}
.sb-logo{width:36px;height:36px;border-radius:10px;background:var(--ink-grad);display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:17px;box-shadow:var(--sh-ink)}
.sb-brand-text{font-weight:800;font-size:16px;letter-spacing:-.03em}
.sb-brand-text small{display:block;font-size:10px;font-weight:600;color:var(--ink);letter-spacing:.02em}
.sb-nav{flex:1;padding:8px;overflow-y:auto}
.sb-nav-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;padding:14px 12px 6px}
.sb-item{display:flex;align-items:center;gap:11px;width:100%;padding:11px 13px;border:none;background:none;border-radius:var(--r-sm);
  color:var(--t2);font-size:14px;font-weight:600;text-align:right;transition:all var(--t-fast);margin-bottom:2px}
.sb-item svg{width:19px;height:19px;flex-shrink:0}
.sb-item:hover{background:var(--s-50);color:var(--t1)}
.sb-item.active{background:var(--ink-50);color:var(--ink-700)}
.sb-foot{padding:14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-foot-ava{width:36px;height:36px;border-radius:50%;background:var(--ink-grad);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.sb-foot-info{flex:1;min-width:0}
.sb-foot-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-foot-meta{font-size:11px;color:var(--t3)}

/* ===== Topbar ===== */
.topbar{height:64px;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:30}
.tb-title{font-size:19px;font-weight:800;letter-spacing:-.03em}
.tb-right{display:flex;align-items:center;gap:12px}
.tb-search{position:relative;display:flex;align-items:center}
.tb-search input{width:240px;padding:9px 36px 9px 14px;border:1.5px solid var(--border);border-radius:50px;outline:none;
  font-size:13px;background:var(--s-50);transition:all var(--t-fast)}
.tb-search input:focus{border-color:var(--ink);background:var(--white);width:280px}
.tb-search .s-ic{position:absolute;right:13px;color:var(--t3);pointer-events:none;font-size:14px}
.tb-burger{display:none;width:40px;height:40px;border:1px solid var(--border);background:var(--white);border-radius:var(--r-sm);font-size:18px}
.content{padding:28px;max-width:1400px}

/* ===== Components ===== */
.panel{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px;box-shadow:var(--sh-sm)}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.panel-title{font-size:16px;font-weight:800;letter-spacing:-.02em}
.panel-sub{font-size:12.5px;color:var(--t2);margin-top:2px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 18px;border-radius:var(--r-sm);
  border:none;font-size:13.5px;font-weight:700;transition:all var(--t-fast);white-space:nowrap}
.btn-sm{padding:7px 13px;font-size:12.5px}
.btn-lg{padding:13px 24px;font-size:15px}
.btn:active{transform:scale(.97)}
.btn-block{width:100%}
.btn-primary{background:var(--ink);color:#fff}
.btn-primary:hover{background:var(--ink-600);box-shadow:var(--sh-ink)}
.btn-ghost{background:var(--white);color:var(--t1);border:1.5px solid var(--border)}
.btn-ghost:hover{border-color:var(--border-strong);background:var(--s-50)}
.btn-danger{background:var(--red-50);color:var(--red-600)}
.btn-danger:hover{background:#FEE2E2}

/* ===== Hero KPIs ===== */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;box-shadow:var(--sh-sm);position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;right:0;width:100%;height:3px;background:var(--ink-grad);opacity:0;transition:opacity var(--t)}
.kpi:hover::before{opacity:1}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.kpi-ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.kpi-ic.ink{background:var(--ink-50)}.kpi-ic.green{background:var(--green-50)}.kpi-ic.amber{background:var(--amber-50)}.kpi-ic.violet{background:var(--violet-50)}
.kpi-delta{font-size:11px;font-weight:800;padding:3px 9px;border-radius:50px}
.kpi-delta.up{background:var(--green-50);color:var(--green-600)}
.kpi-delta.down{background:var(--red-50);color:var(--red-600)}
.kpi-val{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1}
.kpi-label{font-size:13px;color:var(--t2);font-weight:600;margin-top:5px}

/* ===== Restaurant table ===== */
.rest-controls{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.filter-chip{padding:8px 16px;border:1.5px solid var(--border);border-radius:50px;background:var(--white);
  font-size:12.5px;font-weight:700;color:var(--t2);transition:all var(--t-fast)}
.filter-chip:hover{border-color:var(--border-strong)}
.filter-chip.active{background:var(--s-900);border-color:var(--s-900);color:#fff}
.rest-list{display:flex;flex-direction:column;gap:0}
.rest-row{display:grid;grid-template-columns:2.4fr 1fr 1fr 1.1fr 0.6fr;align-items:center;gap:16px;padding:16px 8px;
  border-bottom:1px solid var(--border);transition:background var(--t-fast);cursor:pointer}
.rest-row:hover{background:var(--s-50)}
.rest-row:last-child{border-bottom:none}
.rest-head{display:grid;grid-template-columns:2.4fr 1fr 1fr 1.1fr 0.6fr;gap:16px;padding:0 8px 10px;
  font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.04em}
.rest-name-cell{display:flex;align-items:center;gap:12px;min-width:0}
.rest-logo{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.rest-logo img{width:100%;height:100%;object-fit:cover}
.rest-name{font-size:14.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rest-loc{font-size:12px;color:var(--t2)}
.rest-metric{font-size:14px;font-weight:700}
.rest-metric small{display:block;font-size:11px;color:var(--t3);font-weight:600}
.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:50px;font-size:11.5px;font-weight:700}
.badge .bdot{width:6px;height:6px;border-radius:50%;background:currentColor}
.badge.active{background:var(--green-50);color:var(--green-600)}
.badge.expiring{background:var(--amber-50);color:var(--amber-600)}
.badge.expired{background:var(--red-50);color:var(--red-600)}
.badge.trial{background:var(--ink-50);color:var(--ink-700)}
.rest-arrow{color:var(--t3);font-size:18px;text-align:left}
/* ── back button ── */
.back-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 15px;border:1.5px solid var(--border);background:var(--white);
  border-radius:50px;font-size:13px;font-weight:700;color:var(--t2);margin-bottom:18px;transition:all var(--t-fast)}
.back-btn:hover{border-color:var(--border-strong);color:var(--t1)}
/* ── detail header ── */
.detail-hero{display:flex;align-items:center;gap:18px;padding:24px;background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:20px;flex-wrap:wrap;box-shadow:var(--sh-sm)}
.detail-logo{width:72px;height:72px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:34px;flex-shrink:0;box-shadow:var(--sh-sm)}
.detail-info{flex:1;min-width:200px}
.detail-name{font-size:22px;font-weight:800;letter-spacing:-.02em}
.detail-meta{font-size:13px;color:var(--t2);margin-top:3px}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap}
/* ── inner tabs ── */
.itabs{display:flex;gap:4px;background:var(--s-100);padding:4px;border-radius:var(--r);margin-bottom:20px;overflow-x:auto}
.itab{flex:1;min-width:max-content;padding:10px 16px;border:none;background:none;cursor:pointer;border-radius:var(--r-sm);
  font-size:13.5px;font-weight:700;color:var(--t2);transition:all var(--t-fast);white-space:nowrap}
.itab:hover{color:var(--t1)}
.itab.active{background:var(--white);color:var(--ink);box-shadow:var(--sh-sm)}
.isub{display:none}.isub.active{display:block;animation:fadeUp .25s var(--ease)}
/* ── member list ── */
.mini-list{display:flex;flex-direction:column}
.mini-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.mini-row:last-child{border:none}
.mini-ava{width:38px;height:38px;border-radius:50%;background:var(--ink-50);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.mini-info{flex:1;min-width:0}
.mini-name{font-size:13.5px;font-weight:700}
.mini-sub{font-size:11.5px;color:var(--t2)}
.mini-tag{font-size:10px;font-weight:800;padding:3px 9px;border-radius:50px;background:var(--ink-50);color:var(--ink-700)}
/* ── donut ── */
.donut-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.donut{width:120px;height:120px;border-radius:50%;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center}
.donut-hole{width:78px;height:78px;background:var(--white);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-hole .dv{font-size:22px;font-weight:800;line-height:1}
.donut-hole .dl{font-size:10px;color:var(--t2)}
.legend{flex:1;min-width:120px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12.5px;margin-bottom:9px}
.legend-dot{width:10px;height:10px;border-radius:3px}
.legend-val{margin-right:auto;font-weight:700}
/* ── billing card ── */
.bill-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.bill-stat{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;text-align:center;box-shadow:var(--sh-sm)}
.bill-stat .bs-val{font-size:26px;font-weight:800;letter-spacing:-.02em}
.bill-stat .bs-label{font-size:12px;color:var(--t2);margin-top:4px}
.plan-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:50px;font-size:11.5px;font-weight:700}
.plan-badge.pro{background:var(--ink-50);color:var(--ink-700)}
.plan-badge.basic{background:var(--s-100);color:var(--s-600)}
.plan-badge.trial{background:var(--violet-50);color:var(--violet)}
.progress-track{height:8px;background:var(--s-100);border-radius:4px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:4px;transition:width .8s var(--ease)}
/* ── support tools ── */
.support-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-bottom:20px}
.support-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;box-shadow:var(--sh-sm);transition:all var(--t)}
.support-card:hover{box-shadow:var(--sh-md);transform:translateY(-2px)}
.support-ic{width:46px;height:46px;border-radius:12px;background:var(--ink-50);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px}
.support-title{font-size:15px;font-weight:800;margin-bottom:5px}
.support-desc{font-size:12.5px;color:var(--t2);line-height:1.5;margin-bottom:14px}
.session-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border)}
.session-row:last-child{border:none}
.session-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.session-dot.live{background:var(--green);box-shadow:0 0 0 3px var(--green-50);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── دیتای مشتریان (مرکز فرماندهی) ── */
.click-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.click-stat{display:flex;align-items:center;gap:10px;background:var(--s-50);border-radius:var(--r);padding:13px}
.click-ic{font-size:22px;flex-shrink:0}
.click-count{font-size:19px;font-weight:800;color:var(--t1);line-height:1}
.click-label{font-size:11px;color:var(--t2);margin-top:3px;line-height:1.4}
.funnel-note{margin-top:14px;padding:11px 14px;background:var(--ink-50);border-radius:var(--r-sm);font-size:12.5px;color:var(--ink-700);font-weight:600;text-align:center}
.cust-controls{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.cust-search{flex:1;min-width:220px;padding:11px 15px;border:1px solid var(--border);border-radius:var(--r-sm);font-family:inherit;font-size:14px;background:var(--white)}
.cust-search:focus{outline:none;border-color:var(--ink-700)}
.cust-filters{display:flex;gap:7px}
.cust-fbtn{padding:9px 16px;border:1px solid var(--border);background:var(--white);border-radius:50px;font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;font-family:inherit;transition:all .15s}
.cust-fbtn.active{background:var(--ink-700);color:#fff;border-color:var(--ink-700)}
.cust-table{display:flex;flex-direction:column}
.cust-row{display:flex;align-items:center;gap:14px;padding:13px 8px;border-bottom:1px solid var(--s-100);cursor:pointer;transition:background .15s}
.cust-row:hover{background:var(--s-50)}.cust-row:last-child{border-bottom:none}
.cust-ava{font-size:30px;flex-shrink:0}
.cust-main{flex:1;min-width:0}
.cust-name{font-size:14.5px;font-weight:700;color:var(--t1);display:flex;align-items:center;gap:7px}
.cust-vip{font-size:9px;background:linear-gradient(135deg,#FBBF24,#F59E0B);color:#fff;padding:2px 8px;border-radius:50px;font-weight:800}
.cust-new{font-size:9px;background:var(--green);color:#fff;padding:2px 8px;border-radius:50px;font-weight:800}
.cust-phone{font-size:12.5px;color:var(--t2);margin-top:2px;font-variant-numeric:tabular-nums}
.cust-stats-mini{display:flex;gap:18px}
.csm{font-size:11px;color:var(--t3);text-align:center;display:flex;flex-direction:column;gap:1px}
.csm span{font-size:14px;font-weight:700;color:var(--t1)}
.csm-bday span{font-size:12px;color:var(--ink-700)}
.cust-arrow{font-size:22px;color:var(--t3)}
/* جزئیات مشتری */
.cd-head{display:flex;gap:14px;align-items:center;margin-bottom:18px}
.cd-ava{font-size:46px}
.cd-name{font-size:19px;font-weight:800;display:flex;align-items:center;gap:8px}
.cd-sub{font-size:13px;color:var(--t2);margin-top:3px}
.cd-section{font-size:12px;font-weight:700;color:var(--t3);text-transform:uppercase;margin:18px 0 10px;letter-spacing:.04em}
.cd-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cd-info{background:var(--s-50);border-radius:var(--r-sm);padding:11px 13px;display:flex;flex-direction:column;gap:3px}
.cd-il{font-size:11px;color:var(--t3)}.cd-iv{font-size:14px;font-weight:700;color:var(--t1);font-variant-numeric:tabular-nums}
.cd-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.cd-stat{background:var(--s-50);border-radius:var(--r-sm);padding:13px;text-align:center}
.cd-sv{font-size:18px;font-weight:800;color:var(--t1)}.cd-sl{font-size:11px;color:var(--t3);margin-top:3px}
.cd-bars{display:flex;flex-direction:column;gap:12px}
.cd-bar-row{display:flex;align-items:center;gap:10px}
.cd-bl{font-size:12.5px;color:var(--t2);width:80px;flex-shrink:0}
.cd-bar{flex:1;height:8px;background:var(--s-100);border-radius:50px;overflow:hidden}
.cd-bf{height:100%;border-radius:50px}.cd-bf.green{background:var(--green)}.cd-bf.amber{background:var(--amber)}.cd-bf.red{background:var(--red)}
.cd-bv{font-size:13px;font-weight:700;width:42px;text-align:left;flex-shrink:0}
.cd-alert{margin-top:14px;padding:12px 15px;background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--r-sm);font-size:13px;color:#991B1B;font-weight:600}
@media(max-width:768px){.click-grid{grid-template-columns:repeat(2,1fr)}.cust-stats-mini{display:none}.cd-info-grid{grid-template-columns:1fr}}

/* ── modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);z-index:60;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--white);border-radius:var(--r-xl);padding:26px;max-width:440px;width:100%;box-shadow:var(--sh-lg);animation:modalUp .3s var(--spring);max-height:90vh;overflow-y:auto}
@keyframes modalUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
.modal-title{font-size:18px;font-weight:800;letter-spacing:-.02em}
.modal-sub{font-size:13px;color:var(--t2);margin-top:3px;margin-bottom:18px}
.field-label{font-size:12.5px;font-weight:700;color:var(--t1);margin:14px 0 7px}
.inp{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);outline:none;font-family:inherit;font-size:14px;transition:border-color var(--t-fast)}
.inp:focus{border-color:var(--ink)}
.opt-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}

/* ===== Charts ===== */
.row-2{display:grid;grid-template-columns:1.5fr 1fr;gap:20px;margin-bottom:20px}
.chart{display:flex;align-items:flex-end;gap:10px;height:180px;padding-top:20px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%}
.bar{width:100%;max-width:42px;background:var(--ink-grad);border-radius:8px 8px 0 0;position:relative;transition:height .8s var(--ease);min-height:4px;margin-top:auto}

.ls-info{flex:1;min-width:0}

.ls-meta{font-size:11.5px;color:var(--t2)}
.ls-val{font-size:14px;font-weight:800;color:var(--ink)}

/* ===== Alerts box ===== */
.alert-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;box-shadow:var(--sh-sm)}
.alert-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.6}
.alert-item:last-child{border:none}
.alert-ic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.alert-ic.warn{background:var(--amber-50)}.alert-ic.danger{background:var(--red-50)}.alert-ic.info{background:var(--ink-50)}

/* ===== View switching ===== */
.view{display:none}.view.active{display:block;animation:fadeUp .3s var(--ease)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ===== Toast ===== */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--s-900);color:#fff;
  padding:13px 22px;border-radius:50px;font-size:13.5px;font-weight:600;box-shadow:var(--sh-lg);z-index:100;
  display:flex;align-items:center;gap:9px;opacity:0;transition:all var(--t) var(--spring);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

.sb-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:35}
.sb-overlay.show{display:block}

<script>
function fa(n){return n.toLocaleString('fa-IR')}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
let tt;
function toast(icon,msg){const t=document.getElementById('toast');document.getElementById('toastIcon').textContent=icon;document.getElementById('toastMsg').textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2600)}

// ═══════════════════════════════════════════════════════════
//  لایه‌ی اتصال API (فاز ۳) — پنل شرکت به endpointهای admin
//  با بک‌اند → داده‌ی واقعی · بدون بک‌اند → نمونه (پنل نمی‌شکند)
// ═══════════════════════════════════════════════════════════
const API = {
  base: '',
  timeout: 8000,
  _token: null,
  online: true,
  setToken(t){ this._token = t; },
  getToken(){ return this._token; },
  async request(path, opts = {}){
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), this.timeout);
    try {
      const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
      if (this._token) headers['Authorization'] = `Bearer ${this._token}`;
      const res = await fetch(this.base + '/api/v1' + path, { ...opts, headers, signal: ctrl.signal });
      clearTimeout(timer);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) return { ok: false, status: res.status, error: data?.error || { message: `خطای ${res.status}` } };
      return { ok: true, status: res.status, data };
    } catch (e) {
      clearTimeout(timer);
      return { ok: false, offline: true, error: { message: 'اتصال به سرور برقرار نشد' } };
    }
  },
  get(path){ return this.request(path); },
  post(path, body){ return this.request(path, { method:'POST', body: JSON.stringify(body||{}) }); },
  patch(path, body){ return this.request(path, { method:'PATCH', body: JSON.stringify(body||{}) }); },
  async requestAdminOtp(phone){ return this.request('/auth/staff/request', { method:'POST', body: JSON.stringify({ phone }) }); },
  async verifyAdminOtp(phone, code){
    const res = await this.request('/auth/staff/verify', { method:'POST', body: JSON.stringify({ phone, code }) });
    if (res.ok && res.data?.access) this.setToken(res.data.access);
    return res;
  },
};

// نگاشت رستوران API به ساختار پنل (فیلدهای اشتراک از نمونه پر می‌شوند چون در فاز ۲ بک‌اند نیستند)
function mapAdminRestaurant(apiR, fallback){
  return {
    id: apiR.id,
    name: apiR.name,
    logo: fallback?.logo || '🍽️',
    grad: fallback?.grad || 'linear-gradient(135deg,#818CF8,#4F46E5)',
    city: fallback?.city || apiR.cuisine || '—',
    plan: apiR.plan || fallback?.plan || 'basic',
    // وضعیت اشتراک و پیامک هنوز در بک‌اند نیست → از نمونه
    status: fallback?.status || (apiR.is_open ? 'active' : 'expired'),
    daysLeft: fallback?.daysLeft ?? 90,
    members: apiR.members ?? fallback?.members ?? 0,
    reservations: apiR.reservations ?? fallback?.reservations ?? 0,
    sms: apiR.sms_total_sent ?? fallback?.sms ?? 0,
    smsBalance: apiR.sms_balance ?? 0,
    rating: fallback?.rating ?? 0,
    joined: apiR.joined_at ? new Date(apiR.joined_at).toLocaleDateString('fa-IR') : (fallback?.joined || '—'),
  };
}

// بارگذاری رستوران‌ها از API admin (با fallback به نمونه)
async function loadAdminRestaurants(){
  const res = await API.get('/admin/restaurants');
  if (res.ok && Array.isArray(res.data?.restaurants) && res.data.restaurants.length) {
    API.online = true;
    return res.data.restaurants.map(apiR => {
      const fb = RESTAURANTS_SAMPLE.find(s => s.id === apiR.id) || RESTAURANTS_SAMPLE[0];
      return mapAdminRestaurant(apiR, fb);
    });
  }
  API.online = false;
  return RESTAURANTS_SAMPLE;
}

];
// RESTAURANTS متغیر زنده: اول نمونه، بعد از API به‌روز می‌شود
let RESTAURANTS = RESTAURANTS_SAMPLE;
const PLAN_LABEL={pro:'حرفه‌ای',basic:'پایه',trial:'آزمایشی'};

function nav(v){

// ════════ داشبورد کلی ════════
function rOverview(){
  const total=RESTAURANTS.length;
  const active=RESTAURANTS.filter(r=>r.status==='active').length;
  const expiring=RESTAURANTS.filter(r=>r.status==='expiring'||r.status==='trial').length;
  const expired=RESTAURANTS.filter(r=>r.status==='expired').length;
  const totalMembers=RESTAURANTS.reduce((s,r)=>s+r.members,0);
  const totalRes=RESTAURANTS.reduce((s,r)=>s+r.reservations,0);
  const totalSms=RESTAURANTS.reduce((s,r)=>s+r.sms,0);
  const totalSmsBalance=RESTAURANTS.reduce((s,r)=>s+(r.smsBalance||0),0);
  const lowBalanceCount=RESTAURANTS.filter(r=>(r.smsBalance||0)<100).length;
  // رشد ماهانه (شبیه‌سازی)
  const growth=[['دی',3],['بهمن',4],['اسفند',5],['فروردین',6],['اردیبهشت',7],['خرداد',8]];
  const mx=8;
  // برترین رستوران‌ها بر اساس رزرو
  const top=[...RESTAURANTS].sort((a,b)=>b.reservations-a.reservations).slice(0,5);
  // هشدارها
  const alerts=RESTAURANTS.filter(r=>r.status==='expiring'||r.status==='expired'||r.status==='trial');

  document.getElementById('v-overview').innerHTML=`
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-top"><div class="kpi-ic ink">🏪</div><span class="kpi-delta up">↑ ۲</span></div><div class="kpi-val">${fa(total)}</div><div class="kpi-label">رستوران فعال در پلتفرم</div></div>

    </div>

    <div class="row-2">

  const r=RESTAURANTS.find(x=>String(x.id)===String(id));if(!r)return;
  _topupRestId=id;
  openModal(`

  `);

let _topupAmount=1000;
function pickSmsAmount(v,el){_topupAmount=v;document.querySelectorAll('#smsAmountOpts .opt').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');document.getElementById('smsCustomAmount').value='';}
async function submitSmsTopup(){
  const custom=parseInt(document.getElementById('smsCustomAmount')?.value||'');
  const amount=Number.isInteger(custom)&&custom>0?custom:_topupAmount;
  if(!amount||amount<=0){toast('⚠️','تعداد نامعتبر');return;}
  const res=await API.post(`/admin/restaurants/${_topupRestId}/sms`,{amount});
  if(res.ok){
    closeModal();
    toast('✅',`${fa(amount)} پیامک شارژ شد · موجودی جدید: ${fa(res.data.balance)}`);
    // به‌روزرسانی محلی + رفرش نما
    const r=RESTAURANTS.find(x=>String(x.id)===String(_topupRestId));
    if(r)r.smsBalance=res.data.balance;
    if(typeof rBilling==='function'&&document.getElementById('v-billing'))rBilling();
  } else {
    toast('⚠️',res.error?.message||'شارژ ناموفق بود');
  }
}

        <div class="support-ic">💬</div>
        <div class="support-title">تیکت‌های پشتیبانی</div>
        <div class="support-desc">درخواست‌های باز رستوران‌ها رو ببین و پاسخ بده.</div>
        <button class="btn btn-ghost btn-block btn-sm" onclick="toast('💬','۳ تیکت باز — در نسخه‌ی کامل')">دیدن تیکت‌ها (۳)</button>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head"><div><div class="panel-title">نشست‌های پشتیبانی اخیر</div><div class="panel-sub">آخرین اتصال‌ها به رستوران‌ها</div></div></div>
      <div class="mini-list">
        ${activeSessions.map((r,i)=>`<div class="session-row">
          <span class="session-dot ${i===0?'live':''}" style="${i!==0?'background:var(--s-300)':''}"></span>
          <div class="rest-logo" style="background:${r.grad};width:36px;height:36px;font-size:15px">${r.logo}</div>
          <div class="mini-info"><div class="mini-name">${esc(r.name)}</div><div class="mini-sub">${i===0?'در حال اتصال — همین الان':'آخرین اتصال: دیروز'}</div></div>
          <button class="btn btn-ghost btn-sm" onclick="openRemoteFor(${r.id})">${i===0?'ادامه':'اتصال مجدد'}</button>
        </div>`).join('')}
        <div class="session-row">
          <span class="session-dot" style="background:var(--s-300)"></span>
          <div class="rest-logo" style="background:${RESTAURANTS[2].grad};width:36px;height:36px;font-size:15px">${RESTAURANTS[2].logo}</div>
          <div class="mini-info"><div class="mini-name">${esc(RESTAURANTS[2].name)}</div><div class="mini-sub">آخرین اتصال: ۳ روز پیش · مشکل پیامک</div></div>
          <button class="btn btn-ghost btn-sm" onclick="openRemoteFor(${RESTAURANTS[2].id})">اتصال مجدد</button>
        </div>
      </div>
    </div>`;
}
function openRemoteConnect(){
  openModal(`
    <div class="modal-title">🖥️ اتصال از راه دور</div>
    <div class="modal-sub">رستورانی که می‌خوای بهش وصل شی رو انتخاب کن</div>
    <div class="field-label">رستوران</div>
    <select class="inp" id="remoteRest">${RESTAURANTS.map(r=>`<option value="${r.id}">${esc(r.name)}</option>`).join('')}</select>
    <div style="font-size:12px;color:var(--t2);margin:14px 0;line-height:1.6;background:var(--ink-50);padding:12px 14px;border-radius:var(--r)">🔒 با اجازه‌ی رستوران، به پنلش دسترسی می‌گیری. همه‌ی اقدامات ثبت می‌شن.</div>
    <button class="btn btn-primary btn-block btn-lg" onclick="startRemote()">اتصال امن</button>
  `);
}
function startRemote(){
  const id=+document.getElementById('remoteRest').value;
  const r=RESTAURANTS.find(x=>x.id===id);
  closeModal();
  toast('🖥️',`در حال اتصال به پنل ${r.name}...`);
}
function openRemoteFor(id){const r=RESTAURANTS.find(x=>x.id===id);toast('🖥️',`اتصال به ${r.name}...`)}
function openEditSettings(){
  openModal(`
    <div class="modal-title">✏️ ویرایش تنظیمات رستوران</div>
    <div class="modal-sub">رستوران و بخش مورد نظر رو انتخاب کن</div>
    <div class="field-label">رستوران</div>
    <select class="inp" id="editRest">${RESTAURANTS.map(r=>`<option value="${r.id}">${esc(r.name)}</option>`).join('')}</select>
    <div class="field-label">بخش</div>
    <div class="opt-row">
      <div class="opt sel">منو</div><div class="opt">میزها</div><div class="opt">کش‌بک</div><div class="opt">اطلاعات</div>
    </div>
    <button class="btn btn-primary btn-block btn-lg" style="margin-top:8px" onclick="closeModal();toast('✏️','باز کردن ویرایشگر...')">باز کردن ویرایشگر</button>
  `);
}
function openSupportFor(id){currentRest=RESTAURANTS.find(r=>r.id===id);nav('support')}

// ═══════════ ورود مدیر پلتفرم (فاز ۳ تکه ۷) ═══════════
let _adminPhone = '';
function faD(s){ return String(s).replace(/\d/g,d=>'۰۱۲۳۴۵۶۷۸۹'[d]); }
function showAdminLoginPhone(){
  document.getElementById('loginCard').innerHTML = `
    <div class="login-logo">R</div>
    <div class="login-title">پنل شرکت رزرونو</div>
    <div class="login-sub">ورود مدیر پلتفرم — شماره موبایل خود را وارد کنید</div>
    <label class="login-field-label">شماره موبایل</label>
    <input class="login-inp" id="adminPhone" inputmode="tel" placeholder="۰۹۱۲۳۴۵۶۷۸۹" onkeydown="if(event.key==='Enter')adminSendOtp()">
    <button class="login-btn" id="adminSendBtn" onclick="adminSendOtp()">ارسال کد ورود</button>
    <div class="login-foot">فقط مدیران پلتفرم به این پنل دسترسی دارند</div>`;
  setTimeout(()=>document.getElementById('adminPhone')?.focus(),200);
}
async function adminSendOtp(){
  const el = document.getElementById('adminPhone');
  const phone = (el?.value||'').trim();
  const normalized = phone.replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d)).replace(/\D/g,'');
  if (!/^09\d{9}$/.test(normalized)) { toast('⚠️','شماره موبایل معتبر وارد کن'); return; }
  _adminPhone = normalized;
  const btn = document.getElementById('adminSendBtn');
  if (btn){ btn.disabled = true; btn.textContent = 'در حال ارسال...'; }
  const res = await API.requestAdminOtp(normalized);
  if (!res.ok && !res.offline){
    toast('⚠️', res.error?.message || 'این شماره دسترسی ندارد');
    if (btn){ btn.disabled = false; btn.textContent = 'ارسال کد ورود'; }
    return;
  }
  const devCode = res.data?.devCode || (res.offline ? '۱۲۳۴' : null);
  showAdminLoginCode(devCode, res.offline);
}
function showAdminLoginCode(devCode, offline){
  document.getElementById('loginCard').innerHTML = `
    <div class="login-logo">✉️</div>
    <div class="login-title">کد ورود را وارد کنید</div>
    <div class="login-sub">کد ۴ رقمی به شماره‌ی ${faD(_adminPhone)} ارسال شد</div>
    <label class="login-field-label">کد ورود</label>
    <input class="login-inp code" id="adminCode" inputmode="numeric" maxlength="4" placeholder="····" onkeydown="if(event.key==='Enter')adminConfirmOtp()">
    <button class="login-btn" id="adminVerifyBtn" onclick="adminConfirmOtp()">ورود به پنل</button>
    <button class="login-back" onclick="showAdminLoginPhone()">تغییر شماره</button>
    ${devCode ? `<div class="login-hint">${offline?'🔌 حالت دمو (بک‌اند متصل نیست):':'🔑 حالت توسعه:'} کد ورود <b>${faD(devCode)}</b> است</div>` : ''}`;
  setTimeout(()=>document.getElementById('adminCode')?.focus(),200);
}
async function adminConfirmOtp(){
  const el = document.getElementById('adminCode');
  const code = (el?.value||'').trim().replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d));
  if (!/^\d{4}$/.test(code)) { toast('⚠️','کد ۴ رقمی را کامل وارد کن'); return; }
  const btn = document.getElementById('adminVerifyBtn');
  if (btn){ btn.disabled = true; btn.textContent = 'در حال بررسی...'; }
  const res = await API.verifyAdminOtp(_adminPhone, code);
  if (res.ok && res.data?.access){
    await enterAdminPanel();
  } else if (res.offline){
    if (code === '1234'){ await enterAdminPanel(true); }
    else { toast('⚠️','در حالت دمو، کد ۱۲۳۴ است'); if (btn){ btn.disabled=false; btn.textContent='ورود به پنل'; } }
  } else {
    toast('⚠️', res.error?.message || 'کد اشتباه است');
    if (btn){ btn.disabled=false; btn.textContent='ورود به پنل'; }
  }
}
async function enterAdminPanel(demo){
  document.getElementById('loginOverlay').classList.add('hidden');
  // اگر توکن واقعی داریم، داده‌ی واقعی بارگذاری کن
  if (API.getToken() && !demo){
    const fresh = await loadAdminRestaurants();
    RESTAURANTS = fresh;
  }
  rOverview();
  toast('✅','خوش آمدید · پنل شرکت');
}
function adminLogout(){
  API.setToken(null);
  document.getElementById('loginOverlay').classList.remove('hidden');
  showAdminLoginPhone();
  toast('👋','از پنل خارج شدید');
}

// شروع — اول ورود را چک کن
if (API.getToken()) {
  document.getElementById('loginOverlay').classList.add('hidden');
  rOverview();
  (async () => {
    const fresh = await loadAdminRestaurants();
    RESTAURANTS = fresh;
    const active = document.querySelector('.view.active');
    if (active) {
      const id = active.id.replace('v-', '');
      ({overview:rOverview, restaurants:rRestaurants, detail:rDetail, analytics:rAnalytics, billing:rBilling, support:rSupport})[id]?.();
    }
  })();
} else {
  showAdminLoginPhone();
}
</script>
