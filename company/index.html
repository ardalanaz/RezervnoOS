<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رزرونو · پنل شرکت</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/panel.css">
<!-- آدرس بک‌اند: خالی = same-origin. برای دامنه‌ی جدا URL کامل بگذار (مثلاً 'https://rezervno-api.vercel.app'). -->
<script>window.__API_BASE__ = '';</script>
</head>
<body>
<!-- صفحه‌ی ورود مدیر پلتفرم -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card" id="loginCard"></div>
</div>
<div class="app">
  <div class="sb-overlay" id="sbOverlay" onclick="toggleSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">
      <div class="sb-logo">R</div>
      <div class="sb-brand-text">رزرونو<small>پنل شرکت · کنترل مرکزی</small></div>
    </div>
    <nav class="sb-nav">
      <div class="sb-nav-label">مرور کلی</div>
      <button class="sb-item active" data-v="overview" onclick="nav('overview')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
        داشبورد
      </button>
      <button class="sb-item" data-v="restaurants" onclick="nav('restaurants')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/><path d="M9 9v0M9 13v0M9 17v0"/></svg>
        رستوران‌ها
      </button>
      <div class="sb-nav-label">مدیریت</div>
      <button class="sb-item" data-v="analytics" onclick="nav('analytics')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
        آنالیز و رفتار مشتری
      </button>
      <button class="sb-item" data-v="customers" onclick="nav('customers')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        دیتای مشتریان
      </button>
      <button class="sb-item" data-v="billing" onclick="nav('billing')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>
        اشتراک و پیامک
      </button>
      <div class="sb-nav-label">پلتفرم</div>
      <button class="sb-item" data-v="systemhealth" onclick="nav('systemhealth')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        سلامت سیستم
      </button>
      <button class="sb-item" data-v="security" onclick="nav('security')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg>
        امنیت پلتفرم
      </button>
      <button class="sb-item" data-v="support" onclick="nav('support')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a4 4 0 0 0-5.6 5.6l-6 6a2 2 0 0 0 2.8 2.8l6-6a4 4 0 0 0 5.6-5.6l-2.1 2.1-2.1-2.1z"/></svg>
        مدیریت رستوران‌ها
      </button>
    </nav>
    <div class="sb-foot">
      <div class="sb-foot-ava">ش</div>
      <div class="sb-foot-info"><div class="sb-foot-name">شرکت رزرونو</div><div class="sb-foot-meta">مدیر کل</div></div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <button class="tb-burger" onclick="toggleSidebar()">☰</button>
        <div class="tb-title" id="pageTitle">داشبورد</div>
      </div>
      <div class="tb-right">
        <div class="tb-search">
          <span class="s-ic">🔍</span>
          <input placeholder="جستجوی رستوران..." id="globalSearch" onfocus="nav('restaurants')">
        </div>
      </div>
    </div>
    <div id="offlineBanner" style="display:none;align-items:center;gap:8px;background:var(--amber-50);color:var(--amber-600);padding:9px 28px;font-size:12.5px;font-weight:700">
      ⚠️ اتصال به سرور برقرار نیست — داده‌های نمایش‌داده‌شده نمونه (دمو) هستن، نه واقعی.
    </div>

    <div class="content">
      <div id="v-overview" class="view active"></div>
      <div id="v-restaurants" class="view"></div>
      <div id="v-detail" class="view"></div>
      <div id="v-analytics" class="view"></div>
      <div id="v-customers" class="view"></div>
      <div id="v-billing" class="view"></div>
      <div id="v-systemhealth" class="view"></div>
      <div id="v-security" class="view"></div>
      <div id="v-support" class="view"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastIcon">✓</span><span id="toastMsg"></span></div>
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()"><div class="modal" id="modalBody"></div></div>

<!-- ── پنل company: ماژول‌های Vanilla JS (ترتیب مهم) ── -->
<script src="js/api.js"></script>
<script src="js/data.js"></script>
<script src="js/overview.js"></script>
<script src="js/restaurant.js"></script>
<script src="js/intelligence.js"></script>
</body>
</html>
