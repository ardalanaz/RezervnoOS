function icon(name, opts = {}) {
  const p = PATHS[name];
  if (!p) { console.warn('icon نامعتبر:', name); return ''; }
  const size = opts.size || 24;
  const cls = opts.class ? ` class="${opts.class}"` : '';
  const label = opts.label ? ` role="img" aria-label="${opts.label}"` : ' aria-hidden="true"';
  const fill = opts.fill ? 'currentColor' : 'none';
  const sw = opts.strokeWidth || 1.5;
  return `<svg${cls} width="${size}" height="${size}" viewBox="0 0 24 24" fill="${fill}" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"${label}>${p}</svg>`;
}

  const opts=allowed.map(s=>{const m=STATUS_META[s];return `<button class="status-opt" onclick="changeStatus(${i},'${s}')" style="--c:${m.fg};--bgc:${m.bg}"><span>${icon(m.icon,{size:13})}</span> ${m.label}</button>`;}).join('');
  openModal(`<div class="bs-head"><div class="bs-title">تغییر وضعیت</div><div class="bs-rest">${esc(r.name)} · میز ${fa(r.table)}</div></div>
    <div style="margin:8px 0 4px;font-size:13px;color:var(--t3)">وضعیت فعلی: ${STATUS_META[r.status]?.label||r.status}</div>
    <div class="status-opts">${opts}</div>
    <button class="btn btn-ghost btn-block" style="margin-top:12px" onclick="viewHistory(${i})">${icon('inbox',{size:14})} تاریخچه‌ی تغییرات</button>`);
}
async function changeStatus(i,to){
  const r=RES[i]; if(!r)return;
  closeModal();
  // به‌روزرسانی خوش‌بینانه‌ی UI
  const old=r.status; r.status=to;
  // ثبت محلی در تاریخچه (برای نمایش در حالت دمو)
  r._events=r._events||[{toStatus:old,actor:'system',createdAt:new Date(Date.now()-3600000).toISOString(),isAutomatic:false}];
  r._events.push({toStatus:to,actor:'staff',createdAt:new Date().toISOString(),isAutomatic:false});
  renderResList();
  toast('',`وضعیت به «${STATUS_META[to]?.label||to}» تغییر کرد`);
  // ارسال به بک‌اند؛ فقط اگر سرور آنلاین بود و خطای واقعی داد، برگردان
  if(r.code){
    const res=await API.request(`/restaurant/reservations/${r.code}/status`,{method:'PATCH',body:JSON.stringify({status:to})});
    if(!res.ok&&!res.offline){ r.status=old; r._events.pop(); renderResList(); toast('','تغییر وضعیت ناموفق بود'); }
  }
}
async function viewHistory(i){
  const r=RES[i]; if(!r)return;
  // در دمو، تاریخچه‌ی نمونه؛ با بک‌اند واقعی از API می‌آید
  let events=r._events;
  if(!events){
    const res=await API.request(`/restaurant/reservations/${r.code}/events`);
    events=res.ok?res.data.events:[{toStatus:r.status,actor:'system',createdAt:new Date().toISOString(),isAutomatic:false}];
  }
  const rows=(events||[]).map(e=>{
    const m=STATUS_META[e.toStatus]||{label:e.toStatus,icon:'info',fg:'#666'};
    const who=e.actor==='system'||e.actor==='cron'?'سیستم':e.actor==='customer'?'مشتری':'کارمند';
    const t=new Date(e.createdAt).toLocaleString('fa-IR',{hour:'2-digit',minute:'2-digit',month:'short',day:'numeric'});
    return `<div class="hist-row"><span class="hist-ic" style="color:${m.fg}">${icon(m.icon,{size:14})}</span><div class="hist-body"><div class="hist-status">${m.label}${e.isAutomatic?' <span class="hist-auto">خودکار</span>':''}</div><div class="hist-meta">${who} · ${t}</div></div></div>`;
  }).join('');
  openModal(`<div class="bs-head"><div class="bs-title">تاریخچه‌ی رزرو</div><div class="bs-rest">${esc(r.name)} · کد ${r.code||'—'}</div></div><div class="hist-list">${rows||'<div style="color:var(--t3);text-align:center;padding:20px">رویدادی ثبت نشده</div>'}</div>`);
}
// ═══════════════════════════════════════════════════════════
//  لایه‌ی اتصال API (فاز ۳) — پنل رستوران
//  با توکن staff کار می‌کند. مثل اپ مشتری: تلاش API، fallback به نمونه.
// ═══════════════════════════════════════════════════════════
const API = {
  base: '',
  timeout: 8000,
  _token: null,                      // توکن staff (بعد از ورود مدیر/کارمند)
  _refresh: null,                    // توکن تمدید staff
  _refreshing: null,
  online: true,
  // نگه‌داری توکن staff: حافظه + localStorage (تا رفرش صفحه، کارمند را بیرون نیندازد)
  setToken(t){ this._token = t; try { if(t) localStorage.setItem('rz_biz_access', t); else localStorage.removeItem('rz_biz_access'); } catch {} },
  getToken(){ return this._token; },
  setRefresh(t){ this._refresh = t; try { if(t) localStorage.setItem('rz_biz_refresh', t); else localStorage.removeItem('rz_biz_refresh'); } catch {} },
  restoreSession(){
    try {
      this._token = localStorage.getItem('rz_biz_access')||null;
      this._refresh = localStorage.getItem('rz_biz_refresh')||null;
      this._restaurantId = localStorage.getItem('rz_biz_restaurant_id')||null;
    } catch {}
    return !!this._token;
  },
  // ── شعبه‌ی فعال (چندشعبه‌ای): هدر X-Restaurant-Id، بدون نیاز به ورود دوباره ──
  _restaurantId: null,
  setActiveRestaurant(id){ this._restaurantId = id||null; try { if(id) localStorage.setItem('rz_biz_restaurant_id', id); else localStorage.removeItem('rz_biz_restaurant_id'); } catch {} },
  getActiveRestaurant(){ return this._restaurantId; },
  async request(path, opts = {}, _retried = false){
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), this.timeout);
    try {
      const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
      if (this._token) headers['Authorization'] = `Bearer ${this._token}`;
      if (this._restaurantId) headers['X-Restaurant-Id'] = this._restaurantId;
      const res = await fetch(this.base + '/api/v1' + path, { ...opts, headers, signal: ctrl.signal });
      clearTimeout(timer);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        // ۴۰۱ روی توکن منقضی → یک‌بار refresh و تکرار درخواست
        if (res.status === 401 && this._refresh && !_retried && !path.startsWith('/auth/')) {
          if (await this._doRefresh()) return this.request(path, opts, true);
          this._onSessionExpired();
        }
        return { ok: false, status: res.status, error: data?.error || { message: `خطای ${res.status}` } };
      }
      return { ok: true, status: res.status, data };
    } catch (e) {
      clearTimeout(timer);
      return { ok: false, offline: true, error: { message: e.name === 'AbortError' ? 'زمان درخواست تمام شد' : 'اتصال به سرور برقرار نشد' } };
    }
  },
  async _doRefresh(){
    if (this._refreshing) return this._refreshing;
    this._refreshing = (async () => {
      try {
        const res = await fetch(this.base + '/api/v1/auth/refresh', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ refresh: this._refresh }) });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data?.access) { this.setToken(data.access); this.setRefresh(data.refresh); return true; }
        return false;
      } catch { return false; } finally { this._refreshing = null; }
    })();
    return this._refreshing;
  },
  _onSessionExpired(){ this.setToken(null); this.setRefresh(null); if (typeof onStaffSessionExpired === 'function') onStaffSessionExpired(); },
  get(path){ return this.request(path); },
  post(path, body){ return this.request(path, { method: 'POST', body: JSON.stringify(body || {}) }); },
  patch(path, body){ return this.request(path, { method: 'PATCH', body: JSON.stringify(body || {}) }); },
  chatList(){ return this.get('/restaurant/chats'); },
  chatMessages(id, after){ return this.get('/restaurant/chats/'+id+(after?('?after='+encodeURIComponent(after)):'')); },
  chatSend(id, body){ return this.post('/restaurant/chats/'+id, { body }); },
  delete(path){ return this.request(path, { method: 'DELETE' }); },
  // ── احراز هویت کارمند ──
  async requestStaffOtp(phone){ return this.post('/auth/staff/request', { phone }); },
  async verifyStaffOtp(phone, code){
    const res = await this.post('/auth/staff/verify', { phone, code });
    if (res.ok && res.data?.access) {
      this.setToken(res.data.access); this.setRefresh(res.data.refresh);
      // مجوزهای مؤثر از سرور — پنل بر اساس همین‌ها منو را محدود می‌کند.
      this.setPermissions(res.data.staff?.permissions || null);
    }
    return res;
  },
  // ── مجوزها ──
  // منبعِ حقیقت سرور است؛ این فقط برای پنهان‌کردنِ چیزی است که کاربر اجازه‌اش را ندارد،
  // نه یک سازوکارِ امنیتی. بک‌اند مستقلاً روی هر روت اعمال می‌کند.
  _perms: null,
  setPermissions(p){
    this._perms = p;
    try { p ? localStorage.setItem('rz_perms', JSON.stringify(p)) : localStorage.removeItem('rz_perms'); } catch {}
  },
  getPermissions(){
    if (this._perms) return this._perms;
    try { const raw = localStorage.getItem('rz_perms'); if (raw) this._perms = JSON.parse(raw); } catch {}
    return this._perms;
  },
  can(key){
    const p = this.getPermissions();
    // بدونِ اطلاعِ مجوز (آفلاین/دمو) چیزی را پنهان نمی‌کنیم؛ سرور تصمیم‌گیرِ نهایی است.
    if (!p) return true;
    return p[key] !== false;
  },
  async doLogout(){
    if (this._refresh) { await fetch(this.base + '/api/v1/auth/logout', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ refresh: this._refresh }) }).catch(() => {}); }
    this.setToken(null); this.setRefresh(null); this.setPermissions(null);
  },
  // ارسال پیامک کمپین یا winback
  async sendSms(payload){ return this.post('/restaurant/sms', payload); },
  // ── مدیریت میز (وصل به /restaurant/tables واقعی) ──
  listTables(){ return this.get('/restaurant/tables'); },
  createTable(body){ return this.post('/restaurant/tables', body); },
  updateTable(id, body){ return this.patch(`/restaurant/tables/${id}`, body); },
  deleteTable(id){ return this.delete(`/restaurant/tables/${id}`); },
  setTableState(id, state){ return this.patch(`/restaurant/tables/${id}/state`, { state }); },
  // ── هوش مشتری (RFM/CLV/AI) ──
  customers(qs){ return this.get('/restaurant/customers'+(qs?'?'+qs:'')); },
  customerDetail(userId){ return this.get('/restaurant/customers/'+encodeURIComponent(userId)); },
  rfm(){ return this.get('/restaurant/rfm'); },
  aiRecommendations(){ return this.get('/restaurant/ai'); },
  // ── ورود بدون رزرو (walk-in واقعی، با عضویت خودکار باشگاه) ──
  walkin(body){ return this.post('/restaurant/walkin', body); },
  // ── نظرات، گالری، یادداشت پرسنل، رویداد، تاریخچه‌ی کمپین (همه واقعی) ──
  reviews(qs){ return this.get('/restaurant/reviews'+(qs?'?'+qs:'')); },
  replyReview(id, reply){ return this.patch('/restaurant/reviews', { id, reply }); },
  photos(){ return this.get('/restaurant/photos'); },
  addPhoto(body){ return this.post('/restaurant/photos', body); },
  deletePhoto(id){ return this.delete('/restaurant/photos?id='+encodeURIComponent(id)); },
  notes(){ return this.get('/restaurant/notes'); },
  addNote(body){ return this.post('/restaurant/notes', body); },
  pinNote(id, pinned){ return this.patch('/restaurant/notes', { id, pinned }); },
  deleteNote(id){ return this.delete('/restaurant/notes?id='+encodeURIComponent(id)); },
  events(){ return this.get('/restaurant/events'); },
  addEvent(body){ return this.post('/restaurant/events', body); },
  updateEvent(body){ return this.patch('/restaurant/events', body); },
  deleteEvent(id){ return this.delete('/restaurant/events?id='+encodeURIComponent(id)); },
  campaignHistory(){ return this.get('/restaurant/campaigns'); },
  // ── لیست انتظار (وصل به /restaurant/waitlist واقعی) ──
  waitlistQueue(){ return this.get('/restaurant/waitlist'); },
  waitlistAnalytics(days){ return this.get('/restaurant/waitlist/analytics'+(days?'?days='+days:'')); },
  waitlistPromoteNext(){ return this.post('/restaurant/waitlist'); },
  // ── کارکنان و دسترسی (وصل به /restaurant/staff واقعی) ──
  staffList(){ return this.get('/restaurant/staff'); },
  staffUpdate(body){ return this.patch('/restaurant/staff', body); },
  // ── کوپن‌ها (وصل به /restaurant/coupons واقعی) ──
  couponsList(){ return this.get('/restaurant/coupons'); },
  couponCreate(body){ return this.post('/restaurant/coupons', body); },
  // ── اتوماسیونِ مارکتینگ (وصل به /restaurant/automations واقعی) ──
  automationsList(){ return this.get('/restaurant/automations'); },
  automationCreate(body){ return this.post('/restaurant/automations', body); },
  // ── ساعات کاری + تعطیلات (وصل به /restaurant/hours واقعی) ──
  hoursGet(){ return this.get('/restaurant/hours'); },
  hoursSave(body){ return this.request('/restaurant/hours', { method:'PUT', body: JSON.stringify(body||{}) }); },
  // ── چندشعبه‌ای: لیست شعبه‌ها + ساخت شعبه‌ی جدید ──

// ═══════════════════════════════════════════════════════════
//  آفلاین کامل — صف عملیات (Outbox) + همگام‌سازی خودکار
//  فلسفه: وقتی اینترنت نیست، هر عملیات محلی اجرا می‌شود (پرسنل بلافاصله
//  نتیجه را می‌بیند) و در صفی پایدار (localStorage) ذخیره می‌شود. با برگشت
//  اینترنت، صف به‌ترتیب به سرور فرستاده می‌شود. سرور — که با constraint ضد
//  رزرو دوبل محکم شده — منبع حقیقت نهایی است؛ اگر عملیاتی را رد کرد، به‌جای
//  گم‌شدن بی‌صدای داده، به پرسنل هشدار داده می‌شود تا خودش تصمیم بگیرد.
// ═══════════════════════════════════════════════════════════
const Outbox = {
  KEY: 'rz_biz_outbox',
  _queue: null,
  _syncing: false,

  // بارگذاری صف از حافظه‌ی پایدار
  load(){
    if(this._queue) return this._queue;
    try { this._queue = JSON.parse(localStorage.getItem(this.KEY) || '[]'); }
    catch { this._queue = []; }
    return this._queue;
  },
  _persist(){
    try { localStorage.setItem(this.KEY, JSON.stringify(this._queue || [])); } catch {}
    this._updateBadge();
  },
  count(){ return this.load().length; },

  // افزودن عملیات به صف. op = { type, path, method, body, label, localRef }
  enqueue(op){
    this.load();
    op.id = 'op_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
    op.queuedAt = Date.now();
    op.attempts = 0;
    this._queue.push(op);
    this._persist();
    return op.id;
  },

  // تلاش برای همگام‌سازی کل صف — به‌ترتیب، متوقف روی اولین خطای شبکه
  async sync(){
    if(this._syncing) return;
    if(!API.getToken()){ return; }          // بدون احراز هویت، sync معنی ندارد
    this.load();
    if(this._queue.length === 0) return;
    this._syncing = true;
    this._updateBadge('در حال همگام‌سازی...');
    const conflicts = [];
    let synced = 0;

    while(this._queue.length > 0){
      const op = this._queue[0];
      op.attempts = (op.attempts||0) + 1;
      let res;
      try {
        res = await API.request(op.path, { method: op.method || 'POST', body: op.body ? JSON.stringify(op.body) : undefined });
      } catch { res = { ok:false, offline:true }; }

      if(res.offline){
        // هنوز آفلاین — توقف، بعداً دوباره تلاش می‌کنیم (داده حفظ می‌شود)
        break;
      }
      if(res.ok){
        this._queue.shift(); synced++; this._persist();
        continue;
      }
      // سرور عملیات را رد کرد → تضاد. از صف خارج کن ولی برای هشدار نگه‌دار.
      conflicts.push({ op, error: res.error?.message || 'رد شد توسط سرور' });
      this._queue.shift(); this._persist();
    }

    this._syncing = false;
    this._updateBadge();
    // گزارش نتیجه به پرسنل
    if(synced > 0 && this._queue.length === 0 && conflicts.length === 0){
      toast('', `${fa(synced)} عملیات آفلاین با موفقیت همگام شد`);
    } else if(synced > 0){
      toast('', `${fa(synced)} عملیات همگام شد`);
    }
    if(conflicts.length > 0){ this._reportConflicts(conflicts); }
    // اگر view فعال است، تازه‌سازی کن تا وضعیت درست دیده شود
    if(synced>0 || conflicts.length>0) refreshActiveView();
  },

  // هشدار تضادها به پرسنل — تصمیم با انسان، نه گم‌شدن بی‌صدا
  _reportConflicts(conflicts){
    const list = conflicts.map(c => `<div style="padding:10px 12px;background:var(--amber-50);border-radius:10px;margin-bottom:8px;font-size:13px">
      <b>${esc(c.op.label||'عملیات')}</b><div style="color:var(--t2);margin-top:2px">${esc(c.error)}</div></div>`).join('');
    if(typeof openModal==='function'){
      openModal(`<div class="modal-title">${icon('alert',{size:18})} ${fa(conflicts.length)} عملیات نیاز به بررسی دارد</div>
        <div class="modal-sub">این عملیات‌ها هنگام آفلاین ثبت شدند ولی سرور نپذیرفت (احتمالاً میز یا زمان قبلاً پر شده). لطفاً دستی بررسی کن:</div>
        <div style="margin-top:14px">${list}</div>
        <button class="btn btn-primary btn-block" style="margin-top:8px" onclick="closeModal()">متوجه شدم</button>`);
    } else {
      toast('', `${fa(conflicts.length)} عملیات آفلاین رد شد — بررسی کن`);
    }
  },

  _updateBadge(customText){
    const el = document.getElementById('offlineBadge');
    if(!el) return;
    const n = this.count();
    if(customText){ el.textContent = customText; el.style.display='inline-flex'; return; }
    if(n > 0){ el.innerHTML = `${icon('clock',{size:13})} ${fa(n)} عملیات در انتظار همگام‌سازی`; el.style.display='inline-flex'; }
    else { el.style.display='none'; }
  },
};

// ── نشانگر وضعیت آنلاین/آفلاین ──
const Net = {
  online: navigator.onLine !== false,
  init(){
    window.addEventListener('online', ()=>this._set(true));
    window.addEventListener('offline', ()=>this._set(false));
    this._render();
    // با شروع، اگر آنلاینیم و صف داریم، sync کن
    if(this.online) setTimeout(()=>Outbox.sync(), 1500);
  },
  _set(on){
    this.online = on;
    this._render();
    if(on){
      toast('','اینترنت برگشت — در حال همگام‌سازی...');
      Outbox.sync();
    } else {
      toast('','اینترنت قطع شد — اپ در حالت آفلاین کار می‌کند');
    }
  },
  _render(){
    let bar = document.getElementById('netBar');
    if(!bar){
      bar = document.createElement('div');
      bar.id = 'netBar';
      document.body.appendChild(bar);
    }
    if(this.online){ bar.className=''; bar.style.display='none'; }
    else {
      bar.className='net-offline';
      bar.innerHTML='<span class="net-dot"></span>حالت آفلاین — کارها محلی ذخیره می‌شوند و با برگشت اینترنت همگام می‌شوند';
      bar.style.display='flex';
    }
  },
};
// نشانه: آیا الان باید آفلاین رفتار کنیم؟
function isOffline(){ return !Net.online; }
// تازه‌سازی view فعال (بعد از sync)
function refreshActiveView(){

  if(!active) return;
  const v = active.id.replace('v-','');
  ({overview:rOverview,reservations:rReservations,waitlist:rWaitlist,floor:rFloor,profile:rProfile,customers:rCustomers,loyalty:rLoyalty,marketing:rMarketing,analytics:rAnalytics,cashback:rCashback,staff:rStaff,pricing:rPricing})[v]?.();
}
// ── Heartbeat: به سرور می‌گوید این رستوران آنلاین است ──
// تا وقتی پنل به اینترنت وصل است، هر ۳۰ ثانیه یک سیگنال می‌فرستد. اگر اینترنت
// قطع شود، سیگنال نمی‌رسد و سرور بعد از ~۹۰ ثانیه رستوران را از اپ مشتری پنهان
// می‌کند (تا رزرو آنلاینِ متضاد ثبت نشود). رزرو حضوری/تلفنی در پنل ادامه دارد.
const Heartbeat = {
  _timer: null,
  start(){
    if(this._timer) return;
    const beat = async ()=>{
      if(!API.getToken() || isOffline()) return;   // بدون توکن یا آفلاین، ارسال بی‌فایده
      await API.post('/restaurant/heartbeat', {}).catch(()=>{});
    };
    beat();                                  // فوری یک‌بار
    this._timer = setInterval(beat, 30_000); // بعد هر ۳۰ ثانیه
  },
  stop(){ if(this._timer){ clearInterval(this._timer); this._timer=null; } },
};

// تبدیل تاریخ ISO به نمایش نسبی فارسی ساده
function faRelative(iso){
  const d=new Date(iso),now=new Date();
  const days=Math.floor((now-d)/86400000);
  if(days<1)return'امروز';
  if(days<7)return fa(days)+' روز پیش';
  if(days<30)return fa(Math.floor(days/7))+' هفته پیش';
  return fa(Math.floor(days/30))+' ماه پیش';
}

  if(apiStatus==='cancelled_by_user'||apiStatus==='cancelled_by_restaurant')return'cancelled';

}

function dateCategoryOf(slotStart){
  const d=new Date(slotStart),now=new Date();
  const startToday=new Date(now);startToday.setHours(0,0,0,0);
  const endToday=new Date(startToday);endToday.setDate(endToday.getDate()+1);
  const endTomorrow=new Date(endToday);endTomorrow.setDate(endTomorrow.getDate()+1);
  if(d<startToday)return'past';
  if(d<endToday)return'today';
  if(d<endTomorrow)return'tomorrow';
  return'upcoming';
}

const VIEW_PERMISSION = {
  reservations: 'canManageReservations',
  chat:         'canManageReservations',
  waitlist:     'canManageWaitlist',
  floor:        'canManageTables',
  profile:      'canManageSettings',
  cashback:     'canManageSettings',
  pricing:      'canManageSettings',
  marketing:    'canManageCampaigns',
  customers:    'canViewAnalytics',

  staff:        'canManageStaff',
  // overview همیشه در دسترس است (داشبوردِ پایه).
};

function canAccessView(v){
  const key = VIEW_PERMISSION[v];
  return !key || (typeof API !== 'undefined' && API.can ? API.can(key) : true);
}

/** آیتم‌های منویی که کاربر اجازه‌شان را ندارد پنهان می‌شوند. پس از ورود صدا زده می‌شود. */
function applyPermissionsToNav(){
  document.querySelectorAll('.sb-item').forEach(btn => {
    const v = btn.dataset.v;
    if (!v) return;
    const ok = canAccessView(v);
    btn.hidden = !ok;
    btn.setAttribute('aria-hidden', String(!ok));
    btn.tabIndex = ok ? 0 : -1;
  });
}

  // دفاعِ لایه‌ی دوم: حتی اگر کسی دکمه را دور بزند، به صفحه‌ی بدونِ مجوز نمی‌رود.

// ═══ رزرونو — پنل business: داشبورد Enterprise + به‌روزرسانی زنده (Vanilla JS، بدون build، scope مشترک) ═══
function rOverview(){
  // ═══════════ داشبورد Enterprise — مرکز فرماندهی ═══════════
  renderEnterpriseDashboard();
}

// ── لایه‌ی درآمد (آماده‌ی اتصال به API صندوق) ──
// نکته: سیستم صندوق جداست و هنوز API نمی‌دهد. این لایه فعلاً تخمین واقع‌گرایانه
// می‌زند؛ وقتی API صندوق آماده شد، فقط fetchRevenue را به آن وصل کن.
const REVENUE_CONFIG = {
  connected: false,                    // وقتی API صندوق وصل شد → true
  avgPerGuest: 850_000,                // میانگین خرید هر نفر (تومان) — تخمین پایه
  vipMultiplier: 1.8,                  // مشتری VIP بیشتر خرج می‌کند
  preorderMultiplier: 1.25,            // پیش‌سفارش = خرید بیشتر
};
// تخمین خرید یک رزرو (تا وقتی صندوق وصل نشده)
function estimateSpend(r){
  let base = REVENUE_CONFIG.avgPerGuest * r.party;
  if(r.seg==='vip') base *= REVENUE_CONFIG.vipMultiplier;
  if(r.pre) base *= REVENUE_CONFIG.preorderMultiplier;
  return Math.round(base);
}
// درآمد امروز (از رزروهای حاضر/تکمیل‌شده)
function calcRevenue(reservations){
  const realized = reservations.filter(r=>['arrived','seated','dining','completed','checked_in'].includes(r.status));
  const total = realized.reduce((s,r)=>s+estimateSpend(r),0);
  const guests = realized.reduce((s,r)=>s+r.party,0);
  return { total, guests, avgPerGuest: guests?Math.round(total/guests):0, count: realized.length };
}
// قالب‌بندی پول (تومان → خوانا)
function fmtMoney(t){
  if(t>=1_000_000) return fa(+(t/1_000_000).toFixed(1))+'م';
  if(t>=1000) return fa(Math.round(t/1000))+'ک';
  return fa(t);
}

// ── محاسبه‌ی KPIهای کلیدی امروز ──
function calcTodayKPIs(){
  syncTablesFromReservations();
  const today = RES.filter(r=>r.date==='today');
  const arrived = today.filter(r=>['arrived','seated','dining','checked_in'].includes(r.status));
  const expected = today.filter(r=>['confirmed','auto_confirmed','preparing'].includes(r.status));
  const noShows = today.filter(r=>r.status==='no_show'||r.status==='noshow');
  const peopleSeated = arrived.reduce((s,r)=>s+r.party,0);
  const peopleReserved = today.reduce((s,r)=>s+r.party,0);
  const seatedTables = TABLES.filter(t=>t.s==='seated').length;
  const totalTables = TABLES.length;
  const rev = calcRevenue(today);
  return {
    todayCount: today.length,
    arrivedCount: arrived.length,
    expectedCount: expected.length,
    expectedGuests: expected.reduce((s,r)=>s+r.party,0),
    noShowCount: noShows.length,
    noShowRate: today.length?Math.round((noShows.length/today.length)*100):0,
    peopleSeated, peopleReserved,
    occupancyPct: totalTables?Math.round((seatedTables/totalTables)*100):0,
    seatedTables, totalTables,
    revenue: rev.total, avgSpend: rev.avgPerGuest, revenueGuests: rev.guests,
  };
}
function focusSearch(){nav('reservations');setTimeout(()=>{const el=document.getElementById('resSearch');if(el)el.focus()},300)}
// متن بینش هوشمند داشبورد — از KPIهای واقعی ساخته می‌شود
function dashAiInsight(){
  const k = calcTodayKPIs();
  const waiting = WAITLIST.filter(w=>w.status==='waiting').length;
  const freeTables = Math.max(0, k.totalTables - k.seatedTables);
  const parts = [];
  if(freeTables>0) parts.push(`<b>${fa(freeTables)} میز خالی</b> داری`);
  if(waiting>0) parts.push(`<b>${fa(waiting)} نفر</b> توی صف منتظرن`);
  if(k.noShowRate>15) parts.push(`نرخ نوشو امشب <b>${fa(k.noShowRate)}٪</b>ه — برای رزروهای پرریسک یادآوری بفرست`);
  if(parts.length===0) return 'همه‌چیز مرتبه — سالن پره و صف خالیه. برای پر نگه‌داشتن روزهای آینده، به مشتریان وفادار کش‌بک بده.';
  let msg = parts.join(' و ') + '. ';
  if(freeTables>0) msg += 'یک پیام کش‌بک به مشتریان وفاداری که این هفته نیامده‌اند بفرست تا میزهای خالی پر شود.';
  return msg;
}

// ── ساعات پیک (نمودار میله‌ای) ──
function renderPeakChart(){
  const hours={};
  RES.filter(r=>r.date==='today'||r.date==='past').forEach(r=>{
    const h=parseInt(String(r.t).replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d)).split(':')[0]);
    if(!isNaN(h)) hours[h]=(hours[h]||0)+1;
  });
  const slots=[12,13,14,18,19,20,21,22];
  const max=Math.max(1,...slots.map(h=>hours[h]||0));
  document.getElementById('peakChart').innerHTML=slots.map(h=>{
    const c=hours[h]||0; const pct=Math.round((c/max)*100);
    const peak=c===max&&c>0;
    return `<div class="peak-col"><div class="peak-bar-wrap"><div class="peak-bar ${peak?'peak-hot':''}" style="height:0" data-h="${pct}"></div></div><div class="peak-hour">${fa(h)}</div></div>`;
  }).join('');
  setTimeout(()=>{document.querySelectorAll('.peak-bar').forEach(b=>b.style.height=Math.max(4,b.dataset.h)+'%')},300);
}

  ];

  days.forEach((d,di)=>{
    html+=`<div class="hm-day-lbl">${d}</div>`;
    slots.forEach((s,si)=>{ html+=`<div class="hm-cell hm-${data[di][si]}" title="${d} ${s}"></div>`; });

// تولید تاریخ‌های شمسی تا ۱ ماه آینده (نمونه: از پنجشنبه ۱۵ خرداد)
function buildDateOptions(){
  const weekdays=['شنبه','یکشنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنجشنبه','جمعه'];
  const months=['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
  const monthLen=[31,31,31,31,31,31,30,30,30,30,30,29];
  // شروع: پنجشنبه ۱۵ خرداد (ماه index 2)، پنجشنبه = index 5 در weekdays
  let day=15, mon=2, wd=5;
  let opts='';
  for(let i=0;i<=30;i++){
    const label=`${weekdays[wd]} ${fa(day)} ${months[mon]}`;
    const val=i===0?'today':i===1?'tomorrow':'d'+i;
    const prefix=i===0?'امروز — ':i===1?'فردا — ':'';
    opts+=`<option value="${val}" data-label="${label}">${prefix}${label}</option>`;
    // پیش‌رفتن یک روز
    wd=(wd+1)%7;
    day++;
    if(day>monthLen[mon]){day=1;mon=(mon+1)%12}
  }
  return opts;
}
// تبدیل مقدار تاریخ پنل (today/tomorrow/dN) و ساعت فارسی به فرمت ISO که بک‌اند می‌خواهد
function manualDateToISO(dateVal, faTime){
  const now=new Date();
  let offset=0;
  if(dateVal==='tomorrow')offset=1;
  else if(/^d\d+$/.test(dateVal))offset=parseInt(dateVal.slice(1))||0;
  const t=new Date(now); t.setDate(now.getDate()+offset);
  const iso=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
  const time=String(faTime||'').replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d)).trim()||'20:00';
  return {date:iso,time};
}

function walkinCheckinMember(){if(window._walkinMember){walkinCheckinReal(window._walkinMember.phone,null,null,null)}}
// ثبت واقعی ورود — وصل به POST /restaurant/walkin (پیدا/ساخت کاربر + عضویت باشگاه + رزرو seated + اشغال میز)
async function walkinCheckinReal(phone,firstName,lastName,birthDayMonth){
  const party=+(document.querySelector('.wparty-group .opt.sel')?.dataset.p||2);
  const tableId=document.getElementById('wTable')?.value||null;
  const btn=document.getElementById('wConfirmBtn');
  if(btn){btn.disabled=true;btn.textContent='در حال ثبت...';}
  const body={phone,party_size:party,table_id:tableId||undefined};
  if(firstName){body.first_name=firstName;body.last_name=lastName||'';}
  if(birthDayMonth){body.birth_day=birthDayMonth[0];body.birth_month=birthDayMonth[1];}
  const res=await API.walkin(body);
  if(!res.ok){
    // آفلاین → محلی ثبت کن و برای همگام‌سازی صف کن (واک‌این نباید در قطعی اینترنت بخوابد)
    if(res.offline){
      const nm=(firstName?firstName+(lastName?' '+lastName:''):'مهمان واک‌این');
      const localRec={t:new Date().toLocaleTimeString('fa-IR',{hour:'2-digit',minute:'2-digit'}),name:nm,party,table:tableId||null,status:'arrived',seg:'new',pre:false,note:'واک‌این (آفلاین)',phone,date:'today',dLabel:'امروز'};
      RES.push(localRec);
      if(API.getToken()){
        Outbox.enqueue({ type:'walkin', path:'/restaurant/walkin', method:'POST', body, label:`واک‌این ${nm}${tableId?' · میز':''}`, localRef:localRec });
      }
      closeModal();
      if(document.getElementById('v-overview').classList.contains('active'))rOverview();
      else if(document.getElementById('v-floor').classList.contains('active'))rFloor();
      toast('',`${nm} محلی ثبت شد — با برگشت اینترنت همگام می‌شود`);
      return;
    }
    toast('',res.error?.message||'ثبت ورود ناموفق بود');
    if(btn){btn.disabled=false;btn.textContent='ثبت ورود';}
    return;
  }
  closeModal();
  // داده‌های واقعی رو دوباره بکش (باشگاه، میزها، رزروهای امروز)
  await Promise.all([loadTables(), loadClubMembers().then(c=>CLUB=c)]);
  if(document.getElementById('v-overview').classList.contains('active'))rOverview();
  else if(document.getElementById('v-reservations').classList.contains('active')){resDate='today';rReservations()}
  else if(document.getElementById('v-floor').classList.contains('active'))rFloor();
  toast('',`${res.data.name} ثبت ورود شد${tableId?' · میز اختصاص یافت':''}`);
  if(res.data.enrolled_now) setTimeout(()=>toast('',`عضو باشگاه شد (${res.data.club_code})`),900);
}
async function walkinNewSave(rawPhone){
  const fn=document.getElementById('wFn').value.trim();
  const ln=document.getElementById('wLn').value.trim();
  if(!fn){toast('','حداقل نام رو وارد کن');return}
  const bd=document.getElementById('wBd').value;
  const bm=document.getElementById('wBm').value;
  await walkinCheckinReal(rawPhone,fn,ln,(bd&&bm)?[bd,bm]:null);
}

async function saveManual(){
  const n=document.getElementById('mName').value.trim();
  if(!n){toast('','نام مهمان رو وارد کن');return}
  const phone=document.getElementById('mPhone').value;
  const dateSel=document.getElementById('mDate');
  const dateVal=dateSel.value;
  const opt=dateSel.options[dateSel.selectedIndex];
  const dLabel=opt.dataset.label||opt.text.replace(/^(امروز|فردا)\s*—\s*/,'').trim();
  const dateKey=(dateVal==='today'||dateVal==='tomorrow')?dateVal:'upcoming';
  const timeVal=document.getElementById('mTime').value;
  const partyVal=+document.getElementById('mParty').value.replace(/[^\d]/g,'')||2;
  const tableVal=+document.getElementById('mTable').value.replace(/[^\d]/g,'')||1;

  // اگر توکن staff داریم، رزرو واقعی در دیتابیس ثبت کن
  if(API.getToken()){
    const dt=manualDateToISO(dateVal,timeVal);
    const res=await API.post('/reservations',{
      restaurant_id:STAFF_INFO?.restaurant_id||undefined,
      date:dt.date,time:dt.time,party_size:partyVal,notify_sms:!!phone,
      guest:{name:n,phone:phone,table_number:tableVal,note:'رزرو دستی'},
    });
    if(res.ok){
      // موفق در سرور — به‌علاوه‌ی نمایش محلی
      RES.push({t:timeVal,name:n,party:partyVal,table:tableVal,status:'confirmed',seg:'new',pre:false,note:'رزرو دستی',phone,date:dateKey,dLabel,code:res.data?.reservation?.code});
      const clubBefore=CLUB.length;
      CLUB=await loadClubMembers(); // وضعیت واقعی باشگاه رو از سرور بگیر، حدس نزن
      const newlyEnrolled=CLUB.length>clubBefore;
      closeModal();resDate=dateKey;
      if(document.getElementById('v-reservations').classList.contains('active'))rReservations();
      else if(document.getElementById('v-overview').classList.contains('active'))rOverview();
      toast('',`رزرو ${dLabel} در سیستم ثبت شد${newlyEnrolled?` + ${n} به باشگاه اضافه شد`:''}`);
      return;
    }
    if(!res.offline){toast('',res.error?.message||'ثبت رزرو ناموفق بود');return;}
    // اگر offline، می‌افتد به مسیر محلی پایین
  }

  // مسیر محلی (آفلاین یا بدون توکن) — fallback
  const localRec={t:timeVal,name:n,party:partyVal,table:tableVal,status:'confirmed',seg:'new',pre:false,note:'رزرو دستی',phone,date:dateKey,dLabel};
  RES.push(localRec);
  // اگر آفلاین بودیم (نه فقط بدون توکن)، عملیات را برای همگام‌سازی بعدی صف کن
  if(isOffline() && API.getToken()){
    Outbox.enqueue({
      type:'reservation', path:'/reservations', method:'POST',
      body:{ restaurant_id:'self', date:dateKey, time:timeVal, party_size:partyVal, guest:{name:n,phone:phone.replace(/\s/g,'')} },
      label:`رزرو ${n} · ${dLabel} ${timeVal}`, localRef:localRec,
    });
  }
  const res=enrollClub(n,phone);
  closeModal();
  resDate=dateKey;
  if(document.getElementById('v-reservations').classList.contains('active'))rReservations();
  else if(document.getElementById('v-overview').classList.contains('active'))rOverview();
  if(res.enrolled){
    toast('',`رزرو ${dLabel} ثبت شد + ${n} به باشگاه اضافه شد (${res.member.code})`);
  }else if(res.reason==='exists'){
    toast('',`رزرو ${dLabel} ثبت شد · ${n} قبلاً عضو باشگاهه`);
  }else{
    toast('',`رزرو ${dLabel} ثبت شد`);
  }
}

// ═══════════ FLOOR PLAN ═══════════
// هماهنگ‌سازی وضعیت میزها با رزروهای فعال امروز
// میزی که رزرو «تأییدشده»ی امروز داره → reserved (اگه دستی seated نشده باشه)
// میزی که مهمانش «رسیده» → seated
function syncTablesFromReservations(){
  const todayRes=RES.filter(r=>r.date==='today'&&r.table>0&&(r.status==='confirmed'||r.status==='arrived'));
  TABLES.forEach(t=>{
    // اگه دستی روی این میز وضعیت seated گذاشته شده و رزروی نیست، دست نزن
    const res=todayRes.find(r=>r.table===t.n);
    if(res){
      // رزرو فعال داره
      if(res.status==='arrived')t.s='seated';
      else if(t.s!=='seated')t.s='reserved'; // اگه قبلاً نشسته نشده، رزرو
      t._guest=res.name; // نام مهمان برای نمایش
      t._time=res.t;
    }else{
      // رزرو فعالی روی این میز نیست — اطلاعات مهمان رو پاک کن
      delete t._guest;delete t._time;
      // اگه قبلاً reserved بوده ولی دیگه رزرو نداره، آزادش کن (مگه دستی seated شده)
      if(t.s==='reserved')t.s='free';
    }
  });
}

<script data-src="/js/waitlist.js">
// ═══ رزرونو — پنل business: داشبورد لیست انتظار (Vanilla JS، بدون build، scope مشترک) ═══
// داده‌ی دمو فقط fallbackِ آفلاین است (وقتی توکن نیست یا سرور در دسترس نیست)؛
// وقتی آنلاین باشیم، rWaitlist صف و آمار واقعی را از بک‌اند می‌گیرد.
const WL_DEMO_QUEUE=[
  {id:'w1',name:'سارا محمدی',phone:'۰۹۱۲۱۱۱۲۲۳۳',party_size:2,is_vip:true,status:'waiting',waited_minutes:8,estimated_wait_minutes:15,priority:100},
  {id:'w2',name:'علی رضایی',phone:'۰۹۱۲۲۲۲۳۳۴۴',party_size:4,is_vip:false,status:'waiting',waited_minutes:12,estimated_wait_minutes:30,priority:0},
  {id:'w3',name:'مریم کریمی',phone:'۰۹۱۲۳۳۳۴۴۵۵',party_size:3,is_vip:false,status:'waiting',waited_minutes:5,estimated_wait_minutes:35,priority:20},
];
const WL_DEMO_ANALYTICS={total_entries:142,seated:98,abandoned:31,conversion_rate:69,avg_wait_minutes:22,current_queue_size:3,vip_entries:18};
let WAITLIST=WL_DEMO_QUEUE.slice();
let WL_ANALYTICS={...WL_DEMO_ANALYTICS};
let _wlLoaded=false;

// بارگذاری صف + آمار واقعی از بک‌اند (موازی). در صورت خطا، fallback به دمو می‌ماند.
async function loadWaitlist(){
  if(!API.getToken()) return; // آفلاین/دمو → همان داده‌ی دمو
  const [q,a]=await Promise.all([API.waitlistQueue(),API.waitlistAnalytics()]);
  if(q.ok && Array.isArray(q.data?.queue)) WAITLIST=q.data.queue;
  if(a.ok && a.data) WL_ANALYTICS=a.data;
  _wlLoaded=true;
}

function rWaitlist(){
  // اولین ورود به صفحه با توکن → داده‌ی واقعی بگیر و دوباره رندر کن
  if(!_wlLoaded && API.getToken()){ loadWaitlist().then(()=>rWaitlist()); }
  const A=WL_ANALYTICS;

  document.getElementById('v-waitlist').innerHTML=`
    <!-- آمار لیست انتظار -->

      <div class="wl-stat"><div class="wl-stat-ic" style="background:var(--blue-50)">${icon('inbox',{size:16})}</div><div><div class="wl-stat-num">${fa(A.current_queue_size)}</div><div class="wl-stat-lbl">در صف الان</div></div></div>

      <div class="wl-stat"><div class="wl-stat-ic" style="background:#FEF3C7">${icon('clock',{size:16})}</div><div><div class="wl-stat-num">${fa(A.avg_wait_minutes)}<span style="font-size:13px"> دق</span></div><div class="wl-stat-lbl">میانگین انتظار</div></div></div>
      <div class="wl-stat"><div class="wl-stat-ic" style="background:#Fce7f3">${icon('star',{size:16,fill:true})}</div><div><div class="wl-stat-num">${fa(A.vip_entries)}</div><div class="wl-stat-lbl">مهمان VIP</div></div></div>
    </div>

    <div class="wl-q-head">
      <div class="wl-q-title">صف انتظار <span class="wl-q-count">${fa(queue.length)} نفر</span></div>
      <button class="btn btn-primary btn-sm" onclick="promoteNextWL()">${icon('arrowR',{size:15})} آفر به نفر بعدی</button>
    </div>

    <div class="wl-queue">
      ${queue.length?queue.map((w,i)=>wlCard(w,i)).join(''):`<div class="empty-state"><div class="empty-state-icon">${icon('checkCircle',{size:38})}</div><div class="empty-state-desc">صف خالی است</div></div>`}
    </div>`;
}
function wlCard(w,i){
  const isOffered=w.status==='offered';
  return `<div class="wl-card ${isOffered?'offered':''} ${w.is_vip?'vip':''}">
    <div class="wl-card-pos">${isOffered?icon('bell',{size:16}):fa(i+1)}</div>
    <div class="wl-card-body">
      <div class="wl-card-name">${esc(w.name)} ${w.is_vip?`<span class="wl-vip-tag">${icon('star',{size:11,fill:true})} VIP</span>`:''}</div>
      <div class="wl-card-meta">${icon('users',{size:13})} ${fa(w.party_size)} نفر · ${icon('clock',{size:13})} ${fa(w.waited_minutes)} دقیقه منتظر · تخمین ${fa(w.estimated_wait_minutes)} دقیقه</div>
      ${isOffered?'<div class="wl-card-offered">میز آفر شد — منتظر پاسخ</div>':''}
    </div>
    <div class="wl-card-actions">
      ${!isOffered?`<button class="btn btn-teal btn-sm" onclick="offerWLSeat('${w.id}')">آفر میز</button>`:''}
      <button class="btn btn-ghost btn-sm" onclick="removeWL('${w.id}')">حذف</button>
    </div>
  </div>`;
}
async function promoteNextWL(){
  const next=WAITLIST.filter(w=>w.status==='waiting').sort((a,b)=>(b.priority-a.priority)||0)[0];
  if(!next){toast('','صف خالی است');return;}
  // آنلاین → بک‌اند خودش نفر اول را انتخاب و میز تخصیص می‌دهد (منطق مرکزی promoteNext)
  if(!isOffline() && API.getToken()){
    const res=await API.waitlistPromoteNext();
    if(res.ok && res.data?.promoted){
      toast('',`میز به نفر بعدی آفر شد${res.data.table?` (میز ${fa(res.data.table)})`:''}`);
      await loadWaitlist(); rWaitlist();
      if(document.getElementById('v-overview')?.classList.contains('active')) renderEnterpriseDashboard();
    }else{
      toast('','میز آزادی برای آفر پیدا نشد');
    }
    return;
  }
  offerWLSeat(next.id);
}
async function offerWLSeat(id){
  const w=WAITLIST.find(x=>x.id===id);if(!w)return;
  w.status='offered';
  rWaitlist();
  // اگر داشبورد فعال است، ستون لیست انتظار زنده را هم تازه کن
  if(document.getElementById('v-overview')?.classList.contains('active')) renderEnterpriseDashboard();
  toast('',`میز به ${w.name} آفر شد`);
  // آفلاین → صف کن؛ آنلاین → مستقیم به بک‌اند و بازخوانی صف واقعی
  if(isOffline() && API.getToken()){
    Outbox.enqueue({ type:'waitlist_offer', path:'/restaurant/waitlist', method:'POST', body:{ action:'offer', entry_id:id }, label:`آفر میز به ${w.name}` });
    return;
  }
  if(API.getToken()){ await API.waitlistPromoteNext().catch(()=>{}); await loadWaitlist(); rWaitlist(); }
}
async function removeWL(id){
  WAITLIST=WAITLIST.filter(w=>w.id!==id);
  rWaitlist();
  toast('','از صف حذف شد');
}

            ${t._guest?`<span class="t-guest">${esc(t._guest.length>10?t._guest.slice(0,9)+'…':t._guest)}</span><span class="t-time">${t._time}</span>`:`<span class="t-cap">${fa(t.c)} نفره</span>`}

}
let floorEdit=false;
function toggleFloorEdit(){floorEdit=!floorEdit;rFloor()}
// برچسب میز: اگر اسم دلخواه داشت اسم، وگرنه «میز {شماره}»
function tableLabel(t){ return t.name && t.name.trim() ? t.name.trim() : 'میز '+fa(t.n); }

// افزودن میز — با انتخاب ظرفیت و اسم دلخواه اختیاری
function addTable(){
  const nextNum=TABLES.length?Math.max(...TABLES.map(t=>t.n))+1:1;
  openModal(`
    <div class="modal-title">افزودن میز جدید</div>
    <div class="modal-sub">ظرفیت و (در صورت تمایل) یک اسم دلخواه بذار</div>
    <div class="field-label">تعداد نفرات</div>
    <div class="opt-row" id="capPick">
      ${[2,4,6,8,10].map((c,idx)=>`<div class="opt ${idx===1?'sel':''}" onclick="document.querySelectorAll('#capPick .opt').forEach(o=>o.classList.remove('sel'));this.classList.add('sel')" data-cap="${c}">${fa(c)} نفره</div>`).join('')}
    </div>
    <div class="field-label" style="margin-top:14px">اسم دلخواه <span style="color:var(--t3);font-weight:400">(اختیاری — مثل «میز پنجره»، «تراس»)</span></div>
    <input class="inp" id="newTableName" placeholder="میز ${fa(nextNum)}" style="width:100%">
    <button class="btn btn-primary btn-block" style="margin-top:16px" onclick="confirmAddTable(${nextNum})">افزودن میز</button>
    <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="closeModal()">انصراف</button>
  `);
  setTimeout(()=>document.getElementById('newTableName')?.focus(),150);
}
async function confirmAddTable(num){
  const cap=parseInt(document.querySelector('#capPick .opt.sel')?.dataset.cap||4);
  const name=(document.getElementById('newTableName')?.value||'').trim();
  const res = await API.createTable({ number: num, capacity: cap, name: name||undefined });
  if(!res.ok){ toast('', res.error?.message||'افزودن میز ناموفق بود'); return; }
  await loadTables();
  closeModal();rFloor();
  toast('',`${name||'میز '+fa(num)} (${fa(cap)} نفره) اضافه شد`);
}

// حذف میز — با تأیید + امکان بازگردانی
let lastRemoved=null;
function removeTable(i){
  const t=TABLES[i];
  if(t.s!=='free'){
    openModal(`
      <div style="text-align:center">
        <div style="width:56px;height:56px;border-radius:14px;background:var(--amber-50);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--warning)">${icon('alert',{size:26})}</div>
        <div class="modal-title" style="text-align:center">${esc(tableLabel(t))} ${t.s==='seated'?'مهمان نشسته داره':'رزرو داره'}</div>
        <div class="modal-sub" style="text-align:center">این میز خالی نیست. مطمئنی می‌خوای حذفش کنی؟</div>
        <button class="btn btn-danger btn-block" onclick="doRemoveTable(${i})">بله، حذف کن</button>
        <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="closeModal()">انصراف</button>
      </div>`);
    return;
  }
  doRemoveTable(i);
}
async function doRemoveTable(i){
  const t=TABLES[i];
  const res = await API.deleteTable(t.id);
  if(!res.ok){ closeModal(); toast('', res.error?.message||'حذف ناموفق بود — احتمالاً رزرو فعال داره'); return; }
  lastRemoved={table:t,idx:i};
  await loadTables();
  closeModal();rFloor();
  toastUndo(`میز ${fa(lastRemoved.table.n)} حذف شد`,'undoRemoveTable');
}
async function undoRemoveTable(){
  if(!lastRemoved)return;
  const t=lastRemoved.table;
  const res = await API.createTable({ number:t.n, capacity:t.c, name:t.name });
  if(!res.ok){ toast('','برگردوندن میز ناموفق بود — شاید شماره‌ش گرفته شده'); lastRemoved=null; return; }
  lastRemoved=null;
  await loadTables();rFloor();toast('','برگردانده شد');
}

// تغییر وضعیت میز — با انتخاب صریح و تأیید (نه چرخش تصادفی)
let pendingTable=null;
function openTableSheet(i){
  pendingTable=i;
  const t=TABLES[i];
  const opts=[
    ['free','var(--green)','آزاد','میز خالی و آماده‌ی پذیرش'],
    ['reserved','var(--blue)','رزروشده','میز رزرو شده، مهمان نیومده'],
    ['seated','var(--amber)','نشسته','مهمان سر میز نشسته']
  ];
  openModal(`
    <div class="modal-title">${esc(tableLabel(t))} <span style="font-weight:400;color:var(--t2);font-size:14px">· ${fa(t.c)} نفره</span></div>
    <div class="modal-sub">وضعیت میز رو انتخاب کن، بعد تأیید بزن</div>
    <div class="tbl-actions" id="tblOpts">
      ${opts.map(([s,col,name,desc])=>`
        <div class="tbl-act ${t.s===s?'sel':''}" data-s="${s}" onclick="document.querySelectorAll('#tblOpts .tbl-act').forEach(o=>o.classList.remove('sel'));this.classList.add('sel')">
          <span class="ta-dot" style="background:${col}"></span>
          <div class="ta-txt"><div class="ta-name">${name}</div><div class="ta-desc">${desc}</div></div>
          <span class="ta-check">${icon('check',{size:13})}</span>
        </div>`).join('')}
    </div>
    <div class="field-label" style="margin-top:14px">اسم میز <span style="color:var(--t3);font-weight:400">(اختیاری)</span></div>
    <input class="inp" id="tblRename" value="${esc(t.name||'')}" placeholder="میز ${fa(t.n)}" style="width:100%">
    <button class="btn btn-primary btn-block" style="margin-top:14px" onclick="confirmTableStatus()">تأیید تغییر</button>
    <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="closeModal()">انصراف</button>
  `);
}
async function confirmTableStatus(){
  if(pendingTable===null)return;
  const sel=document.querySelector('#tblOpts .tbl-act.sel');
  if(!sel)return;
  const i=pendingTable;
  const t=TABLES[i];
  const newS=sel.dataset.s, old=t.s;
  const newName=(document.getElementById('tblRename')?.value||'').trim();
  const oldName=t.name||'';
  const nameChanged=newName!==oldName;
  if(newS===old && !nameChanged){closeModal();return}

  if(nameChanged){
    const res=await API.updateTable(t.id,{name:newName||null});
    if(!res.ok){toast('',res.error?.message||'تغییر نام ناموفق بود');return;}
  }
  if(newS!==old){
    const res=await API.setTableState(t.id, UI2BK_STATE[newS]);
    if(!res.ok){toast('',res.error?.message||'تغییر وضعیت ناموفق بود');return;}
  }
  await loadTables();
  pendingTable=null;
  closeModal();
  if(document.getElementById('v-overview').classList.contains('active'))rOverview();
  else rFloor();
  const names={free:'آزاد',reserved:'رزروشده',seated:'نشسته'};
  if(newS!==old) toast('',`${tableLabel(t)} → ${names[newS]}`);
  else toast('',`اسم میز به «${esc(newName||tableLabel(t))}» تغییر کرد`);
}
function toastUndo(msg,undoFn){
  const t=document.getElementById('toast');
  document.getElementById('toastIcon').innerHTML=icon('close',{size:16});
  document.getElementById('toastMsg').innerHTML=msg+` <button class="undo-btn" onclick="${undoFn}();document.getElementById('toast').classList.remove('show')">بازگردانی</button>`;
  t.classList.add('show','with-undo');
  clearTimeout(tt);tt=setTimeout(()=>{t.classList.remove('show','with-undo')},5000);
}

</script>

    'linear-gradient(135deg,#34D399,#059669)',
    'linear-gradient(135deg,#2563EB,#14B8A6)',
    'linear-gradient(135deg,#F59E0B,#EF4444)',
    'linear-gradient(135deg,#8B5CF6,#EC4899)',
    'linear-gradient(135deg,#0EA5E9,#6366F1)',

      ${grads.map((g,gi)=>`<div class="logo-grad-opt ${g===logoChoice.gradient?'sel':''}" data-gi="${gi}" style="background:${g}" onclick="pickLogoGrad(${gi},'${g}')"></div>`).join('')}

function pickLogoEmoji(e){

function pickLogoGrad(gi,g){

function handleLogoUpload(input){
  const file=input.files?.[0];
  if(!file)return;
  if(!file.type.startsWith('image/')){toast('','فقط فایل عکس مجاز است');return}
  if(file.size>5*1024*1024){toast('','عکس بزرگ‌تر از ۵ مگابایته');return}
  const reader=new FileReader();
  reader.onload=e=>{logoChoice.dataUrl=e.target.result;refreshLogoPreview();
    document.querySelectorAll('#logoEmojiGrid .logo-emoji-opt').forEach(o=>o.classList.remove('sel'));
    toast('','عکس لوگو بارگذاری شد')};
  reader.onerror=()=>toast('','خطا در خواندن فایل');
  reader.readAsDataURL(file);
  input.value='';
}

function handleGalleryUpload(input){

// ─── تب ساعات کاری + تعطیلات (وصل به GET/PUT /restaurant/hours واقعی) ───
// کلید هر روز مطابق قرارداد بک‌اند: getDay() جاوااسکریپت (۰=یکشنبه ... ۶=شنبه).
// ترتیب نمایش برای کاربر ایرانی: شنبه تا جمعه.
const HOURS_DOW_ORDER=[6,0,1,2,3,4,5];
const HOURS_DOW_FA={0:'یکشنبه',1:'دوشنبه',2:'سه‌شنبه',3:'چهارشنبه',4:'پنجشنبه',5:'جمعه',6:'شنبه'};
let HOURS_STATE={opening_hours:null,timezone:'Asia/Tehran',closures:[]};
let _hoursLoaded=false, _hoursDirty=false;

async function loadHours(){
  if(!API.getToken()) return;
  const res=await API.hoursGet();
  if(res.ok && res.data){
    HOURS_STATE={opening_hours:res.data.opening_hours||{}, timezone:res.data.timezone||'Asia/Tehran', closures:res.data.closures||[]};
    _hoursLoaded=true; _hoursDirty=false;
  }
}

function profRenderHours(){
  const el=document.getElementById('pt-hours'); if(!el) return;
  if(!API.getToken()){ el.innerHTML=`<div class="panel" style="text-align:center;padding:40px;color:var(--t2)">برای ویرایش ساعات کاری وارد شو.</div>`; return; }
  const oh=HOURS_STATE.opening_hours||{};
  el.innerHTML=`
    <div class="panel">
      <div class="panel-head"><div><div class="panel-title">ساعات کاری هفتگی</div><div class="panel-sub">هر روز می‌تواند چند شیفت (مثلاً ناهار/شام) داشته باشد</div></div>
        <button class="btn btn-primary btn-sm" onclick="saveHours()">ذخیره</button></div>
      ${HOURS_DOW_ORDER.map(d=>{
        const shifts=oh[d]||[];
        const isOpen=Array.isArray(oh[d]);
        return `<div class="staff-row" style="align-items:flex-start;flex-wrap:wrap">
          <div style="flex:1;min-width:110px;font-size:13px;font-weight:700;padding-top:8px">${HOURS_DOW_FA[d]}</div>
          <button class="toggle ${isOpen?'on':'off'}" onclick="toggleHoursDay(${d})" style="margin-top:4px"></button>
          <div style="flex-basis:100%;height:0"></div>
          <div style="flex:1;min-width:220px">
            ${isOpen?(shifts.length?shifts.map((s,i)=>`
              <div style="display:flex;gap:8px;align-items:center;margin-top:8px">
                <input class="inp" style="width:auto" type="time" value="${esc(s[0])}" onchange="updateHoursShift(${d},${i},0,this.value)">

                <input class="inp" style="width:auto" type="time" value="${esc(s[1])}" onchange="updateHoursShift(${d},${i},1,this.value)">
                <button class="btn btn-ghost btn-sm" onclick="removeHoursShift(${d},${i})">حذف</button>
              </div>`).join(''):'<div style="font-size:12px;color:var(--t3);margin-top:8px">شیفتی ثبت نشده</div>')+
              (isOpen?`<button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="addHoursShift(${d})">+ افزودن شیفت</button>`:'')
            :'<div style="font-size:12px;color:var(--t3);margin-top:8px">تعطیل</div>'}
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="panel">
      <div class="panel-head"><div><div class="panel-title">تعطیلات خاص</div><div class="panel-sub">مثلاً روزهای بازسازی یا تعطیلات رسمی که با روز هفته فرق دارند</div></div></div>
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <input class="inp" id="closureDate" type="date">
        <input class="inp" id="closureReason" placeholder="دلیل (اختیاری)">
        <button class="btn btn-primary btn-sm" onclick="addClosure()">افزودن</button>
      </div>
      ${HOURS_STATE.closures.length?HOURS_STATE.closures.map((c,i)=>`
        <div class="staff-row">
          <div style="flex:1"><div style="font-size:13px;font-weight:700">${esc(c.date)}</div>${c.reason?`<div style="font-size:12px;color:var(--t2)">${esc(c.reason)}</div>`:''}</div>
          <button class="btn btn-ghost btn-sm" onclick="removeClosure(${i})">حذف</button>
        </div>`).join(''):'<div style="text-align:center;color:var(--t2);font-size:12.5px;padding:16px">تعطیلی خاصی ثبت نشده</div>'}
    </div>`;
}
function toggleHoursDay(d){
  const oh=HOURS_STATE.opening_hours=HOURS_STATE.opening_hours||{};
  if(Array.isArray(oh[d])) delete oh[d]; else oh[d]=[['12:00','23:00']];
  _hoursDirty=true; profRenderHours();
}
function addHoursShift(d){ (HOURS_STATE.opening_hours[d]=HOURS_STATE.opening_hours[d]||[]).push(['12:00','23:00']); _hoursDirty=true; profRenderHours(); }
function removeHoursShift(d,i){ HOURS_STATE.opening_hours[d]?.splice(i,1); _hoursDirty=true; profRenderHours(); }
function updateHoursShift(d,i,pos,val){ if(HOURS_STATE.opening_hours[d]?.[i]){ HOURS_STATE.opening_hours[d][i][pos]=val; _hoursDirty=true; } }
function addClosure(){
  const date=document.getElementById('closureDate')?.value;
  const reason=document.getElementById('closureReason')?.value.trim();
  if(!date){ toast('','یه تاریخ انتخاب کن'); return; }
  if(HOURS_STATE.closures.some(c=>c.date===date)){ toast('','این تاریخ قبلاً اضافه شده'); return; }
  HOURS_STATE.closures.push({date,reason:reason||null});
  _hoursDirty=true; profRenderHours();
}
function removeClosure(i){ HOURS_STATE.closures.splice(i,1); _hoursDirty=true; profRenderHours(); }
async function saveHours(){
  if(!API.getToken()){ toast('','برای ذخیره باید وارد شده باشی'); return; }
  const res=await API.hoursSave({opening_hours:HOURS_STATE.opening_hours, closures:HOURS_STATE.closures});
  if(res.ok){ _hoursDirty=false; toast('','ساعات کاری ذخیره شد'); }
  else{ toast('', res.error?.message||'ذخیره ناموفق بود'); }
}

// نقشه‌ی حرارتیِ اشغال: روز هفته × ساعت. ورودی: [{dow,hour,count}] (dow 0=یکشنبه)
function buildHeatmap(rows){
  // اگر داده‌ی واقعی نبود، نمونه‌ی واقع‌گرایانه بساز (شب‌ها و آخر هفته شلوغ‌تر)
  const hours=[12,13,14,18,19,20,21,22];
  const dowFa=['ی','د','س','چ','پ','ج','ش']; // نمایش: یکشنبه..شنبه؟ در ایران هفته از شنبه
  // بازچینش به ترتیب هفته‌ی ایرانی: شنبه(6)..جمعه(5)
  const order=[6,0,1,2,3,4,5]; const orderLbl=['ش','ی','د','س','چ','پ','ج'];
  const grid={}; let mx=0;
  if(rows&&rows.length){
    rows.forEach(r=>{ grid[`${r.dow}-${r.hour}`]=r.count; if(r.count>mx)mx=r.count; });
  } else {
    order.forEach((d,di)=>hours.forEach(h=>{
      const wknd=(d===4||d===5)?1.8:1; const night=(h>=19&&h<=21)?2.2:(h>=18?1.4:0.6);
      const v=Math.round(Math.random()*4*wknd*night); grid[`${d}-${h}`]=v; if(v>mx)mx=v;
    }));
  }
  mx=mx||1;
  const cell=(d,h)=>{
    const v=grid[`${d}-${h}`]||0; const t=v/mx;
    // رنگ: از خنثی تا گرادیانِ برند (شلوغی = گرم‌تر)
    const bg=t===0?'var(--s-100)':`rgba(${Math.round(106+t*149)},${Math.round(75-t*20)},${Math.round(255-t*130)},${0.15+t*0.85})`;
    return `<div class="hm-cell" style="background:${bg}" title="${orderLbl[order.indexOf(d)]} ساعت ${fa(h)}: ${fa(v)} رزرو"></div>`;
  };
  return `
    <div class="hm-grid">
      <div class="hm-corner"></div>
      ${hours.map(h=>`<div class="hm-hlabel">${fa(h)}</div>`).join('')}
      ${order.map((d,di)=>`
        <div class="hm-dlabel">${orderLbl[di]}</div>
        ${hours.map(h=>cell(d,h)).join('')}
      `).join('')}
    </div>
    <div class="hm-legend"><span>کم</span><div class="hm-scale"></div><span>شلوغ</span></div>`;
}

  const body = document.getElementById('modalBody');

}
function closeModal(){
  const bg = document.getElementById('modalBg');
  bg.classList.remove('show');
  bg.setAttribute('aria-hidden','true');
  // focus را به عنصری که مودال را باز کرده بود برگردان.
  if (_modalLastFocus && document.contains(_modalLastFocus)) _modalLastFocus.focus?.();

// Esc مودالِ باز را می‌بندد + focus-trap با Tab داخلِ مودال می‌ماند.
document.addEventListener('keydown', e => {
  const bg = document.getElementById('modalBg');
  if (!bg || !bg.classList.contains('show')) return;
  if (e.key === 'Escape') { e.preventDefault(); closeModal(); return; }
  if (e.key !== 'Tab') return;
  const items = [...document.getElementById('modalBody')
    .querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])')]
    .filter(el => !el.disabled && el.offsetParent !== null);
  if (!items.length) return;
  const first = items[0], last = items[items.length - 1];
  if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
  else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
});

let PRICE_STATE={rules:[],base:0,suggestions:[],hasData:false};
async function rPricing(){
  // پیش‌فرض نمونه (وقتی API نیست) — تا پنل بدون بک‌اند هم دمو داشته باشد
  let P={base:0,rules:[],suggestions:[
    {label:'شب‌های آخر هفته',dows:[4,5],from:'19:00',to:'23:00',min_toman:650000,occupancy_pct:88,
     reason:'پنجشنبه و جمعه شب‌ها شلوغ‌ترین زمانِ شماست؛ حداقل مبلغِ بالاتر، تقاضای بالا را متعادل می‌کند و درآمد هر میز را افزایش می‌دهد.'},
    {label:'شب‌های وسطِ هفته',dows:[0,1,2,3,6],from:'19:00',to:'22:30',min_toman:400000,occupancy_pct:55,
     reason:'شب‌های وسطِ هفته تقاضای متوسطی دارند؛ حداقل مبلغِ پایه تعادلِ خوبی بین پر شدنِ میزها و درآمد ایجاد می‌کند.'},
    {label:'ناهارِ وسطِ هفته (خلوت)',dows:[0,1,2,3,6],from:'12:00',to:'15:00',min_toman:200000,occupancy_pct:22,
     reason:'این بازه خلوت است؛ حداقل مبلغِ پایین‌تر مشتری‌های حساس به قیمت را جذب می‌کند و میزهای خالی را پر می‌کند — درآمدِ اضافه از ظرفیتِ بلااستفاده.'}
  ],hasData:false};
  if(API.getToken()){
    const res=await API.get('/restaurant/pricing');
    if(res.ok && res.data){
      API.online=true;
      P={base:res.data.base_min_spend_toman||0,rules:res.data.current_rules||[],
         suggestions:res.data.suggestions||[],hasData:!!res.data.has_data};
    } else { API.online=false; }
  }
  PRICE_STATE=P;
  const toman=n=>fa(Math.round(n/1000).toLocaleString('en-US'))+'هزار';
  const occColor=p=>p>=70?'linear-gradient(90deg,#F97316,#EF4444)':p>=45?'linear-gradient(90deg,#6A4BFF,#B23BFF)':'linear-gradient(90deg,#60A5FA,#3B82F6)';
  const dowLbl=['ی','د','س','چ','پ','ج','ش'];
  const sugCard=(s,i)=>{
    const hot=s.occupancy_pct>=70, cold=s.occupancy_pct<40;
    const tag=hot?`<span class="pr-tag hot">${icon('flame',{size:11,fill:true})} شلوغ‌ترین</span>`:cold?`<span class="pr-tag cold">${icon('chevronD',{size:11})} خلوت</span>`:'';
    const dir=cold?`<span class="pr-down">${icon('chevronD',{size:12})}</span>`:`<span class="pr-up">${icon('trending',{size:12})}</span>`;
    const daysTxt=(s.dows||[]).map(d=>dowLbl[d]).join('،')+` · ${s.from}–${s.to}`;
    return `<div class="pr-sug">${tag}
      <div class="pr-sug-top"><div><div class="pr-sug-label">${s.label}</div><div class="pr-sug-days">${daysTxt}</div></div>
        <div class="pr-sug-amt"><div class="pr-sug-amt-v">${toman(s.min_toman)}</div><div class="pr-sug-amt-l">حداقل مبلغ ${dir}</div></div></div>
      <div class="pr-occ"><span style="font-size:11px;color:var(--t3);font-weight:700">اشغال</span><div class="pr-occ-track"><div class="pr-occ-fill" style="width:${s.occupancy_pct}%;background:${occColor(s.occupancy_pct)}"></div></div><span class="pr-occ-pct">${fa(s.occupancy_pct)}٪</span></div>
      <div class="pr-reason">${icon('message',{size:13})} ${s.reason}</div>
      <div class="pr-actions"><button class="btn btn-primary" style="flex:1" id="prAcc-${i}" onclick="pricingAccept(${i})">${icon('check',{size:14})} قبول این پیشنهاد</button></div>
    </div>`;
  };
  document.getElementById('v-pricing').innerHTML=`
    <div class="section-head"><div><div class="section-title">قیمت‌گذاری هوشمند</div><div class="section-sub">پیشنهادِ حداقل مبلغِ رزرو بر اساس شلوغیِ واقعیِ رستورانت</div></div></div>
    ${dataSourceNote()}
    <div class="pr-banner"><h3>${icon('sparkle',{size:16,fill:true})} پیشنهاد بر اساس داده‌ی شما</h3><p>${P.hasData?'این پیشنهادها از الگوی شلوغیِ ۹۰ روز اخیرِ خودت ساخته شدن — نه حدس.':'هنوز داده‌ی کافی نداری؛ این‌ها پیشنهادِ اولیه‌ست. با ثبت رزروها دقیق‌تر می‌شن.'} هر کدوم رو می‌تونی قبول کنی. کنترل کاملش دستِ توئه.</p></div>
    <div id="prSugs">${(P.suggestions.length?P.suggestions:[]).map(sugCard).join('')||'<div class="pr-empty">فعلاً پیشنهادی نیست. با ثبت رزروِ بیشتر، سیستم الگوها رو پیدا می‌کنه.</div>'}</div>
    ${P.rules.length?`<div class="pr-active"><div class="pr-active-h">${icon('check',{size:13})} قواعدِ فعالِ فعلی</div>${P.rules.map(r=>`<div class="pr-active-row"><span>${r.label||((r.dows||[]).map(d=>dowLbl[d]).join('،'))}</span><b>${toman(r.min_toman)} تومان</b></div>`).join('')}</div>`:''}
    <div class="pr-note">${icon('info',{size:13})} رقبا مثل SevenRooms این رو «قیمت‌گذاری پویا» می‌گن و بابتش پول می‌گیرن. با یه نگاه می‌بینی کجا پول از دست می‌دی (میز خالی) و کجا می‌تونی بیشتر دربیاری (شب شلوغ).</div>`;
}
function pricingAccept(i){
  const s=PRICE_STATE.suggestions[i]; if(!s) return;
  // به قواعدِ فعال اضافه کن (بدونِ تکرارِ همان بازه)
  const exists=PRICE_STATE.rules.some(r=>r.from===s.from&&r.to===s.to&&JSON.stringify(r.dows)===JSON.stringify(s.dows));
  if(!exists) PRICE_STATE.rules.push({dows:s.dows,from:s.from,to:s.to,min_toman:s.min_toman,label:s.label});
  const btn=document.getElementById('prAcc-'+i); if(btn){btn.textContent='اعمال شد';btn.classList.add('pr-done');}
  if(navigator.vibrate)navigator.vibrate(12);
  pricingSave();
}
async function pricingSave(){
  if(!API.getToken()){ toast&&toast('','پیش‌نمایش: در حالت واقعی ذخیره می‌شود'); return; }
  const res=await API.request('/restaurant/pricing',{method:'PUT',body:JSON.stringify({rules:PRICE_STATE.rules,base_min_spend_toman:PRICE_STATE.base})});
  if(res.ok){ toast&&toast('','قواعد قیمت ذخیره شد'); }
  else { toast&&toast('', res.error?.message||'ذخیره‌ی قواعد قیمت ناموفق بود'); }
}
function cbChange(k,v){
  CB_DRAFT[k]=+v;
  document.getElementById('cbVal-'+k).textContent=fa(+v)+'٪';
  document.getElementById('pv-'+k).textContent=fa(+v)+'٪';
  const dirty=JSON.stringify(CB)!==JSON.stringify(CB_DRAFT);
  document.getElementById('cbDirty').classList.toggle('show',dirty);
  const btn=document.getElementById('cbSave');
  btn.style.opacity=dirty?'1':'.5';btn.style.pointerEvents=dirty?'auto':'none';

function cbConfirm(){
  openModal(`<div style="text-align:center">
      <div style="width:64px;height:64px;border-radius:16px;background:var(--blue-50);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--success)">${icon('wallet',{size:30})}</div>
      <div class="modal-title" style="text-align:center">از تغییر کش‌بک مطمئنی؟</div>
      <div class="modal-sub" style="text-align:center">این درصدها بلافاصله برای همه‌ی مشتریان اعمال و در اپ مشتری نمایش داده می‌شه.</div>
      <div class="cb-preview" style="text-align:right;margin-bottom:18px">
        <div class="cb-prev-row"><span>کش‌بک پایه</span><b>${fa(CB_DRAFT.base)}٪</b></div>
        <div class="cb-prev-row"><span>پیش‌سفارش</span><b>${fa(CB_DRAFT.pre)}٪</b></div>
        <div class="cb-prev-row"><span>VIP</span><b>${fa(CB_DRAFT.vip)}٪</b></div>
        <div class="cb-prev-row"><span>بازگشت</span><b>${fa(CB_DRAFT.wb)}٪</b></div>
      </div>
      <button class="btn btn-primary btn-block" onclick="cbApply()">بله، اعمال کن</button>
      <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="closeModal()">انصراف</button>
    </div>`);
}
async function cbApply(){
  CB={...CB_DRAFT};closeModal();
  document.getElementById('cbDirty').classList.remove('show');
  const btn=document.getElementById('cbSave');btn.style.opacity='.5';btn.style.pointerEvents='none';
  // ارسال به API اگر توکن staff داریم
  if(API.getToken()){
    const res=await API.patch('/restaurant/cashback',{
      base_pct:CB.base, preorder_pct:CB.pre, vip_pct:CB.vip, winback_pct:CB.wb,
    });
    if(res.ok){
      toast('','کش‌بک در سرور ذخیره شد');
    } else if(res.offline){
      toast('','کش‌بک اعمال شد (محلی)');

      toast('',res.error?.message||'خطا در ذخیره‌ی کش‌بک');

  pushNotif({ic:'blue',emoji:'wallet',title:'کش‌بک به‌روز شد',text:`کش‌بک پایه به ${fa(CB.base)}٪ تغییر کرد`,time:'همین الان',unread:true});
}

// ═══════════ ورود کارمند (فاز ۳ تکه ۷) ═══════════
let _staffPhone = '';
let STAFF_INFO = null;
function showStaffLoginPhone(){
  document.getElementById('loginCard').innerHTML = `
    <div class="login-logo">${icon('utensils',{size:34})}</div>
    <div class="login-title">پنل رستوران رزرونو</div>
    <div class="login-sub">برای ورود، شماره موبایل ثبت‌شده‌ی رستورانت رو وارد کن</div>
    <label class="login-field-label">شماره موبایل</label>
    <input class="login-inp" id="staffPhone" inputmode="tel" placeholder="۰۹۱۲۳۴۵۶۷۸۹" onkeydown="if(event.key==='Enter')staffSendOtp()">
    <button class="login-btn" id="staffSendBtn" onclick="staffSendOtp()">ارسال کد ورود</button>
    <div class="login-foot">فقط شماره‌هایی که به‌عنوان مدیر یا کارمند ثبت شده‌اند دسترسی دارند</div>`;
  setTimeout(()=>document.getElementById('staffPhone')?.focus(),200);
}
async function staffSendOtp(){
  const el = document.getElementById('staffPhone');
  const phone = (el?.value||'').trim();
  const normalized = phone.replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d)).replace(/\D/g,'');
  if (!/^09\d{9}$/.test(normalized)) { toast('','شماره موبایل معتبر وارد کن'); return; }
  _staffPhone = normalized;
  const btn = document.getElementById('staffSendBtn');
  if (btn){ btn.disabled = true; btn.textContent = 'در حال ارسال...'; }
  const res = await API.requestStaffOtp(normalized);
  if (!res.ok && !res.offline){
    // خطای واقعی (مثلاً شماره staff نیست)
    toast('', res.error?.message || 'این شماره دسترسی ندارد');
    if (btn){ btn.disabled = false; btn.textContent = 'ارسال کد ورود'; }
    return;
  }
  const devCode = res.data?.devCode || (res.offline ? '۱۲۳۴' : null);
  showStaffLoginCode(devCode, res.offline);
}
function showStaffLoginCode(devCode, offline){
  document.getElementById('loginCard').innerHTML = `
    <div class="login-logo">${icon('mail',{size:34})}</div>
    <div class="login-title">کد ورود رو وارد کن</div>
    <div class="login-sub">کد ورود به شماره‌ی ${toFaDigits(_staffPhone)} ارسال شد</div>
    <label class="login-field-label">کد ورود</label>
    <input class="login-inp code" id="staffCode" inputmode="numeric" maxlength="6" placeholder="······" onkeydown="if(event.key==='Enter')staffConfirmOtp()">
    <button class="login-btn" id="staffVerifyBtn" onclick="staffConfirmOtp()">ورود به پنل</button>
    <button class="login-back" onclick="showStaffLoginPhone()">تغییر شماره</button>
    ${devCode ? `<div class="login-hint">${offline?'حالت دمو (بک‌اند متصل نیست):':'حالت توسعه:'} کد ورود <b>${toFaDigits(devCode)}</b> است</div>` : ''}`;
  setTimeout(()=>document.getElementById('staffCode')?.focus(),200);
}
async function staffConfirmOtp(){
  const el = document.getElementById('staffCode');
  const code = (el?.value||'').trim().replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d));
  if (!/^\d{4,6}$/.test(code)) { toast('','کد ورود رو کامل وارد کن'); return; }
  const btn = document.getElementById('staffVerifyBtn');
  if (btn){ btn.disabled = true; btn.textContent = 'در حال بررسی...'; }
  const res = await API.verifyStaffOtp(_staffPhone, code);
  if (res.ok && res.data?.staff){
    STAFF_INFO = res.data.staff;
    enterPanel();
  } else if (res.offline){
    // حالت دمو: کد ۱۲۳۴
    if (code === '1234'){ STAFF_INFO = { role:'owner', restaurant_name:'کافه‌رستوران ویستا' }; enterPanel(true); }
    else { toast('','در حالت دمو، کد ۱۲۳۴ است'); if (btn){ btn.disabled=false; btn.textContent='ورود به پنل'; } }
  } else {
    toast('', res.error?.message || 'کد اشتباه است');
    if (btn){ btn.disabled=false; btn.textContent='ورود به پنل'; }
  }
}
function enterPanel(demo){
  document.getElementById('loginOverlay').classList.add('hidden');
  // منو را با مجوزهای واقعیِ کاربر هم‌راستا کن — قبل از رندرِ هر صفحه.
  if (typeof applyPermissionsToNav === 'function') applyPermissionsToNav();
  renderNotifList();
  rOverview();
  initLiveUpdates();
  if(API.getToken() && !demo){
    loadTables().then(()=>{ if(document.getElementById('v-floor')?.classList.contains('active')) rFloor(); });
    loadBranches();               // سوییچر شعبه را با داده‌ی واقعی پر کن
    Heartbeat.start();           // رستوران را در اپ مشتری آنلاین نگه می‌دارد
    Outbox.sync();               // اگر عملیات آفلاینِ در انتظار هست، همگام کن
  }
  toast('', `خوش اومدی${STAFF_INFO?.restaurant_name?' · '+STAFF_INFO.restaurant_name:''}`);
}
async function staffLogout(){
  Heartbeat.stop();                   // توقف heartbeat هنگام خروج
  await API.doLogout();               // باطل‌سازی سمت سرور + پاکسازی محلی
  STAFF_INFO = null;
  if (typeof applyPermissionsToNav === 'function') applyPermissionsToNav();  // بازگرداندنِ منو برای کاربرِ بعدی
  document.getElementById('loginOverlay').classList.remove('hidden');
  showStaffLoginPhone();
  toast('','از پنل خارج شدی');
}
// نشست منقضی و تمدید هم جواب نداد → برگشت به صفحه‌ی ورود
function onStaffSessionExpired(){
  STAFF_INFO = null;
  document.getElementById('loginOverlay').classList.remove('hidden');
  showStaffLoginPhone();
  toast('','نشست منقضی شد، دوباره وارد شو');
}

// init — نشست را از localStorage بازیابی کن، بعد ورود را چک کن
API.restoreSession();
Net.init();                    // فعال‌سازی تشخیص آنلاین/آفلاین + همگام‌سازی صف
Outbox._updateBadge();         // نمایش تعداد عملیات در انتظار (اگر از قبل هست)
if (API.getToken()) {
  // توکن ذخیره‌شده هست → مستقیم پنل (اگر منقضی باشد، اولین درخواست refresh می‌کند)
  document.getElementById('loginOverlay').classList.add('hidden');
  renderNotifList();
  rOverview();
  loadTables();
  loadBranches();               // سوییچر شعبه را با داده‌ی واقعی پر کن
  Heartbeat.start();           // شروع ارسال heartbeat (رستوران را در اپ مشتری آنلاین نگه می‌دارد)
} else {
  // نیاز به ورود
  showStaffLoginPhone();
}

</script>
<script data-src="/js/chat.js">
// ═══════════ رزرونو — پنل business: چت با مشتریان (Polling) ═══════════
// اینباکس گفتگوها + پنجره‌ی گفتگو. scope مشترک (بدون import، مثل بقیه‌ی فایل‌ها).

let _chatPollTimer = null;
let _chatActiveThread = null;
let _chatLastTime = null;
let _chatRendered = new Set();
const CHAT_POLL_MS = 4000;

function chatEsc(s){ return String(s??'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function chatTime(iso){ try { return new Date(iso).toLocaleTimeString('fa-IR',{hour:'2-digit',minute:'2-digit'}); } catch { return ''; } }

// ── اینباکس (view اصلی چت) ──
async function rChat(){
  const view = document.getElementById('v-chat');
  view.innerHTML = `<div class="panel"><div class="panel-head"><div class="panel-title">پیام‌های مشتریان</div><div class="panel-sub" id="chatInboxSub">در حال بارگذاری…</div></div><div id="chatInbox" class="chat-inbox"></div></div>`;
  const res = await API.get('/restaurant/chats');
  const box = document.getElementById('chatInbox');
  const sub = document.getElementById('chatInboxSub');
  if (!res.ok) { box.innerHTML = `<div class="chat-empty">اتصال برقرار نشد.</div>`; return; }
  const items = res.data.items || [];
  sub.textContent = res.data.unread_threads > 0 ? `${res.data.unread_threads} گفتگوی خوانده‌نشده` : 'همه خوانده شد';
  if (!items.length) { box.innerHTML = `<div class="chat-empty">هنوز پیامی از مشتری نیومده.</div>`; return; }
  box.innerHTML = items.map(t => `
    <div class="chat-inbox-row" onclick="openBizChat('${t.id}','${chatEsc(t.customer.name)}','${chatEsc(t.customer.phone||'')}')">
      <div class="chat-inbox-ava">${chatEsc(t.customer.name.charAt(0))}</div>
      <div class="chat-inbox-main">
        <div class="chat-inbox-top"><span class="chat-inbox-name">${chatEsc(t.customer.name)}</span>${t.reservation_code?`<span class="chat-inbox-tag">#${chatEsc(t.reservation_code)}</span>`:''}</div>
        <div class="chat-inbox-prev">${t.last_message?chatEsc(t.last_message.body).slice(0,64):'—'}</div>
      </div>
      ${t.unread>0?`<span class="chat-inbox-badge">${t.unread}</span>`:''}
    </div>`).join('');
}

// ── باز کردن یک گفتگو ──
async function openBizChat(threadId, name, phone){
  _chatActiveThread = threadId; _chatLastTime = null; _chatRendered = new Set();
  openModal(`
    <div class="chat-modal">
      <div class="chat-modal-head">
        <div><div class="chat-modal-name">${chatEsc(name)}</div>${phone?`<div class="chat-modal-phone" dir="ltr">${chatEsc(phone)}</div>`:''}</div>
        <button class="modal-x" onclick="closeBizChat()" aria-label="بستن">${icon('close',{size:18})}</button>
      </div>
      <div id="bizChatBody" class="chat-modal-body" role="log" aria-live="polite"></div>
      <div class="chat-modal-input">
        <input id="bizChatInput" placeholder="پاسخت رو بنویس…" maxlength="2000" autocomplete="off">
        <button id="bizChatSend" class="btn btn-primary">ارسال</button>
      </div>
    </div>`);
  document.getElementById('bizChatSend').onclick = sendBizChat;
  document.getElementById('bizChatInput').addEventListener('keydown', e => { if (e.key==='Enter'){ e.preventDefault(); sendBizChat(); } });
  await bizPoll(true);
  _chatPollTimer = setInterval(() => bizPoll(false), CHAT_POLL_MS);
}

function closeBizChat(){
  if (_chatPollTimer){ clearInterval(_chatPollTimer); _chatPollTimer = null; }
  _chatActiveThread = null;
  closeModal();
  rChat(); // اینباکس را تازه کن (شمارنده‌ها)
}

async function bizPoll(initial){
  if (!_chatActiveThread) return;
  const q = _chatLastTime ? `?after=${encodeURIComponent(_chatLastTime)}` : '';
  const res = await API.get(`/restaurant/chats/${_chatActiveThread}${q}`);
  if (!res.ok) return;
  const msgs = res.data.items || [];
  const body = document.getElementById('bizChatBody');
  if (!body) { if(_chatPollTimer){clearInterval(_chatPollTimer);_chatPollTimer=null;} return; }
  let appended = false;
  for (const m of msgs){
    if (_chatRendered.has(m.id)) continue;
    _chatRendered.add(m.id); _chatLastTime = m.created_at;
    body.insertAdjacentHTML('beforeend', bizBubble(m));
    appended = true;
  }
  if (initial && !msgs.length) body.innerHTML = `<div class="chat-empty-thread">هنوز پیامی نیست.</div>`;
  if (appended) body.scrollTop = body.scrollHeight;
}

function bizBubble(m){
  const mine = m.sender === 'staff';
  return `<div class="chat-b ${mine?'me':'them'}"><div>${chatEsc(m.body)}</div><div class="chat-b-t">${chatTime(m.created_at)}</div></div>`;
}

async function sendBizChat(){
  const input = document.getElementById('bizChatInput');
  const body = (input.value||'').trim();
  if (!body || !_chatActiveThread) return;
  input.value = '';
  const bodyEl = document.getElementById('bizChatBody');
  const empty = bodyEl?.querySelector('.chat-empty-thread'); if (empty) empty.remove();
  bodyEl?.insertAdjacentHTML('beforeend', `<div class="chat-b me pending"><div>${chatEsc(body)}</div><div class="chat-b-t">…</div></div>`);
  if (bodyEl) bodyEl.scrollTop = bodyEl.scrollHeight;
  const res = await API.post(`/restaurant/chats/${_chatActiveThread}`, { body });
  const pend = bodyEl?.querySelector('.chat-b.pending');
  if (res.ok && res.data?.id){
    _chatRendered.add(res.data.id); _chatLastTime = res.data.created_at;
    if (pend){ pend.classList.remove('pending'); pend.querySelector('.chat-b-t').textContent = chatTime(res.data.created_at); }
  } else {
    if (pend) pend.querySelector('.chat-b-t').innerHTML = icon('alert',{size:14});
    toast('','ارسال نشد');
  }
}

</script>
</body>
</html>
