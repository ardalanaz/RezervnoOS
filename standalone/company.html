<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رزرونو · پنل شرکت</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style data-src="/css/tokens.css">
/* ═══════════════════════════════════════════════════════════
   رزرونو — سیستم توکنِ طراحیِ مشترک (Design Tokens)
   منبعِ واحدِ حقیقت برای هر سه اپ. دو لایه:
     ۱) Primitive  — مقادیرِ خام (رنگ، اندازه). هیچ‌جا مستقیم استفاده نکن.
     ۲) Semantic   — نقش‌ها (bg, text, brand, danger...). فقط این‌ها را استفاده کن.
   هر اپ تمِ خودش را با override کردنِ لایه‌ی Semantic می‌سازد.
   ═══════════════════════════════════════════════════════════ */

:root {
  /* ── لایه ۱: Primitive — مقیاسِ تایپوگرافی (۴px-baseline، پرش‌های واضح) ── */
  --fs-2xs: 11px;
  --fs-xs:  12px;
  --fs-sm:  13px;
  --fs-md:  14px;   /* بدنه‌ی پیش‌فرض */
  --fs-lg:  16px;
  --fs-xl:  20px;
  --fs-2xl: 24px;
  --fs-3xl: 32px;
  --fs-4xl: 40px;

  --lh-tight:   1.2;
  --lh-snug:    1.4;
  --lh-normal:  1.6;
  --lh-relaxed: 1.8;

  --ls-tight: -0.02em;   /* عنوان‌های بزرگ (به سبک Linear) */
  --ls-snug:  -0.01em;
  --ls-normal: 0;

  --fw-normal:   400;
  --fw-medium:   500;
  --fw-semibold: 600;
  --fw-bold:     700;
  --fw-extra:    800;

  /* ── لایه ۱: Primitive — مقیاسِ فاصله (۴px grid، پیکسل‌پرفکت) ── */
  --sp-0:  0;
  --sp-1:  4px;
  --sp-2:  8px;
  --sp-3:  12px;
  --sp-4:  16px;
  --sp-5:  20px;
  --sp-6:  24px;
  --sp-8:  32px;
  --sp-10: 40px;
  --sp-12: 48px;
  --sp-16: 64px;

  /* ── لایه ۱: Primitive — شعاع ── */
  --radius-xs: 8px;
  --radius-sm: 10px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-2xl: 28px;
  --radius-full: 9999px;

  /* ── لایه ۱: Primitive — حرکت (یک سیستمِ زمانی واحد) ── */
  --motion-fast:  130ms;
  --motion-base:  200ms;
  --motion-slow:  320ms;
  --ease-out:    cubic-bezier(.4, 0, .2, 1);
  --ease-spring: cubic-bezier(.34, 1.56, .64, 1);

  /* ── لایه ۱: Primitive — رنگ‌های برند (خام) ── */
  --brand-500: #4F46E5;
  --brand-600: #4338CA;
  --brand-400: #6A4BFF;
  --violet-500: #7C3AED;
  --warm-500:  #E8925A;

  /* ── لایه ۲: Semantic — حالت‌های معنایی (مشترک بینِ همه‌ی اپ‌ها) ── */
  --success:      #12A150;
  --success-soft: #E7F6EE;
  --success-ink:  #0A7A3C;
  --warning:      #C2410C;
  --warning-soft: #FEF0E7;
  --warning-ink:  #9A3412;
  --danger:       #DC2626;
  --danger-soft:  #FDECEC;
  --danger-ink:   #B91C1C;
  --info:         #2563EB;
  --info-soft:    #E8F0FE;
  --info-ink:     #1D4ED8;

  /* ── هدفِ لمسیِ حداقل (Apple HIG / Material) ── */
  --touch-min: 44px;

  /* ── focus ring یکدست (دسترسی‌پذیری) ── */
  --focus-ring: 0 0 0 2px var(--bg, #fff), 0 0 0 4px var(--brand-500);
}

  /* ── لایه ۱: Primitive — Elevation (سایه‌های لایه‌ای، ۵ سطح) ── */
  --elevation-0: none;
  --elevation-1: 0 1px 2px rgba(11,16,32,.05), 0 1px 1px rgba(11,16,32,.03);
  --elevation-2: 0 2px 6px rgba(11,16,32,.06), 0 1px 2px rgba(11,16,32,.04);
  --elevation-3: 0 6px 16px rgba(11,16,32,.08), 0 2px 4px rgba(11,16,32,.05);
  --elevation-4: 0 12px 32px rgba(11,16,32,.10), 0 4px 8px rgba(11,16,32,.06);
  --elevation-5: 0 24px 60px rgba(11,16,32,.16), 0 8px 16px rgba(11,16,32,.08);
  /* نام‌های مستعارِ معنایی */
  --sh-sm: var(--elevation-1);
  --sh-md: var(--elevation-3);
  --sh-lg: var(--elevation-4);
  --sh-xl: var(--elevation-5);

  /* ── لایه ۱: Primitive — Grid (۱۲ ستون، container، gutter) ── */
  --grid-cols: 12;
  --grid-gutter: var(--sp-6);
  --container-sm:  640px;
  --container-md:  768px;
  --container-lg:  1024px;
  --container-xl:  1280px;
  --container-max: 1280px;

  /* ── لایه ۱: Primitive — Breakpoints (به‌صورت مقدار برای ارجاع؛ در media query مستقیم) ── */
  --bp-sm: 640px;
  --bp-md: 768px;
  --bp-lg: 1024px;
  --bp-xl: 1280px;

  /* ── لایه ۱: Primitive — z-index scale (لایه‌بندیِ یکدست) ── */
  --z-base: 0;
  --z-dropdown: 100;
  --z-sticky: 200;
  --z-drawer: 300;
  --z-overlay: 400;
  --z-modal: 500;
  --z-toast: 600;
  --z-tooltip: 700;

/* احترامِ سراسری به کاهشِ حرکت — یک‌بار، درست، برای همه */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* ── پلِ تم: پنل شرکت (لایت) ── */
:root {
  --surface: #FFFFFF;
  --surface-2: #F1F5F9;
  --surface-hover: rgba(15,23,42,.04);
  --text-1: #0F172A;
  --text-2: #475569;
  --text-3: #94A3B8;
  --skeleton-base: rgba(15,23,42,.05);
  --skeleton-hi: rgba(15,23,42,.10);
  --brand-500: #4F46E5;
  --brand-600: #4338CA;
}

</style>
<style data-src="/css/foundation.css">
/* ═══════════════════════════════════════════════════════════
   رزرونو — لایه‌ی Foundation (کامپوننت‌های پایه)
   روی tokens.css سوار است. کلاس‌های یوتیلیتی و کامپوننتِ مشترک.
   ═══════════════════════════════════════════════════════════ */

/* ── دسترسی‌پذیری: skip-link ── */
.skip-link {
  position: absolute; inset-inline-start: -9999px; top: var(--sp-2);
  background: var(--brand-500); color: #fff; padding: var(--sp-2) var(--sp-4);
  border-radius: var(--radius-sm); z-index: 9999; font-weight: var(--fw-semibold);
}
.skip-link:focus { inset-inline-start: var(--sp-2); }

/* ── دسترسی‌پذیری: مخفی برای چشم، قابل‌خواندن برای screen-reader ── */
.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

/* ── دسترسی‌پذیری: focus-ring یکدست روی همه‌ی المان‌های تعاملی ── */
:where(a, button, input, select, textarea, [tabindex]):focus-visible {
  outline: none;
  box-shadow: var(--focus-ring);
  border-radius: var(--radius-sm);
}

/* ═══════════ دکمه ═══════════ */
.btn {
  --btn-h: 40px;
  display: inline-flex; align-items: center; justify-content: center; gap: var(--sp-2);
  height: var(--btn-h); min-height: var(--touch-min);
  padding: 0 var(--sp-4);
  font-family: inherit; font-size: var(--fs-md); font-weight: var(--fw-semibold);
  line-height: 1; white-space: nowrap; cursor: pointer;
  border: 1px solid transparent; border-radius: var(--radius-md);
  transition: transform var(--motion-fast) var(--ease-out),
              background var(--motion-fast) var(--ease-out),
              box-shadow var(--motion-fast) var(--ease-out),
              opacity var(--motion-fast) var(--ease-out);
  user-select: none;
}
.btn:active { transform: scale(.98); }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.btn-sm { --btn-h: 36px; font-size: var(--fs-sm); padding: 0 var(--sp-3); }
.btn-lg { --btn-h: 44px; font-size: var(--fs-lg); padding: 0 var(--sp-6); }

.btn-primary { background: var(--brand-500); color: #fff; }
.btn-primary:hover { background: var(--brand-600); }
.btn-ghost { background: transparent; border-color: var(--border, #e5e5e5); color: inherit; }
.btn-ghost:hover { background: var(--surface-hover, rgba(0,0,0,.04)); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { filter: brightness(.94); }

/* اسپینرِ داخلِ دکمه (loading) */
.btn[data-loading="true"] { color: transparent !important; pointer-events: none; position: relative; }
.btn[data-loading="true"]::after {
  content: ""; position: absolute; width: 16px; height: 16px;
  border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%;
  color: #fff; animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════════ کارت ═══════════ */
.card {
  background: var(--surface, #fff); border: 1px solid var(--border, #ececec);
  border-radius: var(--radius-lg); padding: var(--sp-5);
  transition: transform var(--motion-base) var(--ease-out),
              box-shadow var(--motion-base) var(--ease-out);
}
.card-interactive { cursor: pointer; }
.card-interactive:hover { transform: translateY(-2px); box-shadow: var(--sh-lg, 0 12px 32px rgba(0,0,0,.1)); }

/* ═══════════ فرم ═══════════ */
.field { display: flex; flex-direction: column; gap: var(--sp-2); }
.field-label { font-size: var(--fs-sm); font-weight: var(--fw-semibold); color: var(--text-2, #555); }
.field-input {
  height: var(--touch-min); padding: 0 var(--sp-4);
  font-family: inherit; font-size: var(--fs-md); color: inherit;
  background: var(--surface-2, #f6f6f8); border: 1px solid var(--border, #e5e5e5);
  border-radius: var(--radius-md);
  transition: border-color var(--motion-fast) var(--ease-out), box-shadow var(--motion-fast) var(--ease-out);
  width: 100%;
}
.field-input:focus { outline: none; border-color: var(--brand-500); box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand-500) 15%, transparent); }
.field-input[aria-invalid="true"] { border-color: var(--danger); }
.field-error { font-size: var(--fs-xs); color: var(--danger-ink); }
.field-help  { font-size: var(--fs-xs); color: var(--text-3, #999); }

/* ═══════════ Skeleton (loading) ═══════════ */
.skeleton {
  background: linear-gradient(90deg,
    var(--skeleton-base, rgba(0,0,0,.06)) 25%,
    var(--skeleton-hi, rgba(0,0,0,.11)) 37%,
    var(--skeleton-base, rgba(0,0,0,.06)) 63%);
  background-size: 400% 100%;
  animation: shimmer 1.4s ease infinite;
  border-radius: var(--radius-sm);
}
@keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
.skeleton-text { height: 12px; margin-bottom: var(--sp-2); }
.skeleton-text.w-60 { width: 60%; } .skeleton-text.w-40 { width: 40%; } .skeleton-text.w-80 { width: 80%; }
.skeleton-card { height: 120px; border-radius: var(--radius-lg); }
.skeleton-avatar { width: 44px; height: 44px; border-radius: 50%; }

/* ═══════════ Empty state ═══════════ */
.empty-state {
  display: flex; flex-direction: column; align-items: center; text-align: center;
  padding: var(--sp-12) var(--sp-6); gap: var(--sp-3);
}
.empty-state-icon {
  width: 56px; height: 56px; display: grid; place-items: center;
  color: var(--text-3, #aaa); opacity: .7;
}
.empty-state-title { font-size: var(--fs-lg); font-weight: var(--fw-bold); }
.empty-state-desc { font-size: var(--fs-sm); color: var(--text-2, #666); line-height: var(--lh-relaxed); max-width: 320px; }

/* ═══════════ Error state ═══════════ */
.error-state {
  display: flex; flex-direction: column; align-items: center; text-align: center;
  padding: var(--sp-10) var(--sp-6); gap: var(--sp-3);
}
.error-state-icon { width: 48px; height: 48px; color: var(--danger); }

/* ═══════════ ریز-تعامل: toast ورودی ═══════════ */
@keyframes toast-in {
  from { opacity: 0; transform: translateY(12px) scale(.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.toast-enter { animation: toast-in var(--motion-base) var(--ease-spring); }

/* ═══════════ اعدادِ جدولی (tabular) برای جدول‌ها و ارقام ═══════════ */
.tabular { font-variant-numeric: tabular-nums; }

/* ═══════════ Grid & Layout (سیستم چیدمان) ═══════════ */
.container { width: 100%; max-width: var(--container-max); margin-inline: auto; padding-inline: var(--sp-4); }
.grid { display: grid; gap: var(--grid-gutter); }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-12 { grid-template-columns: repeat(12, 1fr); }
/* stack: چیدمانِ عمودی با فاصله‌ی یکدست (جایگزینِ margin پراکنده) */
.stack { display: flex; flex-direction: column; }
.stack-2 { gap: var(--sp-2); } .stack-3 { gap: var(--sp-3); }
.stack-4 { gap: var(--sp-4); } .stack-6 { gap: var(--sp-6); }
.row { display: flex; align-items: center; }
.row-2 { gap: var(--sp-2); } .row-3 { gap: var(--sp-3); } .row-4 { gap: var(--sp-4); }
.spacer { flex: 1; }
.divider { height: 1px; background: var(--border, #ececec); border: 0; margin: var(--sp-4) 0; }
.divider-v { width: 1px; align-self: stretch; background: var(--border, #ececec); }

/* ── قوانینِ Responsive (breakpointهای استاندارد) ── */
@media (max-width: 1024px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
  .grid-3 { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 640px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .hide-mobile { display: none !important; }
}
@media (min-width: 641px) { .only-mobile { display: none !important; } }

/* ═══════════ Badge ═══════════ */
.badge {
  display: inline-flex; align-items: center; gap: var(--sp-1);
  height: 22px; padding: 0 var(--sp-2);
  font-size: var(--fs-2xs); font-weight: var(--fw-bold); line-height: 1;
  border-radius: var(--radius-full); white-space: nowrap;
}
.badge-neutral { background: var(--surface-2, #f0f0f4); color: var(--text-2, #555); }
.badge-brand   { background: color-mix(in srgb, var(--brand-500) 12%, transparent); color: var(--brand-600); }
.badge-success { background: var(--success-soft); color: var(--success-ink); }
.badge-warning { background: var(--warning-soft); color: var(--warning-ink); }
.badge-danger  { background: var(--danger-soft);  color: var(--danger-ink); }
.badge-info    { background: var(--info-soft);    color: var(--info-ink); }
/* badge شمارشی (عدد قرمز روی آیکون) */
.badge-count {
  min-width: 18px; height: 18px; padding: 0 5px;
  background: var(--danger); color: #fff;
  font-size: var(--fs-2xs); font-weight: var(--fw-bold);
  border-radius: var(--radius-full); display: inline-grid; place-items: center;
}

/* ═══════════ Chip (فیلتر/انتخاب) ═══════════ */
.chip {
  display: inline-flex; align-items: center; gap: var(--sp-1);
  height: 34px; min-height: 34px; padding: 0 var(--sp-3);
  font-size: var(--fs-sm); font-weight: var(--fw-semibold);
  background: var(--surface-2, #f4f4f8); color: var(--text-2, #555);
  border: 1px solid transparent; border-radius: var(--radius-full);
  cursor: pointer; white-space: nowrap;
  transition: background var(--motion-fast) var(--ease-out), color var(--motion-fast) var(--ease-out);
}
.chip:hover { background: var(--surface-hover, rgba(0,0,0,.05)); }
.chip[aria-pressed="true"], .chip.is-active {
  background: color-mix(in srgb, var(--brand-500) 12%, transparent);
  color: var(--brand-600); border-color: color-mix(in srgb, var(--brand-500) 30%, transparent);
}

/* ═══════════ Avatar ═══════════ */
.avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: inline-grid; place-items: center; flex-shrink: 0;
  font-weight: var(--fw-bold); color: #fff; overflow: hidden;
  background: linear-gradient(135deg, var(--brand-400), var(--brand-600));
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.avatar-sm { width: 32px; height: 32px; font-size: var(--fs-sm); }
.avatar-lg { width: 56px; height: 56px; font-size: var(--fs-xl); }

/* ═══════════ Toggle / Switch ═══════════ */
.switch { position: relative; display: inline-block; width: 44px; height: 26px; flex-shrink: 0; }
.switch input { position: absolute; opacity: 0; width: 100%; height: 100%; margin: 0; cursor: pointer; }
.switch-track {
  position: absolute; inset: 0; background: var(--border, #d5d5da);
  border-radius: var(--radius-full); transition: background var(--motion-base) var(--ease-out);
}
.switch-thumb {
  position: absolute; top: 3px; inset-inline-start: 3px; width: 20px; height: 20px;
  background: #fff; border-radius: 50%; box-shadow: var(--elevation-1);
  transition: transform var(--motion-base) var(--ease-spring);
}
.switch input:checked ~ .switch-track { background: var(--brand-500); }
.switch input:checked ~ .switch-thumb { transform: translateX(-18px); } /* RTL: به چپ */
.switch input:focus-visible ~ .switch-track { box-shadow: var(--focus-ring); }

/* ═══════════ Tabs ═══════════ */
.tabs { display: flex; gap: var(--sp-1); border-bottom: 1px solid var(--border, #ececec); }
.tab {
  height: 40px; padding: 0 var(--sp-4); background: none; border: 0;
  font-family: inherit; font-size: var(--fs-md); font-weight: var(--fw-semibold);
  color: var(--text-2, #666); cursor: pointer; position: relative;
  transition: color var(--motion-fast) var(--ease-out);
}
.tab:hover { color: var(--text-1, #222); }
.tab[aria-selected="true"] { color: var(--brand-600); }
.tab[aria-selected="true"]::after {
  content: ""; position: absolute; inset-inline: var(--sp-3); bottom: -1px; height: 2px;
  background: var(--brand-500); border-radius: 2px;
}

/* ═══════════ Tooltip (CSS-only) ═══════════ */
.tooltip { position: relative; }
.tooltip::after {
  content: attr(data-tip); position: absolute; bottom: calc(100% + 6px); inset-inline-start: 50%;
  transform: translateX(50%) translateY(4px); /* RTL-safe center */
  background: var(--text-1, #222); color: #fff; font-size: var(--fs-xs); font-weight: var(--fw-medium);
  padding: var(--sp-1) var(--sp-2); border-radius: var(--radius-sm); white-space: nowrap;
  opacity: 0; pointer-events: none; transition: opacity var(--motion-fast) var(--ease-out), transform var(--motion-fast) var(--ease-out);
  z-index: var(--z-tooltip);
}
.tooltip:hover::after, .tooltip:focus-visible::after { opacity: 1; transform: translateX(50%) translateY(0); }

/* ═══════════ Modal / Overlay (پایه — helper رفتار در JS) ═══════════ */
.overlay {
  position: fixed; inset: 0; background: rgba(11,16,32,.5);
  display: grid; place-items: center; padding: var(--sp-4);
  z-index: var(--z-modal); animation: overlay-in var(--motion-base) var(--ease-out);
}
@keyframes overlay-in { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface, #fff); border-radius: var(--radius-xl);
  box-shadow: var(--elevation-5); max-width: 480px; width: 100%;
  max-height: 85vh; overflow-y: auto; padding: var(--sp-6);
  animation: modal-in var(--motion-base) var(--ease-spring);
}
@keyframes modal-in { from { opacity: 0; transform: scale(.96) translateY(8px); } to { opacity: 1; transform: none; } }

/* ═══════════ Bottom Sheet (پایه) ═══════════ */
.sheet {
  position: fixed; inset-inline: 0; bottom: 0; z-index: var(--z-modal);
  background: var(--surface, #fff); border-radius: var(--radius-2xl) var(--radius-2xl) 0 0;
  box-shadow: var(--elevation-5); max-height: 90vh; overflow-y: auto;
  padding: var(--sp-3) var(--sp-5) var(--sp-6);
  animation: sheet-in var(--motion-slow) var(--ease-spring);
}
@keyframes sheet-in { from { transform: translateY(100%); } to { transform: translateY(0); } }

<style data-src="/css/panel.css">
/* ═══ رزرونو — پنل company (admin): استایل‌ها ═══ */
:root{

  --amber:#F59E0B;--amber-50:#FFFBEB;--amber-600:#D97706;
  --red:#EF4444;--red-50:#FEF2F2;--red-600:#DC2626;
  --t1:#0F172A;--t2:#64748B;--t3:#94A3B8;--border:#E2E8F0;--border-strong:#CBD5E1;

  --ink:#4F46E5;--ink-600:#4338CA;--ink-700:#3730A3;--ink-50:#EEF2FF;--ink-100:#E0E7FF;
  --violet:#7C3AED;--violet-50:#F5F3FF;
  --ink-grad:linear-gradient(135deg,#4F46E5,#7C3AED);
  --r-xs:8px;--r-sm:10px;--r:14px;--r-lg:18px;--r-xl:24px;
  --sh-sm:0 1px 2px rgba(15,23,42,.06);
  --sh:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);
  --sh-md:0 4px 12px rgba(15,23,42,.06),0 2px 4px rgba(15,23,42,.04);
  --sh-lg:0 12px 32px rgba(15,23,42,.10);
  --sh-ink:0 8px 24px rgba(79,70,229,.24);
  --t-fast:130ms;--t:200ms;--ease:cubic-bezier(.4,0,.2,1);--spring:cubic-bezier(.34,1.56,.64,1);

*{margin:0;padding:0;box-sizing:border-box}

/* ===== Layout ===== */
.app{display:flex;min-height:100vh}

  color:#fff;font-weight:800;font-size:17px;box-shadow:var(--sh-ink)}
.sb-brand-text{font-weight:800;font-size:16px;letter-spacing:-.03em}

.sb-item{display:flex;align-items:center;gap:11px;width:100%;padding:11px 13px;border:none;background:none;border-radius:var(--r-sm);
  color:var(--t2);font-size:14px;font-weight:600;text-align:right;transition:all var(--t-fast);margin-bottom:2px}

.sb-foot-ava{width:36px;height:36px;border-radius:50%;background:var(--ink-grad);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}

/* ===== Topbar ===== */
.topbar{height:64px;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:30}
.tb-title{font-size:19px;font-weight:800;letter-spacing:-.03em}

  font-size:13px;background:var(--s-50);transition:all var(--t-fast)}

.content{padding:28px;max-width:1400px}

/* ===== Components ===== */
.panel{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:22px;box-shadow:var(--sh-sm)}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}

.kpi-ic.ink{background:var(--ink-50)}.kpi-ic.green{background:var(--green-50)}.kpi-ic.amber{background:var(--amber-50)}.kpi-ic.violet{background:var(--violet-50)}

.kpi-val{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1}
.kpi-label{font-size:13px;color:var(--t2);font-weight:600;margin-top:5px}

/* ===== Restaurant table ===== */
.rest-controls{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.filter-chip{padding:8px 16px;border:1.5px solid var(--border);border-radius:50px;background:var(--white);
  font-size:12.5px;font-weight:700;color:var(--t2);transition:all var(--t-fast)}
.filter-chip:hover{border-color:var(--border-strong)}

/* ── back button ── */
.back-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 15px;border:1.5px solid var(--border);background:var(--white);

.opt:hover{border-color:var(--border-strong)}
.opt.sel{border-color:var(--ink);background:var(--ink-50);color:var(--ink-700)}
.summary-box{background:var(--s-50);border-radius:var(--r);padding:14px 16px;margin:14px 0}
.sum-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0}
.sum-row .k{color:var(--t2)}
.sum-row .v{font-weight:700}

/* ===== Charts ===== */
.row-2{display:grid;grid-template-columns:1.5fr 1fr;gap:20px;margin-bottom:20px}
.chart{display:flex;align-items:flex-end;gap:10px;height:180px;padding-top:20px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%}
.bar{width:100%;max-width:42px;background:var(--ink-grad);border-radius:8px 8px 0 0;position:relative;transition:height .8s var(--ease);min-height:4px;margin-top:auto}
.bar-val{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:700;color:var(--t2);white-space:nowrap}
.bar-label{font-size:11px;color:var(--t3);font-weight:600}
.list-stat{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.list-stat:last-child{border:none}
.ls-rank{width:26px;height:26px;border-radius:8px;background:var(--ink-50);color:var(--ink-700);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.ls-info{flex:1;min-width:0}
.ls-name{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ls-meta{font-size:11.5px;color:var(--t2)}
.ls-val{font-size:14px;font-weight:800;color:var(--ink)}

/* ===== Alerts box ===== */
.alert-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;box-shadow:var(--sh-sm)}
.alert-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.6}
.alert-item:last-child{border:none}
.alert-ic{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.alert-ic.warn{background:var(--amber-50)}.alert-ic.danger{background:var(--red-50)}.alert-ic.info{background:var(--ink-50)}

/* ===== View switching ===== */
.view{display:none}.view.active{display:block;animation:fadeUp .3s var(--ease)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ===== Toast ===== */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--s-900);color:#fff;
  padding:13px 22px;border-radius:50px;font-size:13.5px;font-weight:600;box-shadow:var(--sh-lg);z-index:100;
  display:flex;align-items:center;gap:9px;opacity:0;transition:all var(--t) var(--spring);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

.sb-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:35}
.sb-overlay.show{display:block}

/* ===== Responsive ===== */
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.row-2{grid-template-columns:1fr}}
@media(max-width:900px){
  .sidebar{transform:translateX(100%)}.sidebar.open{transform:translateX(0)}
  .main{margin-right:0}.tb-burger{display:flex;align-items:center;justify-content:center}
  .tb-search input{width:160px}.tb-search input:focus{width:180px}
  .content{padding:18px}
  .rest-row,.rest-head{grid-template-columns:2fr 1fr 1.1fr;}
  .rest-col-hide{display:none}
}
@media(max-width:560px){
  .rest-row,.rest-head{grid-template-columns:1.6fr 1fr}
  .tb-search{display:none}
}

<style data-src="/css/ds-bridge.css">
/* ═══════════════════════════════════════════════════════════
   رزرونو — لایه‌ی سازگاریِ Design System (DS Bridge)
   هدف: هم‌ترازکردنِ کامپوننت‌های قدیمیِ اپ‌ها با Design System،
        بدونِ لمسِ markupِ صفحات (نه ری‌دیزاین).

   دو کار:
   ۱) نگاشتِ توکن‌های قدیمیِ هر اپ (--r-sm, --t, --blue...) به توکن‌های DS.
      → هر کلاسی که از توکنِ قدیمی استفاده می‌کند، خودکار مقدارِ DS می‌گیرد.
   ۲) هم‌ترازیِ کامپوننت‌های پایه (.btn, .inp) به استانداردِ DS.

   باید *بعد از* CSS اصلیِ هر اپ لود شود تا واگرایی را اصلاح کند.
   ═══════════════════════════════════════════════════════════ */

/* ── ۱) نگاشتِ توکن‌های قدیمی → DS (منبعِ واحدِ حقیقت) ── */
:root {
  /* شعاع: قدیمی → DS (کاملِ مقیاس، رفعِ واگراییِ r-xl=24→20، r-2xl=32→28) */
  --r-xs:  var(--radius-xs);
  --r-sm:  var(--radius-sm);
  --r-md:  var(--radius-md);
  --r:     var(--radius-md);
  --r-lg:  var(--radius-lg);
  --r-xl:  var(--radius-xl);
  --r-2xl: var(--radius-2xl);
  /* حرکت: قدیمی → DS (کامل، شاملِ t-slow=340→320 و spring) */
  --t:      var(--motion-base);
  --t-fast: var(--motion-fast);
  --t-slow: var(--motion-slow);
  --ease:   var(--ease-out);
  --spring: var(--ease-spring);
  /* برند: قدیمی → DS (حفظِ تمِ هر اپ، فقط یکدست‌سازیِ منبع) */
  --blue: var(--brand-500);
  /* توجه: سایه (--sh-*) عمداً نگاشت نمی‌شود — هر اپ سایه‌ی متناسب با تمِ خود دارد
     (مشتریِ دارک = سایه‌ی قوی‌تر با rgba بالا). نگاشتِ سراسریِ elevation روشن،
     سایه را در دارک‌مود نامرئی می‌کرد. این یک رگرسیونِ بصری بود که اصلاح شد. */
}

/* ── ۲) هم‌ترازیِ .btn به استانداردِ DS (رفعِ واگراییِ سه‌گانه) ──
   مقادیرِ یکدستِ توکنی، جایگزینِ 11px/10px و 14px/13px پراکنده. */
.btn {
  gap: var(--sp-2);
  padding: var(--sp-2) var(--sp-4);   /* block+inline کامل — override کاملِ shorthand قدیمی */
  font-size: var(--fs-md);
  min-height: var(--touch-min);
  border-radius: var(--radius-md);
  transition: transform var(--motion-fast) var(--ease-out),
              background var(--motion-fast) var(--ease-out),
              box-shadow var(--motion-fast) var(--ease-out),
              opacity var(--motion-fast) var(--ease-out);
}
.btn:active { transform: scale(.98); }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-sm { min-height: 36px; font-size: var(--fs-sm); padding: var(--sp-1) var(--sp-3); }
.btn-lg { min-height: 44px; font-size: var(--fs-lg); padding: var(--sp-3) var(--sp-6); }

/* ── ۳) هم‌ترازیِ .inp (کلاسِ قدیمی) به استانداردِ .field-input ── */
.inp {
  min-height: var(--touch-min);
  padding: var(--sp-3) var(--sp-4);   /* توکنی — override کاملِ 12px/15px قدیمی */
  border-radius: var(--radius-md);
  font-size: var(--fs-md);
  transition: border-color var(--motion-fast) var(--ease-out),
              box-shadow var(--motion-fast) var(--ease-out);
}
.inp:focus {
  border-color: var(--brand-500);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand-500) 15%, transparent);
}
.inp[aria-invalid="true"] { border-color: var(--danger); }

/* ── ۴) هم‌ترازیِ chip قدیمی (.opt) به استانداردِ .chip ── */
.opt {
  min-height: 34px;
  border-radius: var(--radius-full);
  transition: background var(--motion-fast) var(--ease-out),
              color var(--motion-fast) var(--ease-out);
}
.opt:focus-visible { box-shadow: var(--focus-ring); }

/* ── ۵) هم‌ترازیِ کارتِ قدیمی (.panel / .glass) به elevation یکدست ── */
.panel { border-radius: var(--radius-lg); }

</style>

  const fill = opts.fill ? 'currentColor' : 'none';
  const sw = opts.strokeWidth || 1.5;
  return `<svg${cls} width="${size}" height="${size}" viewBox="0 0 24 24" fill="${fill}" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"${label}>${p}</svg>`;
}

<script data-src="/js/api.js">
// ═══ رزرونو — پنل company: ابزارها + لایه‌ی اتصال API admin (Vanilla JS، scope مشترک) ═══
function fa(n){return n.toLocaleString('fa-IR')}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
let tt;
function toast(icon,msg){const t=document.getElementById('toast');document.getElementById('toastIcon').textContent=icon;document.getElementById('toastMsg').textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2600)}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sbOverlay').classList.toggle('show')}

// ═══════════════════════════════════════════════════════════
//  لایه‌ی اتصال API (فاز ۳) — پنل شرکت به endpointهای admin
//  با بک‌اند → داده‌ی واقعی · بدون بک‌اند → نمونه (پنل نمی‌شکند)
// ═══════════════════════════════════════════════════════════
const API = {
  base: '',
  timeout: 8000,
  _token: null,
  _refresh: null,
  _refreshing: null,
  online: true,
  setToken(t){ this._token = t; try { if(t) localStorage.setItem('rz_co_access', t); else localStorage.removeItem('rz_co_access'); } catch {} },
  getToken(){ return this._token; },
  setRefresh(t){ this._refresh = t; try { if(t) localStorage.setItem('rz_co_refresh', t); else localStorage.removeItem('rz_co_refresh'); } catch {} },
  restoreSession(){ try { this._token = localStorage.getItem('rz_co_access')||null; this._refresh = localStorage.getItem('rz_co_refresh')||null; } catch {} return !!this._token; },
  async request(path, opts = {}, _retried = false){
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), this.timeout);
    try {
      const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
      if (this._token) headers['Authorization'] = `Bearer ${this._token}`;
      const res = await fetch(this.base + '/api/v1' + path, { ...opts, headers, signal: ctrl.signal });
      clearTimeout(timer);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        if (res.status === 401 && this._refresh && !_retried && !path.startsWith('/auth/')) {
          if (await this._doRefresh()) return this.request(path, opts, true);
          this._onSessionExpired();
        }
        return { ok: false, status: res.status, error: data?.error || { message: `خطای ${res.status}` } };
      }
      return { ok: true, status: res.status, data };
    } catch (e) {
      clearTimeout(timer);
      return { ok: false, offline: true, error: { message: 'اتصال به سرور برقرار نشد' } };
    }
  },
  async _doRefresh(){
    if (this._refreshing) return this._refreshing;
    this._refreshing = (async () => {
      try {
        const res = await fetch(this.base + '/api/v1/auth/refresh', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ refresh: this._refresh }) });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data?.access) { this.setToken(data.access); this.setRefresh(data.refresh); return true; }
        return false;
      } catch { return false; } finally { this._refreshing = null; }
    })();
    return this._refreshing;
  },
  _onSessionExpired(){ this.setToken(null); this.setRefresh(null); if (typeof onAdminSessionExpired === 'function') onAdminSessionExpired(); },
  get(path){ return this.request(path); },
  post(path, body){ return this.request(path, { method:'POST', body: JSON.stringify(body||{}) }); },
  patch(path, body){ return this.request(path, { method:'PATCH', body: JSON.stringify(body||{}) }); },
  async requestAdminOtp(phone){ return this.request('/auth/staff/request', { method:'POST', body: JSON.stringify({ phone }) }); },
  async verifyAdminOtp(phone, code){
    const res = await this.request('/auth/staff/verify', { method:'POST', body: JSON.stringify({ phone, code }) });
    if (res.ok && res.data?.access) { this.setToken(res.data.access); this.setRefresh(res.data.refresh); }
    return res;
  },
  async doLogout(){
    if (this._refresh) { await fetch(this.base + '/api/v1/auth/logout', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ refresh: this._refresh }) }).catch(() => {}); }
    this.setToken(null); this.setRefresh(null);
  },
  overview(){ return this.get('/admin/overview'); },
  systemHealth(){ return this.get('/admin/system-health'); },
  businessIntelligence(){ return this.get('/admin/business-intelligence'); },
  security(){ return this.get('/admin/security'); },
  control(restId, body){ return this.patch(`/admin/restaurants/${restId}/control`, body); },
};

// نگاشت رستوران API به ساختار پنل
// فیلدهای ظاهری (لوگو/گرادیان/شهر) چون در بک‌اند مدل نشدن، از نمونه پر می‌شن (فقط تزئینی)
// ولی وضعیت اشتراک/پلن/روز باقی‌مانده همگی واقعی‌اند (از tenant.plan_expires_at)
const SUB_STATUS_LABEL = { active:'فعال', expiring:'رو به اتمام', expired:'منقضی', trial:'دوره آزمایشی', trial_expired:'آزمایشی تمام‌شده' };
function mapAdminRestaurant(apiR, fallback){
  return {
    id: apiR.id,
    tenantId: apiR.tenant_id,
    name: apiR.name,
    logo: fallback?.logo || '',
    grad: fallback?.grad || 'linear-gradient(135deg,#818CF8,#4F46E5)',
    city: apiR.cuisine || fallback?.city || '—',
    plan: apiR.plan || 'free',
    // وضعیت واقعی اشتراک — از بک‌اند (tenant.plan_expires_at / trial_ends_at)
    status: apiR.subscription_status,
    daysLeft: apiR.days_left,
    planExpiresAt: apiR.plan_expires_at,
    trialEndsAt: apiR.trial_ends_at,
    isOpen: apiR.is_open,
    members: apiR.members ?? 0,
    reservations: apiR.reservations ?? 0,
    sms: apiR.sms_total_sent ?? 0,
    smsBalance: apiR.sms_balance ?? 0,
    joined: apiR.joined_at ? new Date(apiR.joined_at).toLocaleDateString('fa-IR') : '—',
  };
}

// بارگذاری رستوران‌ها از API admin (با fallback به نمونه فقط در حالت آفلاین/دمو)
async function loadAdminRestaurants(){
  const res = await API.get('/admin/restaurants');
  if (res.ok && Array.isArray(res.data?.restaurants)) {
    API.online = true;
    updateOfflineBanner();
    return res.data.restaurants.map(apiR => {
      const fb = RESTAURANTS_SAMPLE.find(s => s.id === apiR.id) || RESTAURANTS_SAMPLE[0];
      return mapAdminRestaurant(apiR, fb);
    });
  }
  API.online = false;
  updateOfflineBanner();
  return RESTAURANTS_SAMPLE.map(s => ({ ...s, _demo: true }));
}
function updateOfflineBanner(){
  const el = document.getElementById('offlineBanner');
  if (el) el.style.display = API.online ? 'none' : 'flex';
}

// ════════ داده‌ی رستوران‌ها (شبیه‌سازی — در محصول واقعی از API) ════════

</script>

function rBilling(){

    <div class="bill-summary">
      <div class="bill-stat"><div class="bs-val" style="color:var(--ink)">${fa(activeSubsc)}</div><div class="bs-label">اشتراک فعال</div></div>

    </div>

      <div class="panel-head"><div><div class="panel-title">اشتراک و مصرف پیامک رستوران‌ها</div><div class="panel-sub">مدیریت تمدید، لغو و سهمیه‌ی پیامک</div></div></div>
      <div class="mini-list">
        ${RESTAURANTS.map(r=>{
          const badgeCls=r.status==='trial_expired'?'expired':r.status;
          let st=STATUS_LABEL[r.status];
          if(r.status==='active')st=r.daysLeft!=null?`فعال · ${fa(r.daysLeft)} روز`:'فعال · نامحدود';
          else if(r.status==='expired'||r.status==='trial_expired')st=r.daysLeft!=null?`${fa(Math.abs(r.daysLeft))} روز منقضی`:'منقضی';
          else if(r.status==='expiring')st=`${fa(r.daysLeft)} روز مونده`;
          else st=`آزمایشی · ${fa(r.daysLeft)} روز`;
          return `<div class="mini-row" style="flex-wrap:wrap">

            </div>
            <span class="badge ${badgeCls}" style="align-self:flex-start"><span class="bdot"></span>${st}</span>
            <div style="display:flex;gap:6px">
              <button class="btn btn-primary btn-sm" onclick="openSmsTopup('${r.id}')">${icon('phone',{size:13})} شارژ پیامک</button>

}
// ════════ شارژ موجودی پیامک (وصل به API واقعی) ════════
let _topupRestId=null;
function openSmsTopup(id){
  const r=RESTAURANTS.find(x=>String(x.id)===String(id));if(!r)return;
  _topupRestId=id;
  openModal(`
    <div class="modal-title">${icon('phone',{size:18})} شارژ موجودی پیامک</div>
    <div class="modal-sub">${esc(r.name)} · موجودی فعلی: ${fa(r.smsBalance||0)} پیامک</div>
    <div class="field-label">تعداد پیامک برای افزودن</div>
    <div class="opt-row" id="smsAmountOpts">
      ${[[1000,'۱۰۰۰'],[5000,'۵۰۰۰'],[10000,'۱۰٬۰۰۰'],[50000,'۵۰٬۰۰۰']].map(([v,l],i)=>`<div class="opt ${i===0?'sel':''}" data-amt="${v}" onclick="pickSmsAmount(${v},this)">${l}</div>`).join('')}
    </div>
    <div class="field-label">یا مقدار دلخواه</div>
    <input class="inp" id="smsCustomAmount" type="number" min="1" placeholder="مثلاً ۲۵۰۰" oninput="document.querySelectorAll('#smsAmountOpts .opt').forEach(o=>o.classList.remove('sel'))">
    <div style="font-size:12px;color:var(--t2);margin:14px 0;line-height:1.6;background:var(--ink-50);padding:12px 14px;border-radius:var(--r)">${icon('info',{size:13})} رستوران پس از پرداخت به شما، موجودی‌اش را اینجا شارژ کنید. هر شارژ ثبت و قابل‌پیگیری است.</div>
    <button class="btn btn-primary btn-block btn-lg" onclick="submitSmsTopup()">تأیید و شارژ</button>
  `);
}
let _topupAmount=1000;
function pickSmsAmount(v,el){_topupAmount=v;document.querySelectorAll('#smsAmountOpts .opt').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');document.getElementById('smsCustomAmount').value='';}
async function submitSmsTopup(){
  const custom=parseInt(document.getElementById('smsCustomAmount')?.value||'');
  const amount=Number.isInteger(custom)&&custom>0?custom:_topupAmount;
  if(!amount||amount<=0){toast('','تعداد نامعتبر');return;}
  const res=await API.post(`/admin/restaurants/${_topupRestId}/sms`,{amount});
  if(res.ok){
    closeModal();
    toast('',`${fa(amount)} پیامک شارژ شد · موجودی جدید: ${fa(res.data.balance)}`);
    const r=RESTAURANTS.find(x=>String(x.id)===String(_topupRestId));
    if(r)r.smsBalance=res.data.balance;
    if(typeof rBilling==='function'&&document.getElementById('v-billing'))rBilling();
  } else {
    toast('',res.error?.message||'شارژ ناموفق بود');
  }
}

// ════════ مدیریت اشتراک (تمدید واقعی / لغو واقعی) — وصل به PATCH /admin/restaurants/:id/control ════════
function openRenew(id){
  const r=RESTAURANTS.find(x=>String(x.id)===String(id));if(!r)return;
  renewPlan=(r.plan==='free'?'pro':r.plan);renewMonths=12;
  openModal(`
    <div class="modal-title">مدیریت اشتراک</div>
    <div class="modal-sub">${esc(r.name)} · وضعیت فعلی: ${STATUS_LABEL[r.status]}</div>
    <div class="field-label">پلن</div>
    <div class="opt-row" id="planOpts">
      ${[['pro','حرفه‌ای'],['enterprise','سازمانی']].map(([v,l])=>`<div class="opt ${v===renewPlan?'sel':''}" data-plan="${v}" onclick="pickPlan('${v}',this)">${l}</div>`).join('')}
    </div>
    <div class="field-label">مدت تمدید</div>
    <div class="opt-row" id="monthOpts">
      ${[[1,'۱ ماه'],[3,'۳ ماه'],[6,'۶ ماه'],[12,'۱ سال']].map(([v,l])=>`<div class="opt ${v===12?'sel':''}" data-m="${v}" onclick="pickMonths(${v},this)">${l}</div>`).join('')}
    </div>
    <div class="summary-box">
      <div class="sum-row"><span class="k">رستوران</span><span class="v">${esc(r.name)}</span></div>
      <div class="sum-row"><span class="k">پلن جدید</span><span class="v" id="sumPlan">${PLAN_LABEL[renewPlan]}</span></div>
      <div class="sum-row"><span class="k">مدت</span><span class="v" id="sumMonths">۱ سال</span></div>
    </div>
    <button class="btn btn-primary btn-block btn-lg" onclick="doRenew('${id}')">${icon('check',{size:15})} تمدید اشتراک</button>
    <button class="btn btn-danger btn-block" style="margin-top:8px" onclick="confirmCancel('${id}')">لغو اشتراک</button>
  `);
}
let renewPlan='pro',renewMonths=12;
function pickPlan(v,el){renewPlan=v;document.querySelectorAll('#planOpts .opt').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');document.getElementById('sumPlan').textContent=PLAN_LABEL[v]}
function pickMonths(v,el){renewMonths=v;document.querySelectorAll('#monthOpts .opt').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');document.getElementById('sumMonths').textContent={1:'۱ ماه',3:'۳ ماه',6:'۶ ماه',12:'۱ سال'}[v]}
async function doRenew(id){
  const r=RESTAURANTS.find(x=>String(x.id)===String(id));if(!r)return;
  const res=await API.control(id,{action:'extend_plan',plan:renewPlan,months:renewMonths});
  if(!res.ok){toast('',res.error?.message||'تمدید ناموفق بود');return;}
  r.plan=renewPlan;r.status='active';r.planExpiresAt=res.data.plan_expires_at;
  const days=Math.ceil((new Date(res.data.plan_expires_at).getTime()-Date.now())/86400000);
  r.daysLeft=days;
  closeModal();refreshActive();
  toast('',`اشتراک ${r.name} تمدید شد (${renewMonths===12?'۱ سال':fa(renewMonths)+' ماه'})`);
}
function confirmCancel(id){
  const r=RESTAURANTS.find(x=>String(x.id)===String(id));if(!r)return;
  openModal(`
    <div style="text-align:center">
      <div style="width:54px;height:54px;border-radius:14px;background:var(--red-50);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--warning)">${icon('alert',{size:26})}</div>
      <div class="modal-title" style="text-align:center">لغو اشتراک ${esc(r.name)}؟</div>
      <div class="modal-sub" style="text-align:center">اشتراک فوراً منقضی می‌شه. این کار قابل بازگشته (با تمدید مجدد).</div>
      <button class="btn btn-danger btn-block btn-lg" onclick="doCancel('${id}')">بله، لغو کن</button>
      <button class="btn btn-ghost btn-block" style="margin-top:8px" onclick="closeModal()">انصراف</button>
    </div>`);
}
async function doCancel(id){
  const r=RESTAURANTS.find(x=>String(x.id)===String(id));if(!r)return;
  const res=await API.control(id,{action:'cancel_subscription'});
  if(!res.ok){toast('',res.error?.message||'لغو ناموفق بود');return;}
  r.status='expired';r.daysLeft=0;
  closeModal();refreshActive();
  toast('',`اشتراک ${r.name} لغو شد`);
}
function refreshActive(){
  const active=document.querySelector('.view.active');if(!active)return;
  const id=active.id.replace('v-','');
  ({overview:rOverview,restaurants:rRestaurants,detail:rDetail,analytics:rAnalytics,customers:rCustomers,billing:rBilling,systemhealth:rSystemHealth,security:rSecurity,support:rSupport})[id]?.();
}

      <div class="panel">
        <div class="panel-head"><div><div class="panel-title">آخرین اقدامات حساس ادمین</div><div class="panel-sub">۷ روز اخیر</div></div></div>
        ${d.sensitive_actions.length?d.sensitive_actions.map(a=>`<div style="padding:9px 0;border-bottom:1px solid var(--border);font-size:12.5px"><b>${esc(a.action)}</b><div style="color:var(--t2);margin-top:2px">${new Date(a.at).toLocaleString('fa-IR')}</div></div>`).join(''):'<div style="text-align:center;color:var(--t2);padding:20px">موردی نیست</div>'}
      </div>`;
  })();
}

// ═══════════ ورود مدیر پلتفرم (فاز ۳ تکه ۷) ═══════════
let _adminPhone = '';
function faD(s){ return String(s).replace(/\d/g,d=>'۰۱۲۳۴۵۶۷۸۹'[d]); }
function showAdminLoginPhone(){
  document.getElementById('loginCard').innerHTML = `
    <div class="login-logo">R</div>
    <div class="login-title">پنل شرکت رزرونو</div>
    <div class="login-sub">ورود مدیر پلتفرم — شماره موبایل خود را وارد کنید</div>
    <label class="login-field-label">شماره موبایل</label>
    <input class="login-inp" id="adminPhone" inputmode="tel" placeholder="۰۹۱۲۳۴۵۶۷۸۹" onkeydown="if(event.key==='Enter')adminSendOtp()">
    <button class="login-btn" id="adminSendBtn" onclick="adminSendOtp()">ارسال کد ورود</button>
    <div class="login-foot">فقط مدیران پلتفرم به این پنل دسترسی دارند</div>`;
  setTimeout(()=>document.getElementById('adminPhone')?.focus(),200);
}
async function adminSendOtp(){
  const el = document.getElementById('adminPhone');
  const phone = (el?.value||'').trim();
  const normalized = phone.replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d)).replace(/\D/g,'');
  if (!/^09\d{9}$/.test(normalized)) { toast('','شماره موبایل معتبر وارد کن'); return; }
  _adminPhone = normalized;
  const btn = document.getElementById('adminSendBtn');
  if (btn){ btn.disabled = true; btn.textContent = 'در حال ارسال...'; }
  const res = await API.requestAdminOtp(normalized);
  if (!res.ok && !res.offline){
    toast('', res.error?.message || 'این شماره دسترسی ندارد');
    if (btn){ btn.disabled = false; btn.textContent = 'ارسال کد ورود'; }
    return;
  }
  const devCode = res.data?.devCode || (res.offline ? '۱۲۳۴' : null);
  showAdminLoginCode(devCode, res.offline);
}
function showAdminLoginCode(devCode, offline){
  document.getElementById('loginCard').innerHTML = `
    <div class="login-logo">${icon('mail',{size:34})}</div>
    <div class="login-title">کد ورود را وارد کنید</div>
    <div class="login-sub">کد ورود به شماره‌ی ${faD(_adminPhone)} ارسال شد</div>
    <label class="login-field-label">کد ورود</label>
    <input class="login-inp code" id="adminCode" inputmode="numeric" maxlength="6" placeholder="······" onkeydown="if(event.key==='Enter')adminConfirmOtp()">
    <button class="login-btn" id="adminVerifyBtn" onclick="adminConfirmOtp()">ورود به پنل</button>
    <button class="login-back" onclick="showAdminLoginPhone()">تغییر شماره</button>
    ${devCode ? `<div class="login-hint">${offline?'حالت دمو (بک‌اند متصل نیست):':'حالت توسعه:'} کد ورود <b>${faD(devCode)}</b> است</div>` : ''}`;
  setTimeout(()=>document.getElementById('adminCode')?.focus(),200);
}
async function adminConfirmOtp(){
  const el = document.getElementById('adminCode');
  const code = (el?.value||'').trim().replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d));
  if (!/^\d{4,6}$/.test(code)) { toast('','کد ورود را کامل وارد کن'); return; }
  const btn = document.getElementById('adminVerifyBtn');
  if (btn){ btn.disabled = true; btn.textContent = 'در حال بررسی...'; }
  const res = await API.verifyAdminOtp(_adminPhone, code);
  if (res.ok && res.data?.access){
    await enterAdminPanel();
  } else if (res.offline){
    if (code === '1234'){ await enterAdminPanel(true); }
    else { toast('','در حالت دمو، کد ۱۲۳۴ است'); if (btn){ btn.disabled=false; btn.textContent='ورود به پنل'; } }
  } else {
    toast('', res.error?.message || 'کد اشتباه است');
    if (btn){ btn.disabled=false; btn.textContent='ورود به پنل'; }
  }
}
async function enterAdminPanel(demo){
  document.getElementById('loginOverlay').classList.add('hidden');
  // اگر توکن واقعی داریم، داده‌ی واقعی بارگذاری کن
  if (API.getToken() && !demo){
    const [fresh] = await Promise.all([loadAdminRestaurants(), loadPlatformStats()]);
    RESTAURANTS = fresh;
  }
  rOverview();
  toast('','خوش آمدید · پنل شرکت');
}
async function adminLogout(){
  await API.doLogout();
  document.getElementById('loginOverlay').classList.remove('hidden');
  showAdminLoginPhone();
  toast('','از پنل خارج شدید');
}
function onAdminSessionExpired(){
  document.getElementById('loginOverlay').classList.remove('hidden');
  showAdminLoginPhone();
  toast('','نشست منقضی شد، دوباره وارد شوید');
}

// شروع — نشست را بازیابی و ورود را چک کن
API.restoreSession();
if (API.getToken()) {
  document.getElementById('loginOverlay').classList.add('hidden');
  rOverview();
  (async () => {
    const [fresh] = await Promise.all([loadAdminRestaurants(), loadPlatformStats()]);
    RESTAURANTS = fresh;
    const active = document.querySelector('.view.active');
    if (active) {
      const id = active.id.replace('v-', '');
      ({overview:rOverview, restaurants:rRestaurants, detail:rDetail, analytics:rAnalytics, customers:rCustomers, billing:rBilling, systemhealth:rSystemHealth, security:rSecurity, support:rSupport})[id]?.();
    }
  })();
} else {
  showAdminLoginPhone();
}

</script>
</body>
</html>
