<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>رزرونو — DNA غذایی (پیش‌نمایش)</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Vazirmatn',sans-serif;background:#0B1020;color:#fff;overflow:hidden;height:100vh;-webkit-font-smoothing:antialiased}
  .phone{max-width:420px;margin:0 auto;height:100vh;position:relative;background:#0B1020}
  /* ورودی روی پروفایل */
  .intro{padding:60px 24px;text-align:center}
  .dna-entry{margin:20px 0;border-radius:24px;padding:24px 22px;cursor:pointer;position:relative;overflow:hidden;background:linear-gradient(135deg,#4F46E5,#7C3AED 55%,#E8925A 130%);text-align:right;transition:transform .2s cubic-bezier(.34,1.56,.64,1)}
  .dna-entry:active{transform:scale(.98)}
  .dna-entry::after{content:"";position:absolute;top:-30%;right:-10%;width:180px;height:180px;background:radial-gradient(circle,rgba(255,255,255,.25),transparent 70%)}
  .dna-entry-badge{display:inline-flex;gap:6px;font-size:12px;font-weight:700;background:rgba(255,255,255,.18);padding:5px 12px;border-radius:20px;margin-bottom:14px;position:relative}
  .dna-entry-title{font-size:22px;font-weight:900;letter-spacing:-.03em;position:relative;margin-bottom:6px}
  .dna-entry-sub{font-size:13.5px;opacity:.9;position:relative;line-height:1.6}
  .dna-entry-cta{margin-top:14px;display:inline-flex;gap:6px;font-size:13px;font-weight:700;background:#fff;color:#4F46E5;padding:9px 16px;border-radius:12px;position:relative}
  /* اورلی */
  .dna-overlay{position:absolute;inset:0;z-index:2000;background:#0B1020;display:none;flex-direction:column;overflow:hidden}
  .dna-overlay.open{display:flex}
  .dna-progress{display:flex;gap:5px;padding:14px 16px 0;position:relative;z-index:5}
  .dna-progress-bar{flex:1;height:3px;background:rgba(255,255,255,.25);border-radius:3px;overflow:hidden}
  .dna-progress-bar i{display:block;height:100%;width:0;background:#fff;border-radius:3px}
  .dna-progress-bar.done i{width:100%}
  .dna-progress-bar.active i{animation:dnaFill 5s linear forwards}
  @keyframes dnaFill{from{width:0}to{width:100%}}
  .dna-close{position:absolute;top:12px;left:16px;z-index:10;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:20px;cursor:pointer}
  .dna-slides{flex:1;position:relative}
  .dna-slide{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 28px}
  .dna-slide.show{display:flex;animation:dnaIn .5s cubic-bezier(.4,0,.2,1)}
  @keyframes dnaIn{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:none}}
  .dna-slide-kicker{font-size:14px;font-weight:600;color:rgba(255,255,255,.7);margin-bottom:16px}
  .dna-slide-big{font-size:76px;font-weight:900;letter-spacing:-.05em;line-height:.95;margin-bottom:8px;background:linear-gradient(135deg,#fff,#C7C9F5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .dna-slide-label{font-size:22px;font-weight:800;margin-bottom:14px;letter-spacing:-.02em}
  .dna-slide-desc{font-size:15px;color:rgba(255,255,255,.75);line-height:1.7;max-width:300px}
  .dna-slide-emoji{font-size:64px;margin-bottom:20px;filter:drop-shadow(0 8px 24px rgba(0,0,0,.4))}
  .dna-badge-persona{display:inline-block;background:rgba(255,255,255,.2);font-size:13px;font-weight:700;padding:6px 14px;border-radius:20px;margin-top:10px}
  .dna-tap{position:absolute;inset:0;display:flex;z-index:8}
  .dna-tap>div{flex:1}
  .dna-share-card{background:linear-gradient(150deg,#4F46E5,#7C3AED 60%,#E8925A);border-radius:32px;padding:28px 24px;width:100%;max-width:320px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
  .dna-share-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.18)}
  .dna-share-row:last-child{border-bottom:none}
  .dna-share-k{font-size:13.5px;color:rgba(255,255,255,.85);font-weight:600}
  .dna-share-v{font-size:16px;font-weight:800}
  .dna-share-btn{margin-top:22px;width:100%;background:#fff;color:#4F46E5;border:none;border-radius:14px;padding:15px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
  .hint{position:absolute;bottom:20px;left:0;right:0;text-align:center;color:rgba(255,255,255,.4);font-size:12px;z-index:9}
</style>
</head>
<body>
<div class="phone">
  <div class="intro">
    <div style="width:70px;height:70px;border-radius:20px;background:#1a2035;display:grid;place-items:center;font-size:32px;margin:0 auto 16px">👤</div>
    <div style="font-size:20px;font-weight:800;margin-bottom:4px">سارا محمدی</div>
    <div style="color:#5A6172;font-size:14px;margin-bottom:8px">۰۹۱۲۳۳۳۴۴۵۵</div>
    <div class="dna-entry" onclick="openDNA()">
      <span class="dna-entry-badge">🧬 جدید</span>
      <div class="dna-entry-title">DNA غذایی تو آماده‌ست</div>
      <div class="dna-entry-sub">ببین امسال چطور غذا خوردی، شخصیت غذاییت چیه، و با دوستات به اشتراک بذار</div>
      <div class="dna-entry-cta">کشفش کن ✦</div>
    </div>
    <div style="color:#5A6172;font-size:13px;margin-top:30px">👆 روی کارت بزن تا تجربه‌ی کامل رو ببینی</div>
  </div>

  <div id="dnaOverlay" class="dna-overlay">
    <div class="dna-progress" id="dnaProgress"></div>
    <button class="dna-close" onclick="closeDNA()">×</button>
    <div class="dna-slides" id="dnaSlides"></div>
    <div class="dna-tap"><div onclick="prev()"></div><div onclick="next()"></div></div>
    <div class="hint">سمت چپ بزن: بعدی · سمت راست: قبلی</div>
  </div>
</div>
<script>
const faNum=s=>String(s).replace(/\d/g,d=>'۰۱۲۳۴۵۶۷۸۹'[d]);
let slide=0,timer=null;
const persona={emoji:'👑',name:'سلطانِ رستوران‌ها',desc:'تو همه‌جا VIP هستی و سلیقه‌ات بی‌نظیره'};
const pct=88;
const slides=[
  {kicker:'DNA غذایی تو آماده‌ست',emoji:'🧬',label:'بریم ببینیم امسال چطور گذشت',desc:'چند ثانیه وقت بذار — نتیجه‌اش ارزش داره'},
  {kicker:'امسال رفتی بیرون',big:'۴۷',label:'بار غذا خوردی',desc:'این یعنی بیشتر از ۸۸٪ آدمای دور و برت!'},
  {kicker:'کاوش کردی',big:'۹',label:'رستوران مختلف',desc:'هر کدوم یه تجربه‌ی جدید بود'},
  {kicker:'روی خاطره‌ها سرمایه‌گذاری کردی',big:'۸م',label:'تومان',desc:'ارزشش رو داشت، مگه نه؟'},
  {kicker:'و اما شخصیت غذایی تو',emoji:'👑',label:'سلطانِ رستوران‌ها',desc:'تو همه‌جا VIP هستی و سلیقه‌ات بی‌نظیره',persona:true},
];
function build(){
  const w=document.getElementById('dnaSlides');
  w.innerHTML=slides.map((s,i)=>`<div class="dna-slide" data-i="${i}">
    ${s.emoji?`<div class="dna-slide-emoji">${s.emoji}</div>`:''}
    <div class="dna-slide-kicker">${s.kicker}</div>
    ${s.big?`<div class="dna-slide-big">${s.big}</div>`:''}
    <div class="dna-slide-label">${s.label}</div>
    <div class="dna-slide-desc">${s.desc}</div>
    ${s.persona?`<div class="dna-badge-persona">✦ منحصر به تو</div>`:''}
  </div>`).join('')+`<div class="dna-slide" data-i="${slides.length}">
    <div class="dna-share-card">
      <div style="font-size:13px;font-weight:700;color:rgba(255,255,255,.9);margin-bottom:4px">DNA غذایی من</div>
      <div style="font-size:26px;font-weight:900;margin-bottom:16px;letter-spacing:-.03em">👑 سلطانِ رستوران‌ها</div>
      <div class="dna-share-row"><span class="dna-share-k">بار بیرون غذا خوردم</span><span class="dna-share-v">۴۷</span></div>
      <div class="dna-share-row"><span class="dna-share-k">رستوران کشف کردم</span><span class="dna-share-v">۹</span></div>
      <div class="dna-share-row"><span class="dna-share-k">بهتر از</span><span class="dna-share-v">۸۸٪ مردم</span></div>
      <button class="dna-share-btn" onclick="alert('در اپ واقعی: اشتراک در استوری اینستاگرام یا کپی متن')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
        اشتراک‌گذاری در استوری
      </button>
    </div>
    <div style="color:rgba(255,255,255,.5);font-size:13px;margin-top:20px">رزرونو · DNA غذایی</div>
  </div>`;
  const n=document.querySelectorAll('#dnaSlides .dna-slide').length;
  document.getElementById('dnaProgress').innerHTML=Array.from({length:n},()=>'<div class="dna-progress-bar"><i></i></div>').join('');
}
function show(i){
  const sl=document.querySelectorAll('#dnaSlides .dna-slide');
  const bars=document.querySelectorAll('#dnaProgress .dna-progress-bar');
  if(i>=sl.length){ closeDNA(); return; }
  slide=i;
  sl.forEach((s,idx)=>s.classList.toggle('show',idx===i));
  bars.forEach((b,idx)=>{b.classList.toggle('done',idx<i);b.classList.toggle('active',idx===i)});
  clearTimeout(timer);
  if(i<sl.length-1) timer=setTimeout(()=>show(i+1),5000);
}
function openDNA(){ build(); document.getElementById('dnaOverlay').classList.add('open'); show(0); }
function closeDNA(){ clearTimeout(timer); document.getElementById('dnaOverlay').classList.remove('open'); }
function next(){ show(slide+1); }
function prev(){ show(Math.max(0,slide-1)); }
</script>
</body>
</html>
