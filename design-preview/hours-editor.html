<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رزرونو — ویرایش ساعت کاری</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  [data-theme="dark"]{--text:#fff;--text-2:#C6BEE8;--text-3:#8A82A8;--glass:rgba(255,255,255,.07);--glass-2:rgba(255,255,255,.12);--edge:rgba(255,255,255,.16);--hi:rgba(255,255,255,.5);--base:#0A0714;--card:rgba(255,255,255,.05)}
  [data-theme="light"]{--text:#160F26;--text-2:#5A5182;--text-3:#928AB2;--glass:rgba(255,255,255,.7);--glass-2:rgba(255,255,255,.85);--edge:rgba(22,15,38,.08);--hi:rgba(255,255,255,.95);--base:#EEE9FA;--card:#fff}
  :root{--grad:linear-gradient(135deg,#6A4BFF,#B23BFF 50%,#FF4B7A);--spring:cubic-bezier(.34,1.56,.64,1);--ease:cubic-bezier(.4,0,.2,1)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Vazirmatn',sans-serif;-webkit-font-smoothing:antialiased;color:var(--text);min-height:100vh;
    background:radial-gradient(50% 40% at 85% 0%,#2A1245 0,transparent 60%),radial-gradient(50% 40% at 10% 5%,#1A1E5C 0,transparent 62%),var(--base);
    background-attachment:fixed;transition:color .3s;padding:20px 16px 60px}
  .wrap{max-width:640px;margin:0 auto}
  .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .h1{font-size:26px;font-weight:900;letter-spacing:-.03em}
  .sub{font-size:13px;color:var(--text-3);margin-bottom:22px}
  .theme-btn{width:44px;height:44px;border-radius:14px;background:var(--glass);border:1px solid var(--edge);cursor:pointer;font-size:18px;color:var(--text);backdrop-filter:blur(20px)}
  .day{background:var(--card);border:1px solid var(--edge);border-radius:20px;padding:16px;margin-bottom:12px;backdrop-filter:blur(20px);transition:transform .2s var(--spring)}
  .day-head{display:flex;align-items:center;justify-content:space-between}
  .day-name{font-size:16px;font-weight:800}
  .day-toggle{position:relative;width:50px;height:29px;border-radius:20px;background:rgba(255,255,255,.14);cursor:pointer;transition:background .25s;border:none;flex-shrink:0}
  .day-toggle.on{background:var(--grad)}
  .day-toggle .k{position:absolute;top:3px;right:3px;width:23px;height:23px;border-radius:50%;background:#fff;transition:transform .3s var(--spring)}
  .day-toggle.on .k{transform:translateX(-21px)}
  .shifts{margin-top:14px;display:flex;flex-direction:column;gap:9px}
  .shifts.hidden{display:none}
  .shift{display:flex;align-items:center;gap:10px}
  .shift-time{flex:1;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid var(--edge);border-radius:13px;padding:11px 13px}
  [data-theme="light"] .shift-time{background:rgba(22,15,38,.04)}
  .shift-time input{background:transparent;border:none;color:var(--text);font-family:inherit;font-size:15px;font-weight:700;width:100%;outline:none;text-align:center}
  .shift-sep{color:var(--text-3);font-size:12px;font-weight:600}
  .shift-del{width:36px;height:36px;border-radius:11px;background:rgba(255,75,106,.15);border:none;color:#FF4B6A;cursor:pointer;font-size:16px;flex-shrink:0;transition:transform .15s var(--spring)}
  .shift-del:active{transform:scale(.85)}
  .add-shift{margin-top:4px;background:transparent;border:1.5px dashed var(--edge);border-radius:12px;padding:10px;color:var(--text-2);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;width:100%;transition:all .2s}
  .add-shift:hover{border-color:#6A4BFF;color:#B39BFF}
  .closed-label{margin-top:12px;font-size:13px;color:var(--text-3);text-align:center;font-weight:600}
  .quick{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .quick-btn{background:var(--glass);border:1px solid var(--edge);border-radius:20px;padding:9px 15px;color:var(--text-2);font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;backdrop-filter:blur(20px);transition:all .2s var(--spring)}
  .quick-btn:active{transform:scale(.94)}
  .quick-btn:hover{color:var(--text);border-color:#6A4BFF}
  .save{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:608px;
    background:var(--grad);color:#fff;border:none;border-radius:18px;padding:16px;font-family:inherit;font-size:16px;font-weight:800;
    cursor:pointer;box-shadow:0 12px 30px rgba(106,75,255,.5);transition:transform .2s var(--spring)}
  .save:active{transform:translateX(-50%) scale(.97)}
  .note{background:var(--glass);border:1px solid var(--edge);border-radius:14px;padding:13px 15px;font-size:12.5px;color:var(--text-2);line-height:1.6;margin-bottom:20px;backdrop-filter:blur(20px)}
  .note b{color:var(--text)}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><div class="h1">ساعت کاری ⏰</div></div>
    <button class="theme-btn" onclick="tt()" id="tb">🌙</button>
  </div>
  <div class="sub">مشخص کن هر روز کِی بازی. مشتری‌ها فقط تو این ساعت‌ها می‌تونن رزرو کنن.</div>

  <div class="note">💡 <b>چند شیفت:</b> اگه ظهر و شب بازی (با تعطیلی وسط)، برای هر کدوم یه شیفت جدا اضافه کن. مثلاً ۱۲:۰۰–۱۶:۰۰ و ۱۹:۰۰–۲۳:۳۰.</div>

  <div class="quick">
    <button class="quick-btn" onclick="preset('everyday')">🔄 همه‌ی روزها مثل هم</button>
    <button class="quick-btn" onclick="preset('weekend')">📅 آخر هفته متفاوت</button>
    <button class="quick-btn" onclick="preset('copy')">📋 کپی از شنبه</button>
  </div>

  <div id="days"></div>
</div>
<button class="save" onclick="save()">ذخیره ساعت کاری</button>

<script>
  const DAYS=['شنبه','یکشنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنجشنبه','جمعه'];
  // حالت اولیه: همه باز ۱۹:۰۰–۲۳:۳۰
  let state=DAYS.map(()=>({open:true,shifts:[['19:00','23:30']]}));

  function render(){
    document.getElementById('days').innerHTML=state.map((d,i)=>`
      <div class="day">
        <div class="day-head">
          <div class="day-name">${DAYS[i]}</div>
          <button class="day-toggle ${d.open?'on':''}" onclick="toggleDay(${i})"><span class="k"></span></button>
        </div>
        ${d.open?`
          <div class="shifts">
            ${d.shifts.map((s,j)=>`
              <div class="shift">
                <div class="shift-time">
                  <input type="time" value="${s[0]}" onchange="setTime(${i},${j},0,this.value)">
                  <span class="shift-sep">تا</span>
                  <input type="time" value="${s[1]}" onchange="setTime(${i},${j},1,this.value)">
                </div>
                ${d.shifts.length>1?`<button class="shift-del" onclick="delShift(${i},${j})">✕</button>`:''}
              </div>`).join('')}
            <button class="add-shift" onclick="addShift(${i})">+ افزودن شیفت (مثلاً شام)</button>
          </div>`:`<div class="closed-label">این روز تعطیله</div>`}
      </div>`).join('');
  }
  function toggleDay(i){state[i].open=!state[i].open;if(state[i].open&&!state[i].shifts.length)state[i].shifts=[['19:00','23:30']];buzz();render();}
  function setTime(i,j,k,v){state[i].shifts[j][k]=v;}
  function addShift(i){state[i].shifts.push(['12:00','16:00']);buzz();render();}
  function delShift(i,j){state[i].shifts.splice(j,1);buzz();render();}
  function preset(type){
    if(type==='everyday'){const s=JSON.parse(JSON.stringify(state[0].shifts));state=state.map(()=>({open:true,shifts:JSON.parse(JSON.stringify(s))}));}
    if(type==='weekend'){state=state.map((d,i)=>i>=5?{open:true,shifts:[['12:00','16:00'],['19:00','23:59']]}:{open:true,shifts:[['19:00','23:30']]});}
    if(type==='copy'){const s=JSON.parse(JSON.stringify(state[0].shifts));const o=state[0].open;state=state.map(()=>({open:o,shifts:JSON.parse(JSON.stringify(s))}));}
    buzz();render();
  }
  function save(){
    // تبدیل به فرمت بک‌اند: {weekday: shifts} با کلیدِ 0=یکشنبه
    const jsMap={0:6,1:0,2:1,3:2,4:3,5:4,6:5}; // index ما (0=شنبه) → getDay (0=یکشنبه)
    const oh={};
    state.forEach((d,i)=>{const wd=jsMap[i];oh[wd]=d.open?d.shifts:[];});
    buzz(20);
    alert('ساعت کاری ذخیره شد ✓\n\n(در اپ واقعی به PUT /restaurant/hours فرستاده می‌شه)\n\n'+JSON.stringify(oh,null,1));
  }
  function buzz(ms){if(navigator.vibrate)navigator.vibrate(ms||8);}
  const root=document.documentElement;
  if(window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches){root.setAttribute('data-theme','light');document.getElementById('tb').textContent='☀️';}
  function tt(){const t=root.getAttribute('data-theme')==='dark'?'light':'dark';root.setAttribute('data-theme',t);document.getElementById('tb').textContent=t==='dark'?'🌙':'☀️';buzz();}
  render();
</script>
</body>
</html>
