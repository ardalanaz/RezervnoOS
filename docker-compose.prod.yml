# ═══════════════════════════════════════════════════════════
#  رزرونو — override تولید (HTTPS با Caddy)
#
#  استفاده:
#    docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
#  پیش‌نیاز:
#    1. در .env بگذار:  DOMAIN=دامنه‌ی‌تو.ir
#    2. دامنه به آی‌پی سرور اشاره کند (رکورد A در DNS)
#    3. پورت‌های 80 و 443 سرور باز باشند
#
#  Caddy خودکار گواهی SSL از Let's Encrypt می‌گیرد و تمدید می‌کند.
#  این override سرویس nginx را با caddy جایگزین می‌کند.
# ═══════════════════════════════════════════════════════════
services:
  api:
    environment:
      # ⚠️ فیکسِ حسابرسیِ ۲۰۲۶-۰۷-۱۹ (FINAL-PRODUCTION-AUDIT.md بخشِ ۶): در docker-compose.yml
      # پایه این متغیر پیش‌فرضِ خالی داشت (${ALLOWED_ORIGINS:-}) — یعنی اگر تیمِ عملیات آن را
      # در .env می‌گذاشت، middleware.ts چکِ CSRF/Origin را بی‌صدا و بدونِ هیچ خطایی غیرفعال
      # می‌کرد. این override برای production آن را اجباری می‌کند؛ بدونش کانتینر بالا نمی‌آید.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS را در .env تنظیم کن (مثلاً https://rezervno.ir,https://business.rezervno.ir,https://admin.rezervno.ir)}

  caddy:
    build:
      context: ./deploy/caddy
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?دامنه را در .env بگذار، مثلاً DOMAIN=rezervno.ir}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./apps/customer:/srv/customer:ro
      - ./apps/business:/srv/business:ro
      - ./apps/company:/srv/company:ro
      - caddy_data:/data       # گواهی‌های SSL اینجا ذخیره می‌شوند (مهم — حذف نکن)
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
