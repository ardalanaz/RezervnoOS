# ═══════════════════════════════════════════════════════════
#  رزرونو — nginx با دفاع چندلایه‌ی سخت‌گیرانه
#  لایه‌ی دوم دفاع (بعد از CDN/WAF لبه)
# ═══════════════════════════════════════════════════════════

# ── ریت‌لیمیت‌ها: زون‌های مختلف برای مسیرهای مختلف ──
# مسیرهای حساس (ورود/OTP) سخت‌گیرانه‌تر
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;      # ورود: ۵ در دقیقه
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;      # API عمومی
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=60r/s;   # فایل‌های استاتیک

# ── محدودیت تعداد اتصال هم‌زمان per IP (ضد flood) ──
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── پاسخ به ریت‌لیمیت: 429 (نه 503) ──
limit_req_status 429;
limit_conn_status 429;

# ── لاگ برای مانیتورینگ حملات ──
log_format security '$remote_addr - [$time_local] "$request" '
                    '$status bytes=$body_bytes_sent '
                    'ua="$http_user_agent" ref="$http_referer"';

server {
    listen 80;
    server_name _;

    # ── مخفی‌کردن نسخه و اطلاعات سرور ──
    server_tokens off;

    # ── محدودیت اندازه‌ی درخواست (ضد حمله‌ی payload بزرگ) ──
    client_max_body_size 6M;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 8k;

    # ── تایم‌اوت‌ها (ضد Slowloris) ──
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 30s;
    reset_timedout_connection on;

    # ── فشرده‌سازی (PERF): پهنای‌باند JSON/HTML/JS/CSS را ~۷۰٪ کم می‌کند ──
    # در ۱۰۰k کاربر روزانه، این هم هزینه‌ی خروجی را کم می‌کند هم TTFB را.
    gzip on;
    gzip_vary on;                      # Vary: Accept-Encoding برای کش صحیح CDN
    gzip_proxied any;
    gzip_comp_level 5;                 # تعادل CPU/نسبت فشرده‌سازی
    gzip_min_length 512;               # فایل‌های خیلی کوچک ارزش فشرده‌سازی ندارند
    gzip_types
      application/json
      application/javascript
      application/x-javascript
      text/javascript
      text/css
      text/plain
      text/html
      image/svg+xml
      application/manifest+json;
    # نکته: فایل‌های استاتیک را می‌توان با gzip_static از قبل‌فشرده سرو کرد
    # (اگر .gz در build ساخته شود) — CPU زمان اجرا صفر می‌شود.

    # ── محدودیت اتصال هم‌زمان ──
    limit_conn conn_limit 20;

    # ── هدرهای امنیتی کامل ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;
    # HSTS (CWE-319): مرورگر را وادار می‌کند فقط HTTPS استفاده کند. فرض: TLS در لایه‌ی
    # بالادست (load balancer / ingress) خاتمه می‌یابد و ترافیک HTTP فقط داخل شبکه‌ی
    # خصوصی به این nginx می‌رسد. اگر nginx خودش TLS دارد، بلوک listen 443 را فعال کن.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # ⚠️ L5: 'unsafe-inline' برای script/style فعلاً لازم است چون پنل‌ها تک‌فایل HTML
    #   با اسکریپت/استایل inline‌اند. مسیر سخت‌سازی: در build، هر بلوک inline یک nonce
    #   بگیرد و اینجا 'nonce-...' جایگزین 'unsafe-inline' شود. تا آن زمان، دفاع لایه‌ای
    #   دیگر (esc() سمت کلاینت روی همه‌ی داده‌ی API، nosniff، X-Frame-Options) فعال است.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # ── بلاک User-Agentهای بد و اسکنرها ──
    if ($http_user_agent ~* (nikto|sqlmap|nmap|masscan|nessus|metasploit|havij|acunetix|wpscan)) {
        return 403;
    }
    # بلاک درخواست بدون User-Agent (اغلب بات)
    if ($http_user_agent = "") {
        return 403;
    }

    # ── بلاک متدهای خطرناک ──
    if ($request_method !~ ^(GET|POST|PATCH|PUT|DELETE|OPTIONS|HEAD)$) {
        return 405;
    }

    # ── بلاک دسترسی به فایل‌های حساس ──
    # ── healthcheck داخلیِ کانتینر (Docker healthcheck این را می‌زند) ──
    # بدونِ لاگ و بدونِ پراکسی؛ فقط تأیید می‌کند که خودِ nginx زنده و پاسخ‌گوست.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    location ~ /\.(?!well-known) { deny all; return 404; }
    location ~* \.(env|git|sql|sh|bak|config|yml|yaml)$ { deny all; return 404; }

    # ── مسیرهای ورود/OTP: سخت‌گیرانه‌ترین ریت‌لیمیت ──
    location ~ ^/api/v1/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_conn conn_limit 5;
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;  # H10: overwrite (نه append) تا کلاینت نتواند IP جعل کند
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 15s;
        proxy_connect_timeout 5s;
    }

    # ── بقیه‌ی API ──
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;  # H10: overwrite (نه append) تا کلاینت نتواند IP جعل کند
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── فرانت‌اندها ──
    # فایل‌های استاتیک با پسوند asset (فونت/عکس/آیکن) → کش طولانی immutable.
    # پنل‌ها تک‌فایل HTML‌اند، پس این عمدتاً برای دارایی‌های جانبی است.
    location ~* \.(woff2?|ttf|otf|eot|png|jpg|jpeg|gif|webp|svg|ico)$ {
        root /usr/share/nginx/html/customer;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }
    location /business/ {
        limit_req zone=static_limit burst=20 nodelay;
        alias /usr/share/nginx/html/business/;
        # HTML همیشه revalidate شود تا کاربر آخرین نسخه‌ی اپ را بگیرد (SPA entry).
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ /business/index.html;
    }
    location /company/ {
        limit_req zone=static_limit burst=20 nodelay;
        alias /usr/share/nginx/html/company/;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ /company/index.html;
    }
    location / {
        limit_req zone=static_limit burst=20 nodelay;
        root /usr/share/nginx/html/customer;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
